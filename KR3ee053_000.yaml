front:
  text: 序塗君蔚生余之忘形友也性介直有奇志好學能深思民國五年畢業於豫南師範學校方將展其所學以顯於世卒以落落憤時退居閭里日沉潛乎典籍觀摩乎金石詠誦揮灑之餘間亦涉獵醫藥百家之書適其時地方苦疾疫而鄉曲少醫藥君試其術以治人無不活遂慨然以為士之欲求有濟於世也須得其時彼禹稷益棄不逢盛世則一匹夫而與草木同腐耳豈若倉公扁鵲之倫樹德當時流惠後世之易哉於是益致力於醫極深研幾苦心孤詣舉凡黃帝素問之祕雷公岐伯之奧無不盡其玄妙窮其幽邃其術益精其活人益衆蒙賜者皆已口勒而心銘矣固無庸余言以為重輕也丙寅春以事來梁知好或勸之懸壺君謂一人之力有限所活無多乃以幼科啞症書之善本世無良醫叔焉憂之擬先編訂救世然後考正群書今年夏推拿抉微書成囑為之序余謂君集各家之名言本歷年之經驗闡幽抉微多所發明信可謂赤子之寶筏幼兒之福星然尚願君之推此志也以往將澤加天下不僅以醫名也戊辰六月二十日同邑牧藝張士傑謹序自序余少壯多病旋即棄儒業醫研究內難傷寒諸書固非諳於小兒各科者也然以幼科之求治者余每以診治大人之法治之亦恆著效是小兒之柔嫩臟腑除不堪消受重劑藥外未始與大人相異者矣惟以兒性各殊有可服藥與不可服藥之區別余以感受此種困難屢思徵求其他捷易方術旋聞里南有陶石庵者工推拿之法余心焉慕之間亦演習此術以手代藥然所購推拿各書僅有鐵鏡録推拿廣意保赤推拿數種夏禹鑄之鐵鏡録症治粗具而其推拿各法未免過於簡陋陳紫山之推拿廣意略備推拿而其各種驚症未免過於荒謬夏英白之保赤推拿法簡明矣術精確矣而其認症用藥諸法具屬闕如以之治療幼科又安可視為若操左券乎余鑑於此中得失蓄志重為編著者已非一日而以時不我假卒未如願乙丑冬蔣師厄守信陽余以困居城內無所事事始獲從事編著月餘城圍解時間既少脫稿尤難丙寅夏抵汴垣屆冬歷春夏迄秋年又十一閲月方能脫稿噫是書之成也雖參證各家拉雜成篇不無瑕疵可指而此心此志總冀於世不無小補云耳民國十七年戊辰河南信陽塗蔚生序於汴垣醫室
