body:
  text: 凡例一本書以選擇精細之推拿法加以注釋為主旨故定名曰推拿抉微一本書推拿法之內容均系摘録息縣夏英白先生者因其法簡而明較他書為獨優美故也一夏英白之推拿法雖系精純而其認證用藥諸法具屬闕如尚為未盡美善故本書以採摘各家認證諸法為補助以成全璧一本書雖系採擇前賢認證用藥之精華而前賢間有未臻完善者則余參以己見務使其認證精確治法完善以免嬰兒夭札一余之風症驚症諸談頗為前賢所未道及均系從實驗中得來而實驗中之所以得來則完全根據臟腑生化之理加以真確之論斷與憑空思索者絶相懸殊以之治兒固可以之治大人亦無不可一繪圖注穴為審視治療法之第一要著而前之小兒諸書所繪頭面諸穴均極錯誤不可依據本書則務使圖精穴確易於明瞭以免習醫者徒事疑慮毫無定憑一本書所繪頭面諸圖業醫者必須平素詳為審閲記憶純熟庶免臨症含糊至演手忙腳亂無所適從之患一本書雖未將小兒一切症治盡行列入而其主要症治已算括其概略業醫者固可作為參考而舉凡養兒各家亦可各置一本以備臨時選用一推拿法雖發明多年而鄉間愚夫愚婦以未耳聞目及每生疑畏我等如值此疑難地位之時則須詳為解釋使其胸襟冰釋我方得盡是術至解釋之法則在略曰人之頭面手掌諸穴與內部臟腑均相連繫臟腑是其根本諸穴是其苗葉小兒肉既嫩脆推其苗葉根本自易牽動云一本書所有一切藥之分量俱以小兒六歲時為標準若兒未滿六歲或已超過六歲以上者俱可以此標準增加或減少一本書凡系摘取某某人者即將某某人名字列入冠其節論之首恐系掩人之長正所以炫己短也節録夏英白先生推拿凡例一凡云拿者總言以醫手在兒經穴以用諸法也推者醫指按經穴擠而上下之也掐者醫指在兒經穴入而向後出也搓者醫指在兒經穴往來摩之也搖者或於兒頭或於兒手使之動也攝者醫以兩指攝兒皮微用力而略動也扯者於兒皮輕輕頻攝之而頻棄之也揉者醫以指按兒經穴不離其處而旋轉之也運者醫以指於兒經穴由此往彼也刮者醫指挨兒皮膚略加力而下也分者以兩手之指由兒經穴划向兩邊也和者醫以兩手之指由兒兩處經穴合於中間一處也醫者於用法時具全副善念慈心無半點浮詞躁之則一切神而明之存乎其人矣一凡為推拿法醫者己之大指不可修留爪甲但以指頭肉用力有爪甲則為傷兒皮膚矣醫者最宜輕穩莫致兒皮膚疼痛一兒病重者醫人以麝香黏己指輕者以蔥姜水浸己指則用一切法始可開閉竅一推拿法須在下午半日為之蓋上半日陽氣正盛在兒關竅推拿多不能入一指頭箕斗旋紋處有火若治兒熱症醫者可用大指尖勿將指頭箕斗紋處推拿一是書未注明所推拿之數以兒有大小強弱之異病有輕重之殊兒之大者強者病之重者用數多兒之小者弱者病之輕者用數少多則用幾百少者用幾十一是書原指某臟某腑寒則用某法熱則用某法虛者用某法實者用某法若素全不明醫理何能辨寒熱虛實倘或錯用亦能為害故認症宜真第一集認症法審察苗竅夏禹鑄曰望聞問切固醫家之不可少一者也在大方脈則然而小兒科則惟以望為主問則繼聞則次而切則無矣經云切而知之之謂巧夫小兒六脈未全切無可切而巧亦無所用其巧矣問而知之之謂工小兒於未言語時問之無可問即於能言者問之多不以真對是問之不必問而工亦無所用其工聞而知之之謂聖小兒初病之時聲音或不失其常至病久而氣喪氣喪而聲失聞之無可聞而聖又何所見其聖況書又曰哭聲不響赴陰君而亦有不赴陰君者何無非泥其聲而不得肺之絶與不絶故也吾故曰以望為主曰五臟之體隱而理微望從何處曰體固隱矣然發見於苗竅顏色之間者用無不周理固微矣乃昭著於四大五官之外者無一不顯中庸所謂費而隱顯之微者不可引之相發明哉故小兒病於內必形於外外者內之著也望形審竅自知其病按病推拿用藥見效之速未有不如響之應聲者內有臟曰心曰肝曰脾曰肺曰腎五臟不可望惟望五臟之苗與竅舌乃心之苗紅紫心熱也腫黑心火極也淡白虛也鼻準與牙床乃脾之竅鼻紅燥脾熱也慘黃脾敗也牙床紅腫脾熱也破爛胃火也唇乃脾胃之竅紅紫熱也淡白虛也如黑漆者脾胃絶也口左扯肝風也右扯脾之痰也鼻孔肺之竅乾燥熱也流清涕寒也耳與齒乃腎之竅耳鳴氣不和也耳流膿腎熱也齒如黃豆腎氣絶也目乃肝之竅勇視而轉睛者風也直視而睛不轉者肝之將絶也以目分言之又屬五臟之竅黑珠屬肝純是黃色凶症也白珠屬肺色青肝氣傷也淡黃色腑有積滯也老黃色乃肺受濕熱也瞳人屬腎無光彩又兼發黃腎氣虛也大眼角屬大腸破爛肺有風也小眼角屬小腸破爛心有熱也上皮屬脾腫脾傷也下皮屬胃青色胃有寒也上下皮睡合不緊露線縫者脾胃極虛也面有五位五臟各有所屬額屬心離火也左腮屬肝震木也右腮屬肺兌金也唇之下屬腎坎水也五臟里也六腑表也小腸心之表小便短黃澀痛心熱也清長而利虛也胃乃脾之表唇紅而吐胃熱也唇慘白而吐胃虛也唇色平常而吐作傷胃論大腸肺之表大便閉結肺有火也肺無熱而便閉必血枯不可通下脫肛肺虛也膽乃肝之表口苦肝旺也聞聲著嚇肝虛也膀胱腎之表居臍下氣海之右有名無形筋腫筋痛腎水之寒氣入膀胱也面有五色一曰紅紅病在心面紅者熱一曰青青病在肝面青者痛一曰黃黃病在脾面黃脾傷一曰白白病在肺面白者寒一曰黑黑病在腎面黑而無潤澤腎氣敗也望其色若異於平日而苗竅之色與面色相符則臟腑虛實無有不驗者矣塗蔚生曰夏禹鑄先生此篇望形證論固於小兒之大體病狀略形完備似具一種特別慧思心得者然其所謂不可切必問不可聞是則未免過於拘泥偏於非其常事者也蓋有病之兒未必盡系六脈未全不可用切未必盡系不會言語不必以問未必盡繫好謊問之多不以實對未必盡系病久失音聞無可聞者也縱其六脈未全言語未能平素好謊病久失音不可依據切與聞問而其每日懷抱之父母未常稍離左右豈有不可問其飲食起居為何若者乎吾故曰禹鑄此論未免過於拘泥然則設遇如此之兒吾人將何以處此曰捨去切聞持望與問因診斷平常之醫師全恃問症以為療治者也至其所謂耳鳴氣不和固屬小兒誠有之事然耳鳴究系腎虛者多因兒有稟受先天厚薄與臟腑傳克之異不可謂小兒無情欲之私便無腎虛等事也若夫所謂瞳人無光兼發黃為腎虛之黃字則不如易作焦字為妥因發黃之兒頗多發黃者未必腎虛腎虛者未必發黃然腎水乾涸不能上滋毛髮究見何狀曰外形焦燥稀落作穗若以發黃為腎虛恐人於發黃之兒患病盡認為腎虛而發焦作穗之兒反無以名之也其所謂上眼皮屬脾下眼皮屬胃雖無大差亦不如以上胃下脾為妥因陽上陰下此天地化生之定義也其所謂小便清利而長為小腸虛必須兼有別症方可斷為虛症因小便宜於清利也其所謂五臟里也六腑表也根據舊書習慣說法似乎未可厚非然陰陽互相對待六腑各配一臟除手厥陰心包絡配匹手少陽三焦人多不知外人每呼為五臟六腑我輩既確知三焦實有其物亦有配匹即可力改前非其所謂膀胱為腎之表有名無形則確屬有誤蓋古人只有謂三焦有名無形者實則不知三焦為何物即內而上中下三焦臟腑相連繫之油膜外而肥瘦肉間相隔之白膜也若夫膀胱則更有名有形其為腎行水之府也則火蒸水化上升而為津液外達而為衛氣其受腎邪熱之傳也則溺道澀滯不通而為癃閉半通而為淋濁其當腎火之敗也則非少腹寒結脹滿疼痛即溺多而或不禁前人見牲畜已死膀胱收縮莫辨遂謂其有上口無下口是不知其上口已在下焦油膜連網之中也若謂其有名無形則其塊然一物果何以置之至其所謂筋腫筋痛一層義更難會不知其是指外腎陰莖抑是指周身之筋蓋肝主筋而膀胱不主筋也五臟各有所司夏禹鑄曰心乃一身之主通身皆心司之專主血專司神如驚悸不安屬心虛淚無因而淚者心熱也莖陽物也腫者心熱也汗身瘦不動而汗者心虛也以上有病俱從心治塗蔚生曰汗者人身陽氣之變體也飲水入胃經火煽爍其化而為氣者由胃之通體微絲管上布外出發散於周身肌肉之間是為衛氣其化之不盡者又經膀胱蒸發一次上行外達余滓始下出而為溺蓋膀胱如釜中盛水丹田如灶底添薪也其中膀胱與腎透出之氣既上行著於口鼻而為津液外達於皮膚而為衛氣而汗之所以發生者則猶空氣之遇冷變而為雨口氣之著漆石復化而為水也如衛陽已虛不能自相維御則繼續後來之氣遂形滴瀝漏出以外自汗此為陽虛自汗之定義也然汗為陽而血為陰血非氣不長氣非血不攝是不動而汗宜從心治之說亦有理由脾專司元氣氣弱者脾虛氣又分司汗氣虛盜汗肌肉消瘦者脾虛痰實痰動者脾濕也虛痰動者脾虛思慮過則傷脾以上有病俱從脾治塗蔚生曰觀此是禹鑄於氣之化生汗之原委尚未深知梗概者也氣之化生余於上節已略言之然胃與膀胱之所以能化生氣者則又全賴乎兩腎中先天一點真陽之氣有此一點真陽之氣而後能化生脾胃後天之氣蓋兩腎中間是命門真火火潛於水化生腎系三焦油膜之氣而後始能化生臟腑及其氣血也故稱此種之氣始為元氣非脾之專司運化可為氣血之助者比也盜汗明是陰虛又與陽虛自汗有異而陰虛所以盜汗者因陰血既虛則火無所養故乘人睡眠氣來依歸陰血之際侵越氣分逼其出而為汗也其虛痰實痰之辨亦屬含糊觀後自知至其所謂思慮傷脾則多半在於大人小兒頗少此症因心火之陽可以化生脾之陽土心血之陰可以化生脾之陰土今心火思慮不息則陰血被其煎熬受傷而脾之所恃乎柔汁以化谷之堅質者亦於是乎傷矣故曰傷脾肺專司聲音音弱者肺虛也有聲不出者痰蔽也聲散者肺氣不斂也無聲者肺絶也熱出在肺毛碎癢者肺燥不潤者肺虛腠理內外皮肉不密則汗出以上有病俱從肺治塗蔚生曰人之皮膚具有隙孔俗稱毛孔非若銅鐵之堅實平板不透空氣者也吾人如以顯微鏡檢察人之周身則見吾人一呼氣而毛孔亦一開而呼氣吾人一吸氣而毛空亦一閉而吸氣又試於吾人之熱天出汗自見然熱雖出在肺而卻不生在肺蓋人飲食入胃其水穀之精華必經火化而後為律液為氣血以充溢臟腑周流皮膚而溫熱全體者也至其所謂司腠理是其未識腠理為肥肉內瘦肉外之白膜與內部三焦之油膜相連繫而為少陽所司也蓋少陽系自腎系生板油網油膜油以上生胸間之膈膜肝之膜油心之包絡與周身之腠理無不相連屬者也雖少陽有手足之分而其為上下內外之油膜則一若少陽氣盛則能收攝汗液使之不向外溢否則其氣虛敗或為風邪所襲則汗必侵越而出矣肝專司血血弱者肝虛也血又分司汗血虛自汗筋抽掣者肝風也以上有病俱從肝治塗蔚生曰陽虛自汗余解已見前禹鑄注為血虛自汗未免有誤至肝風之所以抽掣者則多由於血虛不能榮筋也腎專司骨齒耳以上有病俱從腎治塗蔚生曰腎之所以主骨治骨之所以治腎理雖微而實易了西洋之所以談骨極精分別極細而不得治骨之術者以其不知骨為腎主也夫骨之所以腎主之者以兩腎中間白膜一條是為腎系貫透脊骨之間脊骨間之骨髓即腎中所生之脂肪也有此脂髓而後能生巨細之骨骼全身皆然故治骨之痿敗宜滋補腎陰夏禹鑄曰脾肺內有傷皆從外入如父母舐犢過愛則飲食傷脾護持疏失則六淫傷肺至於心肝腎無有傷處到成人後生情欲多房事傷腎守錢貪財谷傷心動違常時惱怒傷肝乃如之症遠近盡多卓溪雖有良方惜手鞭長莫及形色部位指南賦陳紫山曰保嬰一術號日啞科口不能言脈無可視惟形色以為憑竭心思以施治故業擅於專門以補化工不及欲知有病必觀乎色左頰青龍屬肝右頰白虎屬肺天庭高而離陽心火地閣低而坎陰腎水鼻在面中脾應唇際觀乎色之所現知其病之所起舌乃心之苗目乃肝之系胃流注於兩頤腎通竅於兩耳爪則筋系而脾為之運發乃血餘而腎為之主脾司手足腎運牙齒苟本臟之或衰即所屬之失敗能觀乎外可知其內紅光見而熱痰壅盛青色露而涼癇怔悸如煤之黑兮中惡傳逆似橘之黃兮土脾吐痢白乃疳癆紫為熱熾青遮口角難醫黑掩太陽莫治年壽赤光多生膿血山根青黑頻見災危朱雀見於雙瞳火入水鄉青龍繞於口角肝乘脾部瀉痢而面赤者宜防咳嗽而色青者可畏面青而唇口撮疼痛方殷面赤而目竄視驚搐將至火光焰焰外感風寒金氣浮浮中藏積滯乍黃乍白疳熱連綿又青又赤風邪緊急氣乏兮囟陷成坑血衰兮頭毛作穗脾冷則口角流涎肝熱則目生眵淚面目虛浮定腹脹而氣喘眉毛頻蹙必腹痛而多啼風氣二池如黃土則為不宜左右兩頰似青黛即或客忤風門黑主疝而青主驚方廣昏凶而光滑吉手如數物兮肝風將發面若塗朱兮心火實炎伸縮就冷陽熱無疑坐臥愛暖陰寒可必肚大腳細脾欲困而成疳目瞪口張勢已危而必斃察之若精必得其理鴉聲魚口枉費神思肉脫皮乾勞神無益蛔蟲兮脾胃皆敗唇冷兮脾臟先虧然五體以頭為尊一面惟神可恃況乎聲有輕重之不同啼有乾溼之頓異病之初作必先呵缺火之將發忽作驚啼重舌木舌積熱心脾哽氣喘氣火傷肝肺齒齦宣露牙疳丁奚哺露食積心熱欲臥而不能脾熱好睡而不歇咳嗽失音者肺痿病後失音者腎怯腹痛而口流清水者蟲多瀉痢而大便酸臭者食積口頻撮而脾虛舌長伸而心熱煩熱在心惡見燈光疳熱在脾愛吃泥土雞胸兮肺火脹於胸膈龜背兮腎風入於骨髓鼻乾黑燥金受火刑肚大青筋土遭木克籲瘤瘡疥皆痃毒之流連五疳瀉痢總食積之停滯腹痛寒侵口瘡熱症臍風忌乎一臘蒸變防於周年驚自熱來癇由痰至驚本心生風從肝使急驚屬熱宜乎清涼慢驚屬虛宜於補治痘曰天瘡疹日麻子痘屬五臟疹屬六腑疹宜清涼痘宜溫補先明陰陽次識臟腑補瀉得宜治有何誤貴臨機之通變勿執一以成模塗蔚生曰此篇有難解之處如丁奚哺露與雞胸是也有解未妥之處如腹痛寒侵驚自熱來痘宜溫補是也蓋必腹痛而具有面白唇青之狀始可斷為寒侵也驚是一症風又是一症而驚之與風亦未必俱自熱來痘症亦多有內部實熱未必盡宜溫補也至其所謂疹曰麻子亦宜有別因吾鄉之所謂疹子多是細粒如粟米狀亦有謂其痧子者因其細粒又如砂子也麻子則其形體頗大較痘為劇系痘症中之最危險者也此解是否有當尚希高明指正以色診病陳紫山曰五色多在面吉凶要觀形紅赤多積熱風生肝膽驚面黃多食積唇白是寒侵青黑眉間出黃梁夢里人五聲由肺出肺絶哭無聲氣短咽喉塞喘多醫者驚啞聲熱不退腹痛冷相侵聽罷知虛實存知在耳鳴小兒無脈診吉凶虎口憑塗蔚生曰存知在耳鳴一句難解當缺以待考小兒除生僅數月脈微難診外余俱有脈可憑未可謂之為無脈可診而風氣命三關究為視病之所亦不能執虎口以為憑斷者也陳紫山曰面部氣色為十二經總現之處而五位色青者驚積不散欲發風候五位色紅者傷寒痰積壅盛驚悸不安五位色黃者食積癥瘕疳候痞癖五位色白者脈氣不實滑瀉吐痢五位色黑者臟腑欲絶為疾危惡候面青眼青肝之病也面赤唇紅心之病也面黃鼻黃脾之病也面頰白色肺之病也五臟各有所生細探其色即知其表裡虛實稟賦盈虧其補瀉寒熱之法誠大彰明較著者也塗蔚生曰此節名為講求五位之病而五位中之腎部承漿一位偏未列入未知是作者故意刪去抑是印者遺失至其上節所謂唇白是寒侵亦尚未妥因唇白之人多系血虛也五視法陳紫山曰凡視小兒神氣目色有五一視目色二聽聲音三視囟門四視形容五視毛髮此五者雖不能全若得兩目精神聲音響亮十可保其六七耳視目色夫兩目乃六臟精華所聚一身精華所萃若是睛珠黑光滿輪精神明快兒必長壽雖然加病亦易全愈若白珠多黑珠昏朦睛珠或黃或小精神昏懶此父母先天之氣血薄弱受稟既虧兒多災患也聽聲音凡小兒聲音大而響亮乃六臟六腑氣血充盈兒必易長成人如生來不曾大聲啼哭此必有一臟陰竅之未通神氣之未足或聲如啾唧咿唔之狀此兒必不壽矣視囟門蓋兒前囟門乃稟母血而充後囟門乃受父精而實若前後囟門充實其兒必壽如父之精氣不足耽嗜酒色令兒後囟空虛不實如母之原稟不足血虛病多令兒前囟虛軟不堅好生疾病如父母氣血俱不足其兒必夭若此則父母不能保其天年耳前囟即道家所謂泥丸宮後囟即腦後頂門中名曰百會前後囟門俱不合名曰解顱視形容凡兒口大鼻端眉清目秀五嶽相朝部位相等此乃福壽之基一生無疾若口小鼻短眉心促皺皮膚澀滯雖無病而終夭設或不夭而終貧賤也視毛髮夫毛髮受父母血而成故名血餘也母血充實兒發則色黑而光潤母血虛弱或胎漏敗墮或縱酒多淫兒發必黃槁焦枯或生疳瘦之患壽亦不長之兆也辨小兒五音陳紫山曰五音以應五臟金聲響土聲濁木聲長水聲清火聲燥肝病聲悲肺病聲促心病聲雄脾病聲慢腎病聲沉大腸病聲長小腸病聲短胃病聲遠膽病聲清膀胱病聲微聲清者氣弱也重濁者痛與風也高聲者熱欲狂也聲噎者氣不順也喘者氣促也聲急者驚也聲塞者痰也聲戰者寒也聲濁沉靜者疳也噴嚏者傷風也呵缺者神倦也聲沉不響者病勢危也如生來不大啼哭聲啾唧者夭也既知其聲音又當辨其氣色即知其病之根源矣聞小兒聲音陳紫山曰心主聲從肺出肺絶啼哭無聲多啼肝膽風邪氣緩神疲搐甚音啞邪熱侮脾聲清火毒無侵鴉聲瘛瘲之候實直聲往來而無淚者是痛連聲不絶而多淚者是驚病久聲微煩躁者難愈體縮音促者感寒塗蔚生曰此節與原文少異因原文多有含糊難解之處恐系刷印之誤故略為更改以補紫山之所不逮指紋辨色歌陳紫山曰紫熱紅傷寒青風白是疳黑色因中惡黃色困脾端塗蔚生曰青風之風字原文是一驚字因與風有異故為易去然細推紫山之意其所謂驚字亦即指為風字也余仿此以指冷熱診病說錢氏曰小兒半歲之間有病以名中食三指曲按額前眉上髮際之下若三指具熱感受風邪鼻塞氣粗三指具冷感受風寒臟冷吐瀉若食中二指熱上熱下冷名中二指熱夾風之候食指熱胸膈氣滿乳食不消塗蔚生曰錢氏此法是以食指在上名指在下而細玩其三指具熱感受風邪一層當係一種熱風之症因其下有三指具冷感受風寒也其名中二指熱夾風之候亦當系下熱上寒因其上有上熱下冷一層也尤宜詳者夏月人額與其全體常冷冬月則反是因空氣溫度之高下常依時令為增減而人身之溫度實由與之比較相為寒熱耳病者之溫度固可以病為轉移而不識此亦至有誤以目診病說錢氏曰目內色赤者心實熱淡紅者心虛熱青者肝實熱淡青者肝虛熱黃者脾實熱微黃者脾虛熱白而淚者肺實熱目無睛光者腎虛也塗蔚生曰錢氏此說固確然目內之大眼角紅筋肉是心所屬突脹而色赤者方為心實熱小眼角屬於命門淡紅者相火虛也未可概為心經虛熱目黃雖系實熱之症而濕熱之症究多目黃亦未可只以目黃分為虛熱實熱白珠屬肺白而淚者固為實熱紅而腫者亦系實熱然前者為熱在氣分後者為熱在血分此種精微不可不辨目之黑珠屬肝瞳人屬腎必須瞳人昏暗無光方可斷為腎虛也五臟所屬之症陳飛霞曰肝者足厥陰木也實則目赤大叫呵缺煩悶虛則呵缺咬牙有風則目連眨有熱則目視恍恍成疳則白膜遮睛主怒則性急大叫哭甚則咽腫熱則大小便難手尋衣領手亂捻物甚則撮空摸床此喪魂也兒病時目睛視物不轉或目合不開或哭而無淚或不哭而淚出皆肝絶也心者手少陰火也實則叫哭發熱飲水虛則困臥悸動不安心血足則面色紅潤易養心血虧則面色昏暗難養熱甚則津液干而病渴神亂而臥不寧喜伏臥舌破成瘡又為重舌木舌舌出不收之病凡病丹瘤斑疹蟲疥熛瘡皆心之症也如心病久汗出發潤或舌出不收暴喑不語或神昏潰亂或斑疹變黑皆心病為之也脾者足太陰土也為水穀之海實則困睡身熱飲水虛則吐瀉生風傷脾則為腫為脹為黃為吐瀉下痢脾寒則腹脹脾疳則肚大青筋脾熱則口臭唇瘡飲食不為肌膚吐舌弄舌口乾飲水寒則口角流涎謂之滯頤氣不利則口頻撮虛則肉消而瘦不喜飲食食則成積積則成疳或癖如脾久病大肉消脫肚大青筋或遍身虛腫或吐瀉不止飲食不入或多食而瘦或蟲出於口或唇謇而縮皆脾絶也塗蔚生曰脾實固易困睡而脾虛亦易困臥因其化生之氣既少而孤陰不能獨事動作也脾熱固易飲水而熱亦有虛實之分實熱者大渴引飲飲多而舌苔黃虛熱者津液不能上升飲水自救飲少而舌苔不黃腹脹亦宜分乎寒熱寒濕凝滯固可飲食停滯發生脹滿而火熱澎漲其脹較寒尤甚不過此種診法須看其面色及其舌苔耳遍身虛腫一層當看其能食與否能食則是氣復而血未充尚為吉兆烏可斷為脾絶唇謇而縮須看兼有口開與否方可斷為是否脾絶因上嘴唇之人中屬於督脈下嘴唇之承漿屬於任脈唇縮多是督任二脈絶也肺者手太陰金也實則悶亂喘促虛則哽氣長出經曰寒傷肺由兒之衣過薄也經曰熱傷肺由兒之衣過厚也寒熱傷肺則氣逆而為喘為咳肺受風則噴嚏而流清涕受寒則鼻塞呼吸不利受熱則鼻乾或為衄血或疳則鼻赤爛喘不止則面腫咳不止則胸骨高謂之龜胸燥則渴不止好飲水謂之膈消如肺久病咳嗽連綿喘息不休或肩息或咳血不止或鼻孔黑燥或鼻孔開張而喘或瀉痢不休孔大如筒或面白虛浮上氣喘逆皆肺絶也塗蔚生曰喘促與哽氣各有虛實二證未可止限於喘實哽虛寒熱傷肺雖由於兒之衣過薄過厚然究系間或有之未可作為寒熱傷肺之定論也喘不止則面腫為陰虛而陽無所附亦系陽虛之候因陽明之氣行於面也咳不止則胸骨高謂之龜胸頗難解不知他書亦有此種病名與解釋否然各書具有久咳之病者矣從未見有此病名之確論也胃息亦費解不知其是指胃之停止消化而言抑是另有此種病名瀉利孔大如筒名為脫陰此責亦在少陰厥陰非專在太陰面白虛浮女子此症最甚以其偏於陽弱虛浮則為陽脫於上然必須大病久病之後又兼飲食不進方可斷為陽脫也腎者足少陰水也虛則目畏明白睛多黑睛少顱解不合顏色㿠白骨髓不滿兒必畏寒多為五軟之症尻骨不成則坐遲髁骨不堅則行遲真陽不足則齒遲血脈不榮則發稀心氣不足則語遲熱則出膿生疳如腎病久身下竄目無瞳子如見鬼狀或骨瘻弱臥不能起或二便遺失此腎敗也塗蔚生曰腎陰虛則畏熱腎陽虛則畏寒若僅混為虛則畏寒是其於腎之陰陽未能判別清楚也查腎病無如見鬼狀者其有如見鬼狀之證則為男女具是熱入血室蓋血室為肝經所主而魂陽亦肝經所司也鬼者魄也屬於陰血血死即為魄死魄掩其魂故如見鬼少陰既非肝經所司又焉有見鬼之證發生二便遺失亦未可純斷為腎敗因大便屬於大腸為肺所主而小便屬於膀胱也膀胱既與腎為表裡膀胱之遺溺亦可診腎經之虛敗也簡切辨症法陳飛霞曰小兒熱症有七面腮紅大便祕小便黃渴不止上氣急足心熱眼紅赤此皆實熱證忌用溫補劑小兒寒症有七面㿠白糞青白肚虛脹眼珠青吐瀉無熱足脛冷睡露睛此皆虛寒症忌用寒涼劑塗蔚生曰飛霞此節雖為寒熱症之辨法然必須有二者以上之兼症方可斷為或寒或熱也如僅有面腮紅而不見有便黃便祕等症則恐是傷寒發熱之候本寒而標熱也如僅有眼珠青而不見有糞青白睡露睛等症則恐是肝熱將熾之候本熱而標寒也此等精微何可弗辨辨舌苔法塗蔚生曰舌雖為心之苗而臟腑寒熱之氣無不薈萃於一舌故即一舌之或黃或白或黑或赤而可斷其為或寒或熱或虛或實也舌本屬腎舌尖屬心兩旁屬肝膽中央屬脾胃病在表舌無苔入里則苔結矣苔黃者里有熱也黃而乾枯無津液者熱甚也苔黑而舌燥裂無津液者熱至極也若黑而油潤有津液者此又為寒極似熱忌用寒涼若舌尖紅赤而又有小粒子者此是心熱可用清涼若舌黃赤而舌尖灰白者此為下熱上寒反之則為下寒上熱若滿色白膩而有津液者此為虛寒陰凝可用溫補然苔白而有寒熱往來口苦咽乾者又系少陽熱結可用清解醫者苟於審症不明可用此法以診寒熱至於小兒無識不易開口可在唇下承漿穴掐之使其哭以張口也看病訣陳飛霞曰小兒初生欲知其有病無病以手捻其頭皮摸其頭顱不作聲者為無病以手指探其口雖發聲而從容咂指者有病亦輕若即發聲不咂指面色青紅帶紫或牙關緊急不納乳汁者此落地受寒之甚風邪入足太陽與足陽明而然也須急治之庶可平復初生之兒肥胖色嫩自覺好看者此其根本不堅甚非佳兆且最易感冒風寒邪入腑者近在第二三日見之其症吐乳夜啼腹鳴此皆胎風之類然症猶淺而易治宜用全身燈火十不失一若邪之入臟遠在六七日見之此即臍風噤風撮口之候若口噤舌大痰壅者皆不治蓋病傳入臟繫心脾肺三經也此風氣甚盛無所發泄使形見於喉口牙關聲音也塗蔚生曰初生之兒肥胖色嫩自覺好看此根本不堅甚非佳兆一節恐非定論不知紫山是出自經驗抑是出自別有所本醫者只可作為參考勿遽信為確論可也凡生下時身破裂者死陰囊白者死陰不起者死無糞門者死股門無生肉者死開口如鴉聲者死粉白花色者死皮肉不光者死泣不出聲者死舌如豬肝者死面無彩色者夭臍帶短大紫色者夭生下渾身銀白者夭生下有齒者夭凶主傷父母不然必傷自身生下未裹即撤尿者殺父母蕩家産在世亦終身勞苦壽夭辨陳飛霞曰頭者諸陽之會腦者髓之海也凡兒頭角豐隆髓海足也背者五臟六腑俞穴皆附於背脊背平滿臟腑實也腹皮寬厚水穀盈也目為肝竅耳為腎竅鼻為肺竅口為脾竅七竅無缺形象全矣故知肉實者脾足筋強者肝足骨堅者腎足不妄言笑者心足不多啼哭者肺足哭聲連續者肺實不久眠睡者脾實兼之腳健而壯項長而肥睛明而黑根株固也肌肉溫潤榮衛和也唇鮮發黑二便調和表裡實也小便清長大便滋潤裡氣實也以上皆為壽相其兒易養諸陽皆起於頭顱破項軟者陽衰於上諸陰皆起於足踹小腳踡者陰衰於下鼻孔乾燥肺枯唇縮流涎脾冷發稀者血衰項軟者柱折青紫之筋散見於面者多病風熱兼之形枯色灰者表虛瀉利無時者裡虛瘡疥啼哭多笑語者皆陽火妄動之候以上皆為夭相其兒多病者難養凡聲音清亮者壽有回音者壽哭聲澀者病散而無聲者夭塗蔚生曰飛霞諸陽皆起於頭及諸陰皆起於足二語是其循末失本未知陰陽化生之源者矣蓋氣即陽生於下而聚於上頭則其薈萃之所耳陰即是血生於上而聚於下足則其歸宿之處耳惟其陽生於下故三陽之膀胱大腸等腑多半生自下部與臟陰之下惟其陰生於上故三陰之心肝等臟多半生自上部與腑陽之上然諸陽雖生於下而無陰以濟之則不能滋其化生之源故衆陽之間而腎臟一陰生焉諸陰雖生於上而無陽以啓之則不能成其化生之本故衆陰之間而膽腑一陽生焉小兒壞證辨陳紫山曰眼生赤脈貫瞳人水火兩絶也囟門凸起又作坑指甲黑色肝絶也鼻乾燥肺絶鴉聲肺絶忽作肚青筋脾絶虛舌出口心絶咬牙齒咬人腎絶目多直視不轉睛肝絶魚口脾絶氣急啼不得肺絶蛔蟲既出脾胃俱絶死形真手足擲搖直手節靈丹妙劑也無生塗蔚生曰赤脈屬火瞳人屬腎赤脈貫於瞳人乃火盛水枯水被火克也然赤脈其苗葉肝腎其根本必根本萎敗而後始有此現象也囟門腎之屬而腎之陰液所以能至於囟門者則又全賴督脈真陽之氣輸達於上囟門凸起者陰虛而陽無所附也然使真陽能以久存則其幸免之望猶可設想今凸起而又作坑是陰竭而陽亦陷其為壞症可知矣甲黑固屬肝絶然病非有素設為暴得中惡霍亂等症猶未可斷其即為壞證因感受疫癘不正之氣或暑熱之毒每多血脈凝聚而見甲爪黑色也經云手足為諸陽之本然手足三陽實根據於臟腑臟腑之血液虛竭則筋絡無所滋養故擲搖而有節直也然猶恐系猝得之中風等症此等危症最宜審慎斷小兒面色惡症死候陳紫山曰齒如黃豆骨氣絶一日死面青目陷肝氣絶二日死鼻入奇輪肺氣絶三日死面黑耳黃呻吟腎氣絶四日死面上死筋心氣絶五日死口張唇青色枯脈絶六日死面白四肢腫脾絶九日死大凡病耳足跌腫大小便不禁皆死候也忽作鴉聲者大腸絶不治魚口氣粗出而不返者是肺絶不治肝藏血目乃是肝之外應爪甲青黑血脈不蔭及目無光彩筋縮則兩手抱頭是肝絶不治眼睛屬腎腎有兩筋自脊背至腦門貫其二睛腎絶兩目向上目不動者不治腎乃骨之主腎絶則齒癢咬牙咬人者不治鼻乃肺之外應孔乾黑燥是肺絶不治唇乃脾之外應唇縮而不蓋齒者是脾絶不治胃主肌膚四肢胃絶則毛髮豎手足不能收管者不治四肢汗出如油是榮衛俱絶陰陽離津液散四肢如黏膠者不治頭偃於後天柱骨痿心絶頸骨不載不治或以為五軟非也心主血舌乃心之外應舌短則語不明心絶則血不流行身不溫暖及囟門凸起或陷作坑目多直視是皆不治飲食不歇是肺胃俱絶其水直下大腸中去必死痢如死鵝血者是心絶或臭穢如糟湯血水者不治凡有頑涎出口鼻者是風痰以塞關竅血脈不行不納湯藥者不治心寒者脈絶也故令肺脹不治喉如曳鋸口吐白沫是風痰閉竅面色青黑五孔乾燥不治以上諸症是臟腑俱敗榮衛相離氣脈不生皆不治之症同有其症而救之十或一二者也塗蔚生曰鼻入奇輪究系何狀義未詳當缺以待考面黑者為水被火克血質敗絶而現餘燼如物質被焚只見其焦黑之色也口屬於脾口張即是魚口脾絶之徵非脈絶與肺絶也眼本肝系而瞳人則屬於腎若謂腎有二系貫睛則誤唇雖為脾所屬然上唇之人中則為督脈結穴下唇之承漿則為任脈結穴若上唇縮而口開則督脈絶下唇縮而口張則任脈絶俱非脾絶者也至頭偃於後在平時則為五軟若在大病久病之後則為督脈絶因脊屬於督而腎陽則假督脈貫脊髓以上行也入門試法陳紫山曰男左女右看關紋時即掐中指節舌出者死吸而痛者生如久不醒掐中指咬崑崙穴醒者吉不醒者凶塗蔚生曰以上摘取認證精華以為醫治小兒標本於大體固似略備然醫不厭精理則務求其微症不厭詳用則務貴其周茲特舉唐容川先生所著之內經病極數則以為補助庶使其理愈勘而愈明用愈靈而愈妙五臟所傷唐容川曰人必臟腑氣血先有虧損然後生病故論病機先言臟腑所傷經曰憂愁思慮則傷心唐容川曰心為火臟火氣宣明則能化生血液流暢筋脈血脈流行則其志常喜若反乎喜而為憂愁思慮則心氣遏抑心火鬱滯故傷心也治宜宣通心陽通暢血脈又常以喜勝憂慮斯愈矣塗蔚生曰唐容川先生為近代醫學名家其祖述著作雖宗自內經仲景諸書而其闡發奧旨頗多心得獨妙之處其間有未到之處豈其識力果未及耶夫亦曰智者千慮必有一失耳如此條曰憂愁思慮則心氣遏抑火鬱血滯故傷心也此解未免失之過拘不能精當蓋心為火臟化生血液主宰一身凡百工作出焉如遇有難於辨理之事或感受環境困難則不得不憫然而憂愁戚然而思慮冀其想出辦法設遇終無辦法而猶未肯置之度外再四思維終冀想出辦法才好此亦人情之常無足怪者豈知思慮一刻不息則心火一刻不息心火一刻不息則腎水之被煎熬亦一刻不息以有限之腎水供無限之火化其不為源泉涸竭也幾希然腎水停其接濟則數點心中之陰液亦自相灼爍逮其灼爍已極只剩一團火熱而已其為傷也可知故凡治思慮過度之藥多系滋陰降火之味如生地元參知柏芩連二冬等味是也至於宜以喜樂勝之此其以情相治而非以藥相治者也是使其多解一刻之愁慮則為多保一線之腎水即多保一線之心血矣小兒雖無憂愁思慮其外感之熱不解內蘊之火不清亦與憂愁思慮無異不過此種火熱斷非喜樂所能調劑耳治之者又貴權宜經云形寒飲冷則傷肺唐容川曰肺金畏火自然懼熱此又云畏寒冷者何也蓋肺之體雖是陰金而肺之用實主陽氣氣布於外則為衛氣以充皮毛若衣服失宜外形受寒則皮毛灑淅漸入腠理發熱動飲為咳喘等症治宜溫散氣布於內則為宗氣以司呼吸散津於脾下輸膀胱若飲水漿瓜果之屬多受冷氣則陽氣不能布化水飲停積為咳喘癖痛等症治宜溫降塗蔚生曰形寒是外以寒傷肺飲冷是內以寒傷肺外寒何以傷肺蓋肺為華蓋外主皮毛內部臟腑所化生之陽氣無不朝聚於肺使之散布毛空皮膚間以御外之寒氣若外而衣服太薄受寒過甚內元不能抵抗則外寒由皮毛而腠理而內部則內部之熱氣亦同化為寒而為咳嗽者矣既形咳嗽則向之元氣上衝於肺者此時亦復上衝於肺矣沖咳至極肺故受傷然此外寒傷肺猶真正面者也若其底面此為外寒鬱於皮毛腠理之間而內元不能外出同化為熱上爍肺陰發生咳嗽逮咳嗽已久而肺金豈有不受傷者乎若夫飲冷傷肺則為冷水凝於脾胃胃陽不能消化上衝至肺發生咳嗽而使肺臟受傷者也容川僅解為陽氣不能布化尚缺明瞭經云悲怒氣逆則傷肝唐容川曰悲者肺主之過悲則金來剋木木不能達怒者肝主之過怒則肝木橫決血不能靜二者皆氣逆也肝乃主血之臟血之所以流行不滯潛伏不動者全賴氣之和平有以配養此血耳今其氣逆則肝逆肝木鬱於下肝火犯於上而肝受傷矣悲則肝木鬱於下宜辛以升散之怒則肝火犯乎上宜苦以降之然總以養和神得其平為妥塗蔚生曰血生於上而行於下氣生於下而行於上然血之運行全賴氣之運行為轉移若氣有奔溢則血亦隨之而奔溢氣有停止則血亦隨之而停止今肝為陰臟多血少氣氣既怒逆奔上則其所多者將受他多之支配而胡行亂竄矣氣縱可平怒縱可息亂竄之血豈可使其盡行復原乎不可復原則血受一分之損失即肝受一分之暗耗也肝受暗耗即為受傷治之之法宜平其氣而養其血昧者不知平肝之旨以為攻伐之謂是未真知平肝者也容川以氣逆則肝逆肝木鬱於下肝火犯於上而肝受傷此解尚屬空泛因郁與怒少異縱鬱怒合一亦系肝之本體未有若何上下之分也或曰下上之分就此較而言仍指肝之本體立說然肝木鬱於下肝火犯於上又何會傷肝傷肝又為何苦此非空泛者乎小兒雖少悲怒之事然受大人之責打父母之放置亦即怒之一端也悲字解見前無另述經云飲食勞倦傷脾唐容川曰飲所以潤脾過飲則停飲為濕發為脹泄痰咳之症土能治水而反為水所困也宜滲利食所以養脾過多則停食為泄為滿脾能化食而反為食所困也宜消導脾主肌肉勞以運動肌肉使其活潑乃益得安然勞至於倦必致消瘦發熱蓋動而生陽傷脾之陰故肌肉反受其病治宜填補靜養塗蔚生曰谷質堅硬全賴脾陰之柔以化其堅水汁柔軟全賴胃陽之剛以化其柔容川已曾言之矣但吾人之脾胃消化力各有定量設也已盡其量而又強飲之強食之則脾胃用力太過定至於傷脾胃既傷而後飲食始停是積濕發為脹泄痰咳之症停食發為泄滿之症尚在脾傷之後也至於勞倦傷脾則又系脾之疲於供命者也何則人之所以能作事者由於飲食入胃化生氣血流行肢體而後精神充足也水穀之輸入者雖未嘗一一刻不息而脾胃之消化則未嘗一刻稍息其氣血之供給於肢體者亦未嘗一刻稍息也若外無所入內無所化肢體無所接濟則不覺精神困敗而疲倦矣然外雖勞倦而動作未必即止消化未必稍息倉廩空虛自相摩擦其傷可知試觀安逸家多肥胖勞動家多消瘦可知又試觀吾人勞動過度時不能飲食必待精神恢復原狀時而後能飲食可知小兒飲食傷脾固多勞倦傷脾甚少因其少形疲勞即知休息者也經云久坐濕地強力入房傷腎唐容川曰腎中之陽能化濕氣則水達膀胱氣行肢脊若久坐濕地則濕氣太甚而腎陽反受傷必生肢節腫疼等症治宜燥之腎中陰精充足無損則能種子入房乃其常事若力已竭而猶勉強入房則陰精枯矣治宜滋補塗蔚生曰濕凝於下固傷腎陽然濕久成熱亦可發生溺赤淋濁等症小兒無識最易久坐濕地故亦發生溺赤淋濁等症昧者不察以為小兒腎無暗耗那有溺赤淋濁等症是其未知濕久成熱之理也五臟所惡庸容川曰五臟各有氣化即各有性情有性情即有好惡知其所惡即知治之之法經云心惡熱唐容川曰世傳五臟辨法謂肝熱筋灼驚癇瘛瘲肺熱咳嗽氣上口渴脾熱肉消便祕潮熱腎熱骨蒸精枯髓竭又上焦熱則心煩口渴頭暈目痛中焦熱則飲食減少腫脹瘧痢下焦熱則小便不利大便失調熱之見症雖不一而總之歸於心徑蓋心為火臟凡是火熱皆心所司心化血以養火則火不亢而熱除若火太亢則心血受傷故心惡熱凡治熱證無不用苦藥所以治心之火也西醫見熱病即以冰置胸前此熱輕者可以立刻撤去若熱重者外被冰阻則熱反內攻為熱毒伏心而死現在香港瘟症為西醫十治十死皆此之故也所以港人逃避然則西醫亦當知所變計也塗蔚生曰食物入胃谷之精華為液經心火化而始為血設火熱太甚液不敷用則火自煎灼心反受傷如釜底著薪本是熟物之計然釜中無水火煎其釜其釜亦終歸破壞此即心惡熱之義也經云肺惡寒唐容川曰肺氣如天居至高布陽氣故在外則皮毛畏寒恐傷其衛外之陽在內則胸膈惡寒恐傷其布護之氣寒傷皮毛發熱咳嗽寒傷胸膈停飲痹痛經云肝惡風唐容川曰肝木主風而即惡風蓋血得和氣則流暢血得邪氣則消灼凝結老人中風小兒驚風一切風濕麻木瘙癢痙癇蓋無一不當治肝即無一不當養血誠以風乃陰中之陽血中之氣故為風能鼓蕩其氣亦惟血能調養其風塗蔚生曰驚是一病風又是一病豫後之驚風談已詳風者多以驚以其風邪外閉內熱不得外出擾亂心神使之不安或出汗過多血燥火旺也驚者未必似風以其猝受驚駭喪失魂魄而僅見一種驚惶不安之象也間有先受驚而後受風者亦不過百分中之一二耳安得遽以驚風並稱混而為一作俑者既不徹底澄清含糊論道而附和者又不循名查實信口讚揚遂使驚風之毒流遍全國迄今莫改殊屬可恨至風為陽邪之說容川亦曾直斥他人之非至是而率然言之亦忘其所是耳經云脾惡濕唐容川曰飧泄洞泄痞滿腫脹水飲等症皆是濕氣有餘脾土不能克化五行惟土製水土勝則水受制水勝則土無權故脾能治濕而反惡濕脾居油膜之上膜屬三焦行水之道油屬脾水過油則滑利不留此即脾所以制水也若水太多則油反受其浸漬當分寒濕以燥利之經云腎惡燥唐容川曰腎主藏精下通水道上發津液總系陰精之所運化者燥則傷其陰精骨髓枯津液少水道乾澀必用滋潤之品庶幾腎水得養又曰以上二條經文最簡略然包括之病甚多但能觸類引伸便可通一畢萬臟腑為病唐容川曰五臟六腑病形百出各有自為之病形以為證據如心為噫非心只有噫之一症謂無論何證但見噫氣則知屬於心矣余防此經云心為噫唐容川曰噫者胸中結氣哽之使出俗說是打嗝頓非也打嗝頓與噫音義不符打嗝頓是氣厄於胸而出於口故名曰厄二者均病在胸前屬心之部位故皆屬心經柿形象心而蒂苦澀治厄降心氣也胸滿噫氣乃是肺胃痰火仲景旋覆麥冬治之而必用赭石破心血鎮心氣也久病聞厄為胃絶則以其火不生土心氣逆也心病不止一噫然見噫氣便知屬心用藥乃知方向經云肺為咳唐容川曰五臟六腑皆有咳證而無不聚於胃關於肺蓋肺主氣管氣管中非痰飲即風寒火燥令其氣逆故咳有從皮毛口鼻入氣管者有從腸胃膈膜入氣管者當分頭治之按齁咳二症道路不同鼻主吸氣齁字從鼻是吸入之氣管不利咳字從缺缺者口氣下垂也口主出氣是呼出之氣管不利此管在胸膈故每咳必胸前癢滯詳三焦條經云肝為語唐容川曰譫語屬陽明燥熱鄭聲屬心神虛恍蓋燥熱乃木火剋土神恍乃肝魂不清因而心神擾惑故皆宜瀉木火安魂也塗蔚生曰陽明燥熱上熏肝臟魂不能安發而為語是語自成之肝病之發自胃而肝為本胃為標也容川必執定燥熱乃木火剋土為解未免過於黏滯經云脾為吞唐容川曰脾主化谷生津凡口中津液少者時常作吞引之狀反吞為吐又是水穀不下之故皆屬於脾病可以互勘經云腎為缺為嚏唐容川曰缺者陰引陽入故呵缺至而欲寐嚏者陽引陰出故噴嚏出而人醒二者皆根於氣海故腎病見此二症經云胃為逆為噦為恐唐容川曰陽明主納其氣以下行為順氣逆則反其令也衝脈隸於陽明沖逆亦屬陽明噦者吐穢惡之氣也吞酸噯腐之類皆反其納物之令也恐者腎所主腎水動而胃土不能治之故恐亦主胃經云大小腸為泄唐容川曰泄多是脾胃中焦之症然總是出於大小腸之病小腸屬火以化谷火虛則食穀不化而飧泄大腸屬金以燥糞燥氣不足則糞溏泄小腸火甚則又膠結為痢大腸燥甚則又祕結不便此又為泄之變態也經云下焦溢為腫唐容川曰三焦乃決瀆之官前已詳注此但云下焦者因上焦連心肺中焦連脾胃多兼脾胃心肺之症尚非三焦專責惟下焦當膀胱上口為水入膀胱之路此處不利則溢於上達於外而發水腫下焦屬腎屬肝治宜疏瀉肝腎又肺居高能御下主通調水道非開利肺氣不能治也塗蔚生曰三焦者乃上中下三焦之油膜連網也臟腑內外無不以此膜絲相連繫若下焦油膜不利則水不能滲至膀胱順此膜絲外溢為腫然腫不僅先自下起有先自頭面者有先自四肢者張師仲景有腰以上當發汗腰以下當利小便之旨欲盡治腫之能事非參證各家不為功經云膀胱不利為癃不約為遺溺唐容川曰膀胱下為溺管溺管淋澀不通為癃肺主水道由肺氣閉則宜清利肝脈繞莖由肝血滯則宜滑利據西醫之說以為溺管腫塞究之皆肺肝兩端所致也又溺管之後為精竅精竅有敗精死血亦能擠塞溺管法當利腎夫肺以陰氣下達膀胱通調水道而主節制使小便有度不得違礙肝腎以陽氣達於膀胱發蒸水氣使其上騰不得直泄若陽氣不能蒸發則水無約束發為遺溺治宜為溫胞室蓋膀胱如釜胞如灶溫胞室者釜底添薪也經云膽氣鬱為怒唐容川曰膽者木生之火也西醫論膽專言汁不知有汁即有氣故內經均以氣立論木氣條暢火氣宣達則清和朗潤其人和平若木鬱生火火鬱暴發則為震怒凡病之易怒者皆責於膽氣又曰臟腑之證不一而足舉此為驗任其形證百變均莫得而遁情矣諸病所屬唐容川曰屬者統屬也知其所屬則綱領既得而其條目可例求矣經云諸風掉眩皆屬於肝唐容川曰肝為風臟凡風病皆屬於肝諸風謂中風傷風驚風癘風之類所賅之症多矣掉謂轉動凡猝倒驚癇抽掣搖戰之類皆是肝主筋此皆筋之為病也眩是昏暈凡昏花妄見頭目旋轉皆是肝開竅於目故有此病也西醫謂目眩惑昏花痙癇抽掣皆腦氣筋為病謂目系通腦故昏眩腦氣用力太過則肉縮伸抽掣究問腦氣何故病此則西醫茫然豈知肝脈通於腦開竅於目而主筋凡西醫所謂腦氣皆肝脈所司而脈筋所以致病則又肝風所致也故凡眩掉皆屬於風而諸風為病總屬之肝徑云諸寒收引皆屬於腎唐容川曰腎司寒氣故凡寒證皆屬之腎腎又主骨腎陽四達則骨體舒展舉動輕便若肢骨拘急而收曲或軃緩而引長皆骨不為用也須知拘收引軃與抽掣縮短者不同一是寒證一是風證塗蔚生曰腎有二枝生於第十四脊椎下左右各一枝中以油膜相連名曰腎系腎系穿過之中間脊椎名曰命門蒸發陽氣敷布周身然此火不自蒸發必得腎陰之助而後始能蒸發蓋一陽生於二陰之下成為坎中滿之象也亦猶火車之設置汽匱必先設置火池水鍋而後火煎其水汽入於匱能以任重致遠也若吾人之火旺水盛則有此健壯水火即有此強盛之元氣充溢周身自無寒縮之症蓋其由腎系而生出脅下之板油少腹之網油中焦之膜油上焦之膈膜周身之腠理無不以此水火充足光輝四映也常見胖人怕熱以其水足火旺元氣寬裕網膜之油汁充足也又常見瘦人怕冷以其水虧火耗真陽化生過少而網膜之油汁缺缺也然過於虧損又見其孤陽無依發生潮熱骨蒸等症也至於腎水充足腎火衰敗純屬腎陽之虛而惡寒者此則不過十分之一二耳然任其所好過食生冷或曾患熱證過服寒涼亦足減其真陽之勢也世之所謂小兒為純陽之體者純屬謬誤之談經云諸氣膹郁皆屬於肺唐容川曰五臟六腑之氣無不總統於肺以肺為氣之總管也故凡治氣皆當治肺肺主皮毛膹是氣之乖於皮毛者膹膗也說文謂形惡如紫癜班瘤黑痣疱鼻之類西醫謂毛孔下有油核其管直通皮膚若面生黑刺即管塞之故此即內經膹膗之說也郁是氣遏於內不得舒發也見病如氣逆痰滯血結便閉之類是氣之乖於腹內者郁與暢反肺氣不暢故郁宜散降之經云諸濕腫滿皆屬於脾唐容川曰腫在皮膚四肢滿在腹內脹塞皆濕氣壅滯水下不行停走於膈膜中也然濕症尚不止此故曰諸濕或頭目昏沉或瘧暑泄痢或周身痹痛或痰飲痃癖皆屬脾土不制水所致蓋脾生油膜之上膜是三焦主水道油是脾之物油不沾水此脾所以利水也若脾之油失其令則濕乃得藏匿故治濕責之於脾塗蔚生曰查容川之少陰少陽補論曾言腎合三焦三焦根於腎系謂上中下之三焦油膜全由先天腎臟所司至此而容川言膜是三焦主水道油是脾之物得勿有相背謬者乎曰人之未生是以先天生後天人之既生是以後天生先天脾土生於油膜之上是火生土先天生後天之義也水遇油而滑利者是土剋水之義也五行互相為生亦互相為克脾土雖生於油膜之上油膜是腎系所發而膜之所以能致有油油汁充足光輝明亮者則由於脾胃健壯飲食增進是脾腎二者得勿二而一一而二乎經云諸瘡痛癢皆屬於心唐容川曰此言諸瘡或血分凝結阻滯其氣氣與血爭則痛血虛生熱兼動風氣風火相煽則癢皆屬心經血分為病治宜和血又凡病不幹血分皆不發痛故痞膨腫等均不痛凡是腹痛蓋無不關於血分故皆屬心經云諸熱瞀瘈皆屬於心唐容川曰諸熱謂發熱惡熱瘟暑等症瞀謂眼目昏花黑眼見鬼等症瘈謂筋不得伸抽掣等症皆屬於火者蓋諸熱是火傷氣分火克肺金也瞀是心神擾惑視物昏亂火屬心心藏火擾其神故瞀瘈是肝筋為火所灼無血養筋故縮扯瘈與軃緩不收有異當辨之經云諸厥固瀉皆屬於下唐容川曰厥謂四肢逆冷固謂腹中瘕積如寒症之類瀉謂下痢不止皆屬於下者謂屬於下焦腎經也腎陽不能四達則厥腎陽不能上升則瀉腎陽不能化氣則固結故皆屬於下宜溫之也塗蔚生曰容川解此節厥固瀉三症謂皆屬於下焦腎陽虛寒是未免得半失半蓋有腎陽不能四達之虛寒厥症亦有腎火遏伏內閉之實熱厥證也有腎陽不能化氣之虛寒固症亦有腎火亢烈血結之實熱固症也有腎陽不能上升之虛寒瀉症亦有腎火盛旺陰虛之實熱瀉症也若遇厥固瀉等症概謂虛寒一味溫補未免誤事不少經云諸痿喘嘔皆屬於上唐容川曰痿有兩症一是肺痿肺葉焦舉不能通調津液則為虛勞咳嗽一是足痿脛枯不能行走則足痿然未有足痿而不發於肺者益肺主津液由陽明而下潤宗筋足乃能行肺之津液不行則宗筋失養故足痿雖見於下而亦屬之上焦也喘屬肺之呼不利嘔屬胃之飲食氣逆肺胃均屬上焦上焦屬陽多病火逆宜清之也塗蔚生曰容川之痿發論分脈痿津痿治之而此處解痿只有肺痿足痿二者似相歧異然查其痿之所成不外於津液乾枯藥之所治不離乎滋陰潛陽是二而一也至其所謂喘屬肺之呼不利則未免失於精當蓋喘有虛實二者虛者由於下元虧損化生之氣短少而肺無所充裕也治之之法宜補其氣以定喘經曰損其肺者益其氣即此義也實者化氣太甚而肺部壅塞也治之之法宜降其氣以定喘經曰高者抑之即此義也若夫虛實之夾寒夾熱則又在乎醫者隨症以為加減也至其所謂嘔屬胃之飲食亦是一間未妥蓋嘔亦有虛實二種其虛而夾熱者則由於膈氣空虛熱欲侵入胃陽也治宜清補其實而夾寒者則由膈氣滯塞寒欲侵入胃中也治宜溫暖如欲盡治喘嘔之能事宜參觀後之喘嘔條經云諸禁鼓栗如喪神守皆屬於火唐容川曰禁謂口齒禁切噤口痢痙病口噤之類鼓栗謂鼓戰栗如瘧疾手足搖戰之類如喪神守謂譫語百合病恍惚不安之類蓋熱極反寒之象火擾心神之徵皆宜治其火也經云諸痙項強皆屬於濕唐容川曰寒濕則筋脈凝熱濕則筋脈脹故皆能發痙與項強之症經云諸逆衝上皆屬於火唐容川曰諸逆謂吐咳嗆嘔等症凡是衝脈氣逆頭目咽喉胸中受病均繫心肝之火挾衝脈上逆也宜抑之塗蔚生曰此證務宜查其形色熱確與否因咳吐嗆嘔等症尚有虛寒之一種症治也富家之兒以其溺愛過甚衣被過厚每易發生此症而即得此症之後復自信參耆可以治吐咳姜夏可以治嗆嘔冒然與之卒至愈治愈劇死於非命是何愚之甚也經云諸脹腹大皆屬於火唐容川曰諸脹謂腹內脹滿腹大謂單腹脹此證是肝不疏瀉則小便不利水停為脹脾不運化則單腹脹皆屬於熱者屬於肝木乘脾也然此與上節火字有別火屬血分熱屬氣分熱則氣分之水多壅故主脹大經云諸躁狂越皆屬於火唐容川曰躁謂煩躁狂謂顛狂越謂升高逾垣凡此皆三焦與胃火太盛而血氣勃發也經云諸暴強直皆屬於風唐容川曰強直僵仆倒地暴者猝然發作風性迅速故能暴發凡風均屬之肝肝屬筋脈風中筋脈不能引動則強直矣風者陽動而陰應之矣故風具陰陽兩性中風之陰則為寒風中風之陽則為熱風無論寒熱均有強直之證宜細辨之經云諸病有聲按之如鼓皆屬於熱唐容川曰此與腸鳴不同腸鳴則轉氣功痛下泄屬水漬入腸發為洞瀉是寒非熱也此有聲乃在人皮黑膜內連網油膜之中凡人身連網油膜均是三焦乃相火之府行水之道路也水火相激往往發聲但其聲綿綿與雷鳴切痛者有異按之亦能作聲又拒手如按鼓皮以其在皮膜間故按之如鼓是三焦之火與水為仇故曰皆屬於熱蓋三焦為行氣之府氣多則能鼓吹其膜中之管使之有聲如西洋象皮人搦之則出聲是矣經云諸病跗腫疼酸驚駭皆屬於火唐容川曰跗足背凡足腫皆發於厥陰陽明兩經陽明之脈行足背厥陰之脈起足大指叢毛內踝肝木生熱壅阻胃經之濕則循經下注而發足腫極痠痛也酸字頗有實義西醫云凡腳氣必胃中先釀酸水繼而尿中有蛋白形尿亦發酸乃髮腳氣腫病但西醫未言所以致酸與因酸致腫之故惟內經理可互證經云肝木在味為酸蓋木能生火木能剋土土不化水火又蒸之則變酸味是酸者濕與熱合化之味也羹湯夏月過夜則酸濕遇熱也冬月則否有濕則無熱也知酸所以致疼腫而腳氣可治也又凡乍驚乍駭皆是肝經木鬱火發魂不藏之故是以屬於火經云諸轉反戾水液渾濁皆屬於熱唐容川曰轉者左右扭掉也反者角弓反張也戾如犬出戶下其身曲戾即陽明痙病頭曲至膝也水液渾濁小便不清也轉在側屬少陽經反在後屬太陽經戾在前屬陽明經水道在膜膈中屬三焦經皆屬於熱是水液渾濁固屬三焦之熱而諸轉反戾亦多同屬三焦矣三焦網膜西人謂之連網由內連外包裹赤肉兩頭生筋以貫赤肉筋連於骨節故利曲伸觀此則知轉反戾是筋所牽引實則網膜伸縮使然故內經與水液同論以見皆屬三焦網膜中之熱也西醫乃謂抽掣痙等發於腦筋不免求深反淺故西人無治之之術也塗蔚生曰三焦網膜之熱固能使筋所牽引以致諸轉反戾然養筋者血也使血不致為熱所灼而乾枯則熱又何至爍筋而牽引是治此病之初只宜清熱而見有外症者亦須解外逮至三五日後宜兼養血以顧其本小兒此症頗多最宜審慎切不可以其反戾諸狀疑為俗謂天吊諸驚亂投驚風之藥以致夭札經云諸病水液澄徹清冷皆屬於寒唐容川曰下為小便上為涎唾其道路總在三焦膈膜之中無論何證但據水液有澄徹清冷之狀即是三焦火虛之候故曰皆屬於寒經云諸嘔吐酸暴注下迫皆屬於熱唐容川曰嘔謂乾嘔是火逆也吐有寒症吐酸則無寒症暴注下迫裡急後重逼塞不得暢俗名痢症皆屬於熱者屬於肝經之熱也肝火上逆則嘔吐酸肝火下注則痢下迫因肝欲疏泄肺欲收斂金木不和故欲泄不得且痢多發於秋金剋木也塗蔚生曰暴注下迫似宜分作兩條暴注者便系溏稀之物勃然下瀉熱甚洶猛毫無艱難阻止之狀也下迫者便系膿血之物情急欲出至下而滯壅遏塞止之狀也一則由肝火之發一則由於金性之收然非內有積熱皆不至此不過暴注之色多系深黃黑色或是一種赤血水耳唐容川曰病機百出未能盡録但舉其凡以例其餘四時所病唐容川曰四時各有主氣客氣五方強弱之異茲所舉者不過明臟腑氣應與天時並行之義耳醫者多隅反經云春善病鼽衄唐容川曰鼽是鼻塞流涕衄是流鼻血鼽屬氣分春陽發泄為陰所閉則鼻塞不通治宜疏散其寒衄屬血分春木生火動血上衝干犯清道鼻為肺竅木火侮肺故發衄治宜清降其火善病者謂多此種也塗蔚生曰春季界於冬寒夏熱二者之間人當此際最易疏忽以其時令略為和暖可以少受寒亦可以少受熱故鼽衄二症此時為多容川衄血之解尤為有見經云仲夏善病胸脅唐容川曰胸是兩乳中間屬心肋是兩乳旁邊屬三焦心是君火三焦是相火皆與夏氣相應故仲夏善病胸脅以火有餘多發逆滿也經云長夏善病洞泄寒中唐容川曰長夏未月濕土主氣脾主濕而惡濕濕甚則發洞瀉陽極於外無以溫養中土故發寒中之病觀冬月井水溫夏月井水冷則知夏月中宮多寒矣塗蔚生曰此節是由熱而病寒上節是由熱而病火兩節恰是一個對字容川此解是未免過泥時令而不能揆諸人情衡乎事實者也蓋長夏熱之最盛者也惟熱最盛故人亦惡熱最甚於水果生冷之物每多任意吃啖以求御熱避燥逮其身體清爽之意孰知內之陽火有限而外之物欲無窮旦旦而伐之其不為陽火衰敗也幾希逮至胃寒既成則水穀當然不能消化發生洞瀉寒中等症夏日偏多痧症霍亂之症亦即此理若謂脾主濕而惡濕濕甚則洞瀉陽極於外無以溫養中土故發寒中之病是人之胃陽因外之陽熱過甚變而寒矣然吾人之一呼一吸純與外陽相通豈有外陽既熱而吾人吸入之氣尚為陰寒者哉吾故曰夏月洞瀉寒中全由過食生冷之故至謂冬月井水溫夏月井水冷此則由於井水與空氣之比較使然實則井水常一也不過空氣有寒熱而吾人之手指始覺有冷暖耳經云秋善病風瘧唐容川曰風屬肝瘧屬少陽因風致瘧本系木火為病而多發於秋令者木火侮金也蓋秋當肺金主氣之時金氣清肅則皮毛自斂腠理自和設風氣鼓動則為皮毛不得斂而發寒熱風火相煽則腠理不得和而戰栗溺赤知此理者可得治瘧之法也塗蔚生曰風是傷人瘦肉一層瘧是居人腠理一層腠理尚在瘦肉外何以因風致瘧蓋因風未能解散清楚而逆居於腠理之間也昔黃帝問於岐伯曰夫風之與瘧也相似同類而風獨常在瘧得有時而休者何也岐伯曰風氣留其處故常在瘧氣隨經絡沉以內薄故衛氣應乃作是風自風而瘧自瘧不可因風以及瘧也然岐伯又曰先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧其但熱而不寒者陰氣先絶陽氣獨發則少氣煩冤手足熱而欲嘔名曰疸瘧是瘧有因風者有不因風者未可以類推也如欲盡治瘧之能事須參觀內經之瘧症論與後集之瘧疾症治方可胸有成竹不致誤事經云冬善病痹厥唐容川曰痹是骨節疼痛厥是四肢逆冷腎中陽氣能達於骨節充於四末則無此病冬令寒水氣盛往往腎陽不足故多此病唐容川曰四時之病不一而足則此種為多且知其理而一切非時之病理皆可識臟腑通治經云心與膽通心病怔忡宜溫膽為主膽病戰栗顛狂宜補心為主唐容川曰舊注君相二火一氣相通此解通字與以下各通字不合蓋所謂通者必有相通之道路唐宋後憑空說理不按實跡西醫雖詳形略氣然如此等道路非借西說不能發明西醫云人之臟腑全有連網相聯其連網中全有微絲管行血行氣據此則知心與膽通其道路亦在膜網之中蓋膽附於肝繫著脊上循入肺系連及於心膽與心通之路即在其系中故心病怔忡宜溫膽膽病戰栗顛狂宜補心非空論矣又溫字補字有辨經言溫之以氣補之以味內經言以苦補心是瀉心火即是補心以益其陰也溫之以氣是益其陽也經云肝與大腸通肝病宜疏通大腸大腸病宜平肝經為主唐容川曰肝內膈膜下走血室前連膀胱後連大腸厥陰肝木又外繞行肛門大腸傳導全賴肝疏瀉之力以理論則為金木交合以形論為血能潤腸腸能導滯之故所以肝病宜疏通大腸以行其鬱結也大腸病如痢症腸風祕結便毒等症皆宜平肝和血潤腸以助其疏泄也經云脾與小腸通脾病宜泄小腸火小腸病宜潤脾為主唐容川曰西醫圖繪脾居連網之上小腸通體皆與連網相附連網中均有微細管相通據此則內經所言道路顯然西醫不知內經妄抵軒岐以為未見臟腑此不足怪獨怪中國趨好洋學舍古聖之書而弗深考豈不謬哉脾病多是小腸之火蒸動濕氣發腫脹作瀉滿小便渾濁故當瀉小腸至於小腸所以化物不滯全賴脾濕有以濡之西醫所謂甜肉汁入腸化物是也故小腸病痢及祕結闌門不開膈食等症皆宜潤脾塗蔚生曰心為丙火而生胃陽之戊土小腸為丁火而生脾陰之己土此五行相生之定義天地自然之氣化不可以科學之定理相為試驗者也然小腸能以生脾亦能病脾脾為小腸所生亦能滋益小腸故脾陰有虧宜瀉小腸之火以救脾防其消耗脾中之陰也小腸之火有餘宜滋脾陰以益小腸濟其化生之源也若夫脾濕而為腫脹小腸火衰而為瀉泄則又宜培火以燥土也容川解為脾病多是小腸之火蒸動濕氣發腫脹作泄瀉小便渾濁故當瀉小腸是其將脾與小腸寒熱之病合而為一也未免尚差一粒經云肺與膀胱通肺病宜利膀胱水膀胱病宜清肺氣為主唐容川曰肺主通調水道下輸膀胱其路道全在三焦膜中上卷已詳言之故肺與膀胱相隔甚遠而實則相通肺病則水停為痰飲故宜清利膀胱以瀉之膀胱病多由肺之上源不得疏通故宜清肺為主經云腎與三焦相通腎病宜調和三焦三焦病宜補腎為主唐容川曰三焦之源即發於腎系故腎與三焦通三焦為腎行水化氣故腎病宜調和三焦譬如腎氣丸用苓澤以利三焦之水保元湯用黃耆以充三焦之氣是矣三焦不能行水則宜滋腎陰不能化氣則宜補腎陽近醫不知三焦為何物西醫名連網不名三焦是不知腎係為三焦之根安知人生氣化哉唐容川曰此條全可考臟腑路道西洋形跡之學未及如是之精而今人不講反為西人所笑堪發一嘆五臟所藏唐容川曰人之所以靈於物者以其秉五行之秀也夫此靈秀之氣非空無所寄而已實則藏於五臟之中是為五臟之神人死則其神脫離五臟人病則五臟之神不安知五神之所司而後知五病之情狀經云心藏神唐容川曰人所以知覺神主之也神是何物渾言之則兩精相搏謂之神空言之則變化不測謂之神此皆放言高論未能實指之也吾且為之實指曰神乃生於腎中之精氣而上歸於心合為離卦中含坎水之象惟其陰精內舍陽精外護心臟之火所以光明朗潤而能燭物蓋神即心火得腎陰濟之而心中湛然神明出焉故曰心藏神心血不足則神煩心火不足則神怯風痰入心則神昏也西醫知心為生血回血之臟而謂心不主知覺主知覺者是腦髓筋又言腦後筋只主運動腦前筋主知覺又言腦筋有通於心者彼不知髓實心之所用而非髓能知覺也蓋髓為水之精得心火照之而光見故生知覺矣古文思字從囟從心即以心火照腦髓之義髓如月魄心如日光相照為明此神之所以為用也經云肝藏魂唐容川曰魂者陽之精氣之靈也人身氣為陽血為陰陽無陰不附氣無血不留肝主血而內含陽氣是謂之魂究魂之根源則生於坎水之一陽推魂之功用則發為乾金之元氣不藏於肺而藏於肝者陽潛於陰也不藏於腎而藏於肝者陽出之陰也晝則遊魂於目而為視夜則魂歸於肝而為寐魂不安者夢多魂不強者虛怯西醫不知魂是何物故不言及於夢然西人知覺與華人同試問彼夜夢恍惚若有所見者是何事物因何緣故則彼將啞然蓋魂非剖割所能探取而夢非器具所能測量故彼不知也經云肺藏魄唐容川曰人身血肉塊然陰之質也有是質即有宰是質者秉陰精之至靈此之謂魄肝主血本陰也而藏陽魂肺主氣本陽也而藏陰魄陰生於陽也實指其物即肺中精華潤澤之氣西醫所謂肺中只有膜沫是也惟其有此沫則散為膏液降為精血陰質由是而成矣魂主動而魄主靜百合病恍惚不寧魄受擾也魔魘中惡魄氣所掩也人死為鬼魄氣所變也凡魂魄皆無形有象變化莫測西醫剖割而不見遂置弗道夫談醫而不及魂魄安知生死之說哉經云脾藏意唐容川曰舊注心之所憶謂之意心火生脾土故意藏於脾按脾主守中能記憶也又主運用能思慮也脾之藏意如此脾陽不足則思慮短少脾陰不足則記憶多忘經云腎藏志唐容川曰舊注心之所之謂之志神生於精志生於心亦心腎交濟之義按志者專意而不移也志本心之作用而藏於腎中者陽藏於陰中也腎生精為五臟之本精生髓為百骸之主精髓充足伎巧出焉志之用也又按志即古志字記也事物所以不忘賴此記性記在何處則在腎經蓋腎生精化為髓而藏於腦中凡事物經目入腦經耳入腦經心亦入腦腦中之髓即將事物印記不脫久之要思其事物則心一思之而腦中之事物立見蓋心火陽光如照相之鏡也腦髓陰汁如留影之藥也光照於陽而形附於陰與心神一照而事記髓中同義西學留影妙矣而西醫則不知人身自有照影留聲記事之妙質雖剖割千萬人能得此理否古思字從囟從心囟者腦前也以心神注囟則得其事物矣容川又曰內經又有五臟七神之說云脾藏意與志腎藏精與氣與此不同然志須屬腎精氣血三者非神也另條詳注不在此例故從五神之說為是塗蔚生曰容川此節論釋詞意既系精微理由復極充足務使前之空空洞洞難以依據憑信者各有切實依據可為憑信醫者奉之為南針寶鑑豈非其天資過人學力極到之所使然歟西醫動謂中國此等學說近於玄妙無從實驗不知中國醫學之所以高尚者即由於此中玄妙也彼固不近玄妙彼固由於實驗何以其診治內科多弗能效常至殺人如反掌乎然則西醫亦宜知所改進矣望形察色唐容川曰形是肢體色是面部此理最微此脈更難今且舉其大略使人得其門徑西醫於察色未考經云以五色命五臟青為肝赤為心白為肺黃為脾黑為腎肝合筋心合脈肺合皮脾合肉腎合骨也唐容川曰言五色命於五臟每臟各見本色便知其病各臟又各有所合便知其病之所在譬如色青屬肝肝合筋便知其病在筋余仿此經云青如草滋者死青如翠羽者生黃如枳實者死黃如蟹腹者生黑如炲者死黑如烏羽者生白如枯骨者死白如豕脂者生唐容川曰此言五色榮者生枯者死蓋必有血與氣澤方能榮也經云凡色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也唐容川曰青為肝色青勝則肝木剋土故痛黑為腎之色黑勝則寒水凝滯故痹黃赤為火土之色故主熱白為金色金主清涼且溫體者血也血色少故白色多而知其體寒五色皆見乃錯亂之象故主寒熱並見經云明堂者鼻也闕者眉間也藩者頰側也蔽者耳門也明堂骨高以起平以直首面上於闕庭王宮在於下極五臟次於中央六腑挾其兩側唐容川曰此言人面之部位分配臟腑以診其色也面分三停上為闕闕下為極即山根也以闕論則處下以鼻言之則適居於中故稱極焉是為王宮心之應也鼻居王宮之下故名明堂其診法則當以五臟從上而下配於中央而六腑各隨其臟配於兩側有諸內形諸外亦各從其類也塗蔚生曰此係內經分配臟腑之法與前雖有少異而上下之位置則未嘗顛倒蓋欲多為參考以盡其精詳耳唐容川曰明堂今名準頭王宮今名山根也闕今名印堂藩今名頰蔽今名耳門古人不剃鬚故不診頤下今診訣有心額腎頤之說是俗醫所配雖今人剃鬚氣色終不見於此未可據以為診也人身內肺繫心系肝系腎系均著脊惟脾胃在下不著脊然脾膜之根仍著脊也故脾俞穴在背是五臟皆居於身中也所以診法亦配於面之中央而六腑則隨其臟位以配於側經云闕上咽喉也唐容川曰闕為眉間闕之上則至高矣咽喉之位在諸臟腑之上故應於闕上塗蔚生曰視此則知前之配列諸法尚缺精微蓋面部為內部之表現咽喉既系要塞即不可令其缺如也前者僅以心部配於額上咽喉之病視此是其未若此法為妥然其位雖殊其理則一亦未可厚非也經云闕中者肺也唐容川曰俗名印堂肺居胸中高於五臟故應於此經云下極者心也唐容川曰下極即山根心居肺之下肺應於闕中則心當應於此經云直下者肝也唐容川曰相法稱為年壽即鼻梁也肝配於此者以肝在腹中半在膈上半在膈下位實在心肺之下故當配於此唐宋後醫以肝配左顴肺配右顴此西金東木之義然非五臟自具之位次也且舊說以為肝在脾之下故曰下焦屬肝腎不知水木相生肝固與腎相屬而究其形體所居則肝半在膈上半在膈下脾在膈下居於油膜之上近胃聯小腸也中醫少見臟腑多失其真而西醫笑之並謂軒岐先謬豈知古聖精核更過西人此等位次便見聖人審定臟腑最精至經脈穴道尤為西人所不知也今必謂古人洞見臟腑尤屬空談不足折服西人即以剖視例之古創制作亦斷無未經剖視之理且軒帝戰阪泉涿鹿何難剖割之有經云肝左者膽也唐容川曰舉左以賅右言肝應於鼻梁其左右附鼻梁者膽之應也經云下者脾也唐容川曰下者指準頭言鼻梁在上則準頭在下故稱下焉脾在腔內實居肝之下油膜之上故應配於鼻梁之下此名明堂為鼻之應脾能總統五臟故準頭之診最要經云方上者胃也唐容川曰方上二字不得其解舊說以為口之上鼻孔之旁余按方字義訓兩舟相併殆指鼻之兩孔其形如方舟也然則準頭為明堂而兩孔即方上也本經云五臟位於中央六腑挾其兩側則鼻準屬脾兩孔旁自當屬胃塗蔚生曰余以容川此解似亦牽強蓋方字雖義訓為兩舟相併而鼻孔形圓並不如方舟也若以鼻之兩孔診胃為是然則開竅如口之大者豈無臟腑所繫哉余以為方上宜解在口不知果合聖意否尚留之以待高明經云中央者大腸也唐容川曰此中央字當合頰側與鼻計之頰側距鼻之中為中央蓋頰側名蕃鼻準名明堂其中即可名中央胃近鼻大腸連胃位次亦宜經云挾大腸者腎也唐容川曰腎有兩枚故配於面部頰側兩旁是最下之兩旁也腎居於下配此為宜後人配於口下承漿之所不知古不剃鬚口下須掩氣色不見故內經不以此察色以腎配兩頰腎有兩枚分診左右於義為合經云面王以上小腸也面王以下膀胱子處也唐容川曰面王二字無舊解然明堂者北面朝王之所也疑即明堂鼻準是矣膀胱子處即子宮二物皆在臍下與腎位相等腎兩枚居背後故分配兩旁應腎在後也膀胱子宮在前則當次位於前居鼻下故曰面王以下膀胱子處也惟小腸與胃相接而為心之府末易定其位次且小腸之膜油全連及肝膽脾也故配於膽胃之交肝脾之際位在鼻準上邊兩旁夾鼻之處故曰面王以上小腸也豫按後人望色左肝右肺心額腎頤鼻脾法甚簡易然不及內經診法為更詳唐容川曰闕屬肺闕旁生眉即當屬肺世多以眉屬肝不知眉實屬肺內經云肺風之狀其診在眉上足見眉實肺氣所發泄然肝血如不交於肺即不能化生眉毛凡毛皆是血化為氣而發泄者也單有血不能生毛單有氣亦不能生毛目之部位統屬肝竅所司由肝目之部上交闕旁系肺所司矣為肝血上交於肺氣所以化生眉毛肺為華蓋故相書稱眉亦名華蓋肝木主怒侮肺金而難制故眉粗之人性最剛烈自闕至明堂分配五臟而以六腑配於兩側詳矣惟三焦包絡未曾分配余按經文義實具於言下蓋三焦為腎之腑腎位配於藩正當頰側則三焦當配於蔽正當耳門也腎開竅於耳三焦之脈又繞耳護腎竅以蔽診三焦自不爽也至於包絡配在山根兩旁其義更可類推唐容川曰散見於經文者如發上指汗出如油大肉脫大骨陷唇及舌卷囊縮鼻張不治之證未能悉舉但明臟腑相應之理可以通一畢萬且如眼神尤宜細察再讀傷寒金匱則盡知之聞聲別證唐容川曰聲音之道微妙難通故聞而知之謂之神經云肝木在音為角在聲為呼在變動為握心火在音為徵在聲為笑在變動為憂脾土在音為宮在聲為歌在變動為噦肺金在音為商在聲為哭在變動為咳腎水在音為羽在聲為呻在變動為栗唐容川曰人能本宮商角徵羽五音呼笑歌哭呻五聲以參求五氣之邪則思過半矣西人審病至於察尿之味亦云苦矣只因於聲色氣味未能辨析是以出此下策經云中盛臟滿氣勝傷恐者聲如從室中言是中氣之濕也言而微終日乃復言者此奪氣也言語善惡不避親疏者此神明之亂也唐容川曰經意甚明蓋即聞聲而知其神與氣焉經云病人語聲寂寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病唐容川曰此數語系金匱文寂寂然不欲語屬三陰經喜驚呼則又屬厥陰經病入三陰厥陽主筋骨間病知其病在下焦聲出不徹聲不揚也胸中大氣不轉出入艱滯知其病在中焦胸膈間啾啾然細而長聲自下焦陰分緣足太陽而上達於顛頂故知其病在頭中唐容川曰按聲氣根於腎中上於胸膈出於肺管達於鼻轉於舌辨於唇或氣虛而音微或機停而語謇或膈間有滯而氣礙或鼻間有違而音乖散見各書細心人當自領取非楮墨所能盡也凡死證辨夏禹鑄曰前輩有死症訣然於中治之卻有不死者不可棄而不治大敦無脈是弱症屬不足直視搖頭是風證屬有餘二者相兼卻無此理倘有相兼不治症也如止有一斷非死症魚口自動忽作鴉聲此脾有痰而肝有風若祛風化痰似非死證蛔蟲盡出不加燒熱補肝即安亦非死症面黃四肢腫若黃有寶色補脾行氣自消卻非死證至於鼻孔黑燥兼以肚大青筋手抱頭上兼以發似油淋囟門腫起忽陷成坑只犯一宗猶非死症若並見之必死無疑第二集推拿法推拿代藥賦夏禹鑄曰前人忽略推拿卓溪今來一賦寒熱溫平藥之四性推拿揉掐性與藥同用推即是用藥何可亂推推上三關代卻麻黃肉桂退下六腑替來滑石羚羊水底撈月便是黃連犀角天河引水還同芩柏連翹大指脾面旋推味是人參白朮瀉之則為灶土石膏大腸側推虎口何殊訶子炮姜反之則為大黃枳實湧泉右轉不揉朴硝何異一推一揉右轉參朮無差食指瀉肺功並桑皮桔梗旋推止咳效爭五味冬花精威拿緊豈羡牛黃貝母肺俞重揉漫誇半夏南星黃蜂入洞超出防風羌活捧耳搖頭遠過生地木香五指節上輪揉乃祛風之蒼朮足拿大敦鞋帶實定掣之鉤藤後溪推上不減豬苓澤瀉小指補腎焉差杜仲地黃湧泉左揉類夫砂仁藿葉重揉手背同乎白芍川芎臍風燈火十三恩符再造定驚元霄十五不啻仙丹病知表裡虛實推拿重症能生不諳推拿揉掐亂用便添一死代藥五十八言自古無人道及雖無格致之功卻是透宗之賦塗蔚生曰此賦為推拿治病之概略頗關緊要學者必須記憶純熟方可胸有成竹不致誤用指紋陳飛霞曰幼科指紋總無正論且遊移不定莫可稽駁有謂不必用者有用而至於怪誕不經誣民惑世者是皆未明紋中之理所以有用不用之殊議請以一得之愚聊發其要蓋此指紋與寸關尺同一脈也按內經十二經絡始於手太陰其支者從腕後出次指之端而交於手陽明此即指紋是也明如景嶽猶謂此紋為手陽明浮脈不知手太陰經起於中府而終大拇指之少商手陽明經起於食指商陽兩不相值若無此旁支交通營衛不幾令太陰陽明表裡斷絶乎況此脈可診人所不知其遲數代促與太淵一毫無異但脈體差小由旁支也指紋之法起於宋人錢仲陽以食指分三關寅曰風關卯曰氣關辰曰命關其訣謂風輕氣重命危雖未必其言悉驗而其義可取塗蔚生曰十二經皆有動脈非獨陽明太陰為然如足陽明之趺陽足少陰之太溪皆以動脈之所在古人以之遍診病症取太淵以診大人者以其肺為華蓋會朝百脈也取三關以診小兒者以其太淵細小脈形未全不如三關之明瞭以視也執定肺與大腸相為表裡為解以三關之指紋即太淵之支出者似乎過拘而尚為精確之談也獨針灸所謂之足厥陰太衝穴在足大指本節後動脈處遍尋細審毫未見其動脈焉余曾訪問多人令其細為審察亦云無有不知此穴此脈究在何處想古人審脈定穴未必敢從意斷當闕以待考指紋切要陳飛霞曰小兒自彌月而至於三歲猶未可以診切非無脈可診而實虛不易定也小兒每怯生人初見不無啼叫呼吸先亂神志倉忙而遲數大小已失本來之象矣診之何益不若以指紋之可見者與面色病候相印證此亦醫中望切兩兼之意也令人抱兒對立於向光之處以左手握兒食指以我右手拇指推兒三關察其形色細心體認亦惟辨其表裡寒熱虛實足之矣世人好異不從實地用功以此為淺近之談不屑留意不知臨證能辨此六者便為至高之手蓋表裡清則知病之在經在府而汗下無誤寒熱明則知用寒遠熱用熱遠寒或寒因寒用熱因熱用因事制宜用無不當虛實辨則知大虛有盛候大實有羸狀不為假症眩惑凡真虛真實易知假虛假實難辨真假既明則無虛虛實實之患如此切要關頭不知體會但以不經之言欺世誑俗謂何者為人驚何者為畜驚不特欺人而且自欺不特無益治療而且誤人生命是誰之咎哉三關部位歌陳飛霞曰初起風關證未央氣關紋現急須防乍臨命位誠危急射甲透關病勢彰浮沉分表裡歌陳飛霞曰指紋何故乍然浮邪在皮膚未足愁腠理不通名表症急行疏解汗之投忽而關紋漸漸沉已知入里病方深莫將風藥輕相試須向陽明裡證尋紅紫辨寒熱歌陳飛霞曰身安定見紅黃色紅豔多從寒里得淡黃隱隱本虛寒莫將深紅化為熱關紋見紫熱之徵青色為風古所稱傷食紫青痰氣逆三關青黑禍難勝淡滯定虛實歌陳飛霞曰指紋淡淡亦堪驚總為先天稟賦輕脾胃本虛中氣弱切防攻伐損胎嬰關紋澀滯甚因由邪遏陰榮衛氣留食鬱中焦風熱熾不行推蕩更何求紋形主病歌陳飛霞曰腹痛紋入掌中心彎內風寒次第侵紋白外彎痰食熱水形脾肺兩傷陰又曰凡看指紋以我大拇指側面推兒食指三關切不可覆指而推蓋螺紋有火剋制肺金紋必變色又只可從命關推下風關切不可從風關推出命關此紋愈推愈出其紋在先原未透命關誤推而出之大損肺氣慎之慎之以上表裡寒熱虛實鑿鑿有據但能於臨症時認得此六字分明胸中自主宰雖不中不遠矣若但以驚證塞責何能應對第晨鐘自問未免懷慚凡我同人互為砥礪幸矣小兒脈法陳飛霞曰小兒三五歲可以診脈第手腕短促三部莫分惟以一指侯之誠非易易內經診視小兒以大小緩急四脈為準豫不避僭越體其意竟易為浮沉遲數而以有力無力定其虛實似比大小緩急更為明悉後賢其體認之內經脈要黃帝曰乳子而病熱脈懸小者何如岐伯曰手足溫則生寒則死帝曰乳子中風熱喘鳴肩息者脈何如岐伯曰喘鳴肩息脈實大也緩則生急則死陳飛霞曰此內經之旨聖人立言可總括無餘世人不悟視為平常能於此處著眼則診視之要思過半矣豫之臨症診視無論吉凶而多中者亦不外此第意之所在口莫能宣竊詳內經所謂大小緩急者亦發而不露之意蓋大即浮洪類也小即沉細類也急即數也緩即遲也何若竟易以浮沉遲數為得乎再以節庵之有力無力辨其表裡虛實誠診小兒天然不易之妙訣夫節庵亦一常人而能以有力無力辨其陰陽表裡寒熱虛實雖至顯淺至平易卻至確當孰謂今人不相及也四脈主病主證陳飛霞曰浮脈主表病在外沉脈在裡病在內遲脈主臟病為寒數脈主腑病為熱五至四至為遲為寒為不足浮遲外寒沉遲內寒有力實寒無力虛寒七至八至為數為熱為大過浮數表熱沉數里熱有力實熱無力虛熱浮而有力風寒無力陰虛沉而有力寒實無力氣滯遲而有力為痛無力虛寒數而有力實熱無力瘡瘍總括脈要歌陳飛霞曰太淵一指定安危六至中和五至虧七八熱多三四冷沉浮遲數貴詳推有力為陽為實熱虛寒無力里何疑若能留意於中取何至亡羊泣遠歧浮而有力熱兼風風熱皆陽表之實也無力陰虛汗雨蒙陰榮妄泄表之虛也有力而沉痰食害痰凝食滯結於裡也沉沉無力氣凝胸氣滯於中不運化也遲而有力多為痛浮遲外痛沉遲內痛無力虛寒氣血窮氣弱血衰至虛之候數脈熱多終有力數而有力實熱何疑瘡痍無力虛熱攻陰血受傷虛熱所致脈證宜忌歌陳飛霞曰脈浮身熱汗之松陽邪居表熱從汗解沉細身涼莫強攻無論表裡不堪攻伐咳嗽正嫌浮帶數浮緩為宜浮數大忌細沉腫脹定知凶脾胃虛寒愈不運化沉遲下利方為吉氣血俱傷最嫌洪數洪大遍宜痘疹逢陰陽充足毒不能留腹痛不堪浮有力二陰受病浮則反常浮洪吐衄總無功陽火太盛陰血愈傷陶節庵曰診脈之要無論浮沉遲數但於有力無力中分之有力者為陽為實為熱無力者為陰為虛為寒至哉斯言後賢勿忘塗蔚生曰左眉稍外窪中為太陽穴右眉稍外窪中為太陰穴兩眉中間為眉心又名印堂鼻窪為山風鼻正中高骨為延年鼻尖為準頭鼻下窪中為人中唇下為承漿髮際後五分為神庭神庭後五分為上星上星後一寸為囟門囟門後一寸五分為前頂門前頂門後一寸五分為百會能如此取穴決不致誤開天門法夏英白曰凡推皆用蔥姜水浸醫人大指若小兒病重者須以麝香末沾醫人指上用之先從眉心向額上推二十四下謂之開天門分推太陰穴太陽穴法夏英白曰於開天門後從眉心分推至兩眉外稍太陰太陽二穴九數太陰穴在右眉外稍太陽穴在左眉外稍掐天庭至承漿穴法夏英白曰於分太陰太陽二穴後再於天庭眉心山風延年準頭人中承漿各穴皆用大指甲一掐天庭在額上眉心在兩眉夾界山風在鼻窪延年在鼻高骨準頭在鼻尖人中在鼻下口上承漿在口下低處揉耳搖頭法夏英白曰於掐天庭各穴後將兩手捻兒兩耳垂揉之再將兩手捧兒頭搖之夏英白曰凡推首先用此四法以開關竅然後擇用諸法揉太陰穴法夏英白曰治女揉太陰穴發汗若發汗太過揉太陽穴數下以止之治男揉太陰穴反止其汗揉太陽穴法夏英白曰治男揉太陽穴發汗若發汗太過揉太陰穴數下以止之治女揉太陽穴反止汗二龍戲珠法夏英白曰以兩手攝兒兩耳垂揉之治風兒眼向左邪則揉右垂右邪則揉左垂上邪則揉下垂下邪則揉上垂如初風眼不邪皆輕重如一塗蔚生曰此節之風字夏英白原為一驚字余以驚風既屬有異而玩此節英白之驚字即含風字在內故易之以免眩迷運內八卦穴法夏英白曰從坎到艮左旋推治熱亦止吐從艮到坎右旋推治涼亦止瀉掌中離南坎北震東兌西乾西北艮東北巽東南坤西南皆推左手乾坎艮入虎口穴法夏英白曰虎口穴即大指與手叉處自乾由坎艮入虎口揉之能去食火揉艮宮穴法夏英白曰重揉艮宮治飲食不入運水入土法夏英白曰從兒小指稍腎經推去由兌乾坎艮震位至大指稍脾經按之補脾土虛弱運土入水法夏英白曰從兒大指稍脾經推去由震艮坎乾兌位至小指稍腎經按之治小便赤澀揉內勞宮穴法夏英白曰內勞宮穴在略偏大指邊天心穴之左屈兒中指手掌心其中指按處即是欲兒發汗將兒小指屈住用手揉兒內勞宮向左按而運之若向右運反涼掐小天心穴法夏英白曰小天心穴在兒手掌盡處兒有風症眼翻上者將此穴向掌下掐眼翻下者將此穴向總筋上掐即平塗蔚生曰小天心即針灸之所謂大陵穴屬心包絡故能治風然當系因熱生風揉掐脾經穴法夏英白曰脾經即大指尖左旋揉為補治小兒虛弱飲食不進肚起青筋面黃四肢無力若向下掐之為瀉去脾火大腸側推到虎口穴法夏英白曰大腸經即食指尖側即靠大指邊虎口即大指與食指之手叉處從兒食指尖斜推到虎口治膨脹水瀉痢疾紅多再推腎經白多再推三關虎口側推到大腸經法夏英白曰兒有積滯從虎口穴側推到大腸經能使兒瀉推掐心經穴法夏英白曰心經即中指尖自上推至中指盡處小橫紋行氣通竅向下掐之能發汗掐揉肺經穴法夏英白曰肺經即無名指尖向下掐之去肺火左旋揉之補虛掐推腎經穴法夏英白曰小指屬腎向掌邊掐之再掐兒小指與掌交界之小橫紋治小便赤澀肚腹膨脹左腎經向上推清小便向下推補腎橫門穴推到板門穴法夏英白曰橫門穴即掌與肱交界之橫紋板門穴在大指節下五分從橫門推到板門能止兒吐板門穴推到橫門穴法夏英白曰從板門推到橫門穴能止兒瀉中指尖推到橫門穴法夏英白曰從中指尖推到橫門穴止小兒吐橫門穴刮到中指尖法夏英白曰從橫門刮到中指尖掐之使小兒吐掐橫門穴法夏英白曰在兒橫門穴掐之治喉中痰響揉板門穴法夏英白曰在兒板門穴揉之治氣攻氣吼氣痛嘔脹烏龍擺尾法夏英白曰用左手拿兒肘鬥右手拿兒小指搖動如擺尾之狀能開兒閉結小指屬腎水色黑故名烏龍擺尾赤鳳搖頭法夏英白曰用左手拿兒肘鬥右手拿兒中指擺搖和血補心中指屬心心色赤故名赤鳳搖頭丹鳳搖尾法夏英白曰一手掐兒內勞宮一手掐兒中指尖心經治風塗蔚生曰此節之風字原文亦系驚字因此多系火熱生風故易為風字運五經紋法夏英白曰五經紋即五指第二節下之紋用大指在兒五經紋往來搓之治氣血不和肚脹四肢抽掣寒熱往來去風除腹響運四橫紋法夏英白曰四橫紋即食指中指無名指小指第三節與掌交界之橫紋用大指在兒四橫紋往來搓之和氣血治瘦弱不思飲食手足抽掣頭偏左右腸胃溫熱眼翻白珠喘急肚疼掐離宮至乾宮法夏英白曰從離宮掐起至乾宮止中間輕掐兩頭重掐化痰治咳嗽昏迷嘔吐孤雁遊飛法夏英白曰從兒大指尖脾經外邊推上去經肱面左邊至肱下節大半處轉至右邊經手心仍到兒大指頭止治黃腫虛脹揉氣關法夏英白曰氣關在食正面第二節揉之行氣通竅按弦搓摩法夏英白曰用二大指搓兒手與肱之背面各數下再拿兒手掌輕輕慢慢而搖順氣化痰老漢扳罾法夏英白曰一手掐兒大指根骨一手掐兒大指尖脾經能消食治痞塊水底撈明月法夏英白曰先掐總筋清天河水醫人以四指皆屈隨以中指背第二節第三節骨凸起澆新汲涼水於兒掌心往右運勞宮醫人以口氣吹之隨吹隨推大涼治一切熱症最效鬥肘走氣法夏英白曰一手托兒肘鬥運轉一手捉兒手搖動男左女右治小兒痞塊掐威靈穴法夏英白曰此穴在手背虎口上兩旁有圓骨處遇兒急風暴死掐此穴兒哭叫可治無聲難治塗蔚生曰此節即針灸大成之所謂合骨穴以其有二骨相交會也英白以前賢之推拿法具以此穴為威靈穴故亦名為威靈然究不如合骨之易識易記也掐精靈穴法夏英白曰此穴在手背無名小指夾界上半寸掐之治痰喘氣吼乾嘔痞積塗蔚生曰此穴即針灸大成之所謂液門穴屬於手少陽三焦經英白蓋亦沿前賢之推拿法故名為精靈穴耳鳳凰鼓翅法夏英白曰用兩手掐兒精靈威靈二穴前後擺搖之治黃腫又治暴死降喉內痰響掐二扇門穴法夏英白曰二扇門穴在手背中指上兩旁離中指半寸許如欲發汗掐心經掐內勞宮推三關汗猶不出則掐此穴至兒手中心微汗出乃止掐二人上馬穴法夏英白曰此穴在手背小指上里側對手心兌宮處是穴掐之能清神順氣補腎水醒沉疴又治小便赤澀掐外勞宮穴法夏英白曰此穴在手背對掌心內勞宮即是臟腑積有寒氣熱氣皆能和解又治遍身潮熱肚起青筋糞白不變五穀不消肚腹膨脹運外八卦穴法夏英白曰此穴在手背對手心內八卦處即是運之能通一身之氣血開五臟六腑之閉結掐中指甲法夏英白曰將兒中指甲上面輕輕掐之止兒瀉揉大指甲法夏英白曰大指甲為外脾揉之補虛治瀉捻五指背皮法夏英白曰將五指背面夾縫上皮輕輕捻之治風病又燥濕刮手背法夏英白曰從兒手背刮至中指稍能使兒瀉掐老龍穴法夏英白曰此穴在中指背靠指甲處相離如韭葉許若兒急風暴死對拿精靈威靈二穴不醒即於此穴掐之不知疼痛難治推後溪穴法夏英白曰此穴在手背小指盡處靠外旁向上推能清小便閉赤向下推能補腎虛揉手背法夏英白曰重揉手背能平肝和血掐五指爪甲法夏英白曰掐五指爪甲治風症若不醒再拿精靈威靈二穴掐少商穴法夏英白曰此穴在手背大指甲向上內側離指甲如韭葉許掐之治濕痰症痢清天河水法夏英白曰天河水穴在內間使穴上先掐總筋用新汲水以澆之從此穴隨澆隨推至洪池止洪池穴在肱彎為清天河水又名引水上天河治一切熱症塗蔚生曰洪池宜系針灸之所謂曲澤穴因曲澤屬於心包絡經而其位置亦在肱灣也打馬過天河法夏英白曰右運勞宮畢屈指向上彈內關陽池間使天河數穴治寒熱往來分陰陽法夏英白曰正面掌肱交界之橫紋兩頭即陰陽二穴小指邊為陰穴大指邊為陽穴就橫紋上兩指中分向兩邊抹為分陰陽治寒熱往來膨脹泄瀉嘔逆臟腑結閉和陰陽法夏英白曰用二大指自陰陽穴兩頭向中合之能和氣血掐赤筋法夏英白曰掌肱交界之橫紋上靠大指邊第一赤筋屬火以應心與小腸掐之治內熱外寒霍亂塗蔚生曰掐赤筋以治霍亂當系熱霍亂寒霍亂勿輕視此掐青筋法夏英白曰靠赤筋裡邊第二青筋屬木以應肝與膽外通兩目掐之治眼赤澀多淚掐總筋法夏英白曰總筋即黃筋乃五筋正中一筋屬土總五行以應脾與胃掐之治腸鳴霍亂吐瀉塗蔚生曰掐總筋以治霍亂吐瀉當是寒霍亂熱霍亂勿輕用此掐白筋法夏英白曰靠總筋邊第四白筋屬金以應肺與大腸外通兩鼻孔胸腹脹滿腦昏生痰掐之掐黑筋法夏英白曰靠小指邊第五黑筋屬水以應腎與膀胱外通兩耳尫瘦昏沉掐之猿猴摘果法夏英白曰攝兒螺螄骨上皮扯之消食黃蜂出洞法夏英白曰先掐總筋骨內勞宮分陰陽次以左右兩大指從陰陽穴正中處起一撮一上至內關又在坎離穴上掐此法大熱發汗用之鳳凰單展翅法夏英白曰用大指掐總筋四指皆伸在下大指又起又翻四指如一翅之狀掐至內失大熱治一切寒症飛經走氣法夏英白曰先運五經紋後五指開張在內關拍打再推心經揉氣關能行一身之氣掐靠山穴法夏英白曰此穴在手背大指下掌根盡處掐之治瘧病痰壅推下六腑法夏英白曰六腑在肱正面男向下推之為加涼女向下推之反為加熱陰極陽生也如推下六腑三下亦必推上三關一下以應之若止推不應男恐過涼有滯女恐發熱有火推上三關法夏英白曰三關在肱背面男向上推之為加熱女向上推之反為加涼陽極陰生也如推上三關三下亦必推六腑一下以應之若止推不應男恐發熱有火女恐生涼有滯掐一窩風法夏英白曰此穴在手背根盡處腕中掐之治肚痛唇白急慢風症又掐此穴兼掐中指尖能使小兒吐掐陽池穴法夏英白曰此穴在肱背面離手掌三寸是掐之治風痰頭痛二便閉塞赤黃塗蔚生曰查針灸之所謂陽池穴即夏英白之所謂一窩風夏英白之所謂陽池即針灸之所謂支溝以與內間使相對亦可名為外間使如依英白為是則外間使無處安置至取小兒寸法是治某個小兒即將某個小兒之中指第二節以兩頭橫紋中間之距離為一寸否則即為錯誤掐鬥肘曲池法夏英白曰掐鬥肘上筋曲池下筋曲池即肱灣處掐之治急風塗蔚生曰曲池屬陽明大腸在肱之上側面肱灣處宜拱手取之掐外關外間使法夏英白曰外關在肱背對肱面內關穴處外間使在肱背對肱面內間使穴處掐之治轉筋吐瀉塗蔚生曰外關在肱背面離腕後二寸內關在肱正面離掌後橫紋二寸內外間使各離內外關一寸與手腕掌後相離三寸揉肺俞穴法夏英白曰此穴在肩膀骨之夾縫處兩邊兩穴揉之化痰塗蔚生曰肺俞穴之取法須得小兒坐之端正依平肩之第一脊椎數起至第三椎止再離第三節椎之兩旁各二寸即是肺俞穴揉龜尾法夏英白曰此穴在脊梁骨盡處揉之治水瀉肚脹慢風搓臍法夏英白曰以左大指按兒臍下丹田不動以右大指在兒臍周圍搓之治水瀉膨脹臍風等症塗蔚生曰丹田在臍下二寸一名石門穴膀胱如釜底乘水丹田如灶底著薪故能治水瀉等症掐膝眼穴法夏英白曰此穴在膝蓋里旁一名鬼眼穴小兒臉上風來急在此穴掐之若兒身後仰即止委婁中穴法夏英白曰此穴在腿彎內幾有風時急在此穴掐之若兒身前撲即止掐前承山穴法夏英白曰此穴在腿下節前面膝下亦名中廉穴兒風望後跌在此穴久掐最效塗蔚生曰查針灸大成並無中廉穴之名稱只有上廉下廉二穴條口居於其間想英白之所謂中廉穴亦即指針灸之所謂條口邊至此穴之取法須沿外膝眼下量起至下八寸止脛上兩筋骨罅宛宛中因上廉離外穴眼六寸下廉離上廉三寸而條口則在下廉上一寸邊塗蔚生曰以上推拿諸法猶本草之藥味羅列性質畢布可謂臨時治兒者選擇之工具也然病有輕重法有繁簡有一病而只用一方者有一病而須用數方者前後變換不同臨時施用自異在醫師之良者固可因病求法而為適宜之推拿若夫醫師之下者則胸無成竹未免臨症眩迷如其臨症亂推亂拿不知因症以求法何若另立法門使之依法治症故余於採用夏英白推拿諸法而外另將陳紫山之分門推拿諸法列入雖治法未克精良療病未必完善而隨症增減採用多亦可為醫師之一助云耳夜啼門推法陳紫山曰夜啼有四有風熱有心熱有寒疝有誤受驚恐風熱者為衣裳太厚過於溫暖邪熱攻心心與小腸為表裡夜啼而遺溺者是也心熱者見燈愈哭者是也寒疝者遇寒即啼是也誤受驚恐者面色紫黑氣鬱如怒若有恐懼睡中驚跳是也治法推上三關推下六腑清心經水底撈明月分陰陽法掐肝經如寒疝痛啼宜運動四橫紋揉臍下並一窩風塗蔚生曰凡陳紫山之所謂驚字與風字有混者余概以風字易之若其字句間有可簡裁者余亦略為刪去務使其言簡而意賅理明而詞達至推拿法有可乘者余仍録之以為補助茲附陳紫山水底撈明月法陳紫山曰醫以左手拿住兒掌向上以右手滴一點水於兒內勞宮隨用右手四指扇七下再滴水於心經又滴水於天河天河即肱灣醫者用口吹上四五口將兒中指屈之醫者仍用左大指掐住右手捏拳將中指節自心經上按摩到曲池橫空在下二指如此四五次在三關踢涼行背上往六腑踢涼入心肌此大涼之法不可任意亂用重舌門推法陳紫山曰凡重舌者生於舌下挺露如舌故曰重舌然脾之絡脈系舌旁肝之絡脈系舌本心之絡脈系舌根此三經或為濕熱風寒所中則舌捲縮或舒長或腫滿木舌者舌腫硬而妨乳食由於風熱盛也蓋舌者心之苗心熱則生瘡破裂肝壅則血出如湧泉脾閉則白苔如雲熱則腫滿風則強木口合不開四肢壯熱氣喘語澀即其候也治法推上三關心經脾經推下六腑運八卦運水入土分陰陽清天河水塗蔚生曰舌雖為心之苗而他臟亦分配於其上脾屬土宜居舌之中間肝屬木宜居舌之兩旁腎屬水宜居舌之根本心屬火宜居舌尖肺屬金雖無所配而其位居至高就舌尖以診寒熱亦可診肺之寒熱矣紫山所配舌之位次未免有誤鵝口門推法陳紫山曰凡鵝口者始生嬰兒自一月內外至半歲以上忽口內白屑滿舌而上齶戴礙狀如鵝口開而不合語聲不出乳食多難或生於牙齒上下名曰馬牙皆由熱毒上攻名雖異治則一也治法推上三關退下六腑分陰陽打馬過天河再用扁銀簪腳將牙齦刮破出血以軟絹拭淨以陳墨塗之塗蔚生曰馬牙系生黃色之小尖牙與鵝口有異余亦有治法見後至其鵝口之推法亦甚簡略須參用各種涼法亦可風症門推法陳紫山曰小兒熱盛生風風甚發搐又甚則牙關緊急而八候生焉八候者搐搦掣顫反引竄視是也搐者四肢收縮也搦者十指開合者掣者勢如相撲也顫者橫身鼓栗也反者身仰後面引者臂者開合穿者目直視似怒視者露睛不和也是為八候其症風寒熱是也又曰小兒初生下地或軟或硬目不開光不全不啼哭人事不省乃胎受驚也治法推上三關分陰陽脾上運五經紋飛經走氣天門入虎口六腑揉鬥肘陳紫山曰小兒落地眼紅口撮頭偏左右手捏拳頭哭聲不出是胎熱毒或月內受風痰壅心口也治法三關運八卦四橫紋蒼龍擺尾揉臍及龜尾中指節內勞宮板門掐之青筋縫上燈火七燋氣急臍上七燋陳紫山曰小兒身熱氣吼口渴眼紅四肢掣跳乃傷食感寒而成也治法推三關分陰陽肺經推二扇門如出汗推六腑清心經水底撈明月陳紫山曰肚響食嘔四肢厥逆人事昏迷是胃經傷食受寒也治法推三關分陰陽肺經脾土運八卦四橫紋飛經走氣鳳凰單展翅陳紫山曰面青唇白肚響作瀉眼翻作渴人事昏迷四肢六腑有寒乃乳食所傷也治法推上三關分陰陽大腸脾土二扇門黃蜂入洞揉臍及龜尾臍周圍七燋陳紫山曰寒熱不均氣喘眼白飲食不進青筋滿肚肚腹脹瀉皆因食後感寒脾不能運也治法推三關肺經脾土運八卦分陰陽揉臍精靈穴按弦搓摩鳳凰單展翅用燈火肚上青筋四燋塗蔚生曰以上四症乃腸胃虛寒生風慢風之一種也故均主用溫補脾胃以回元陽但其所用推三關法是專指男兒說女兒宜用六腑陳紫山曰氣吼肚脹飲食不進人瘦體弱肚起青筋眼黃手軟大小便不通肚脹疼痛此乃六腑之有寒也治法推三關脾土大腸運土入水肺經補腎水揉臍及龜尾臍周圍燈火七燋再用艾絨灸熱一圍扎臍上陳紫山曰四肢亂舞頭向上此因先受風熱後被驚嚇之症也治法推三關肺經運八卦脾土清天河水大腸飛經走氣以燈火爆四肢肩膊喉下臍下各一燋陳紫山曰吐白沫四肢擺動嘴歪常搭眼翻白珠此肺經有風脾經有寒也治法推三關脾土肺經八卦清天河水運水入土五經紋補腎水掐五指節三次頭弦搓摩口角上下燈火四燋陳紫山曰兩眼向上四肢反後或兩手垂下眼黃口黑人事昏沉此乃水盛侮土掐之覺痛者可治不痛者不治治法推三關肺經四橫紋天門入虎口揉鬥肘運水入土飛經走氣陳紫山曰日輕夜重到晚昏迷口角歪斜四肢掣跳口鼻氣冷此乃脾胃有寒之症也治法推三關六腑四橫紋運八卦分陰陽掐五指節掐腎水打馬過天河陳紫山曰口眼歪斜四肢搐掣痰壅心迷人事不省其狀如死乃肝經積熱生風之症也治法推三關六腑腎水清天河法脾土肺經運五經紋掐五指節猿猴摘果咬崑崙穴推三陰穴慢風從上往下塗蔚生曰三陰穴前賢具未注明何處按夏英白之分陰陽法推測當亦在手之小指邊也確否姑待高明匡正陳紫山曰面青唇白四肢厥冷人事昏迷手足搐掣眼慢痰壅名曰慢風此乃大病之餘吐瀉之後脾土虛敗肝木從風以自動也治法先掐老龍穴有聲可治無聲不可治次用艾灸崑崙穴推三關肺經腎水脾土掐五指節運五經紋運八卦赤鳳搖頭二龍戲珠天門入虎口用燈火手足心四燋心口上下三燋三陰穴慢風從下往上陳紫山曰兩目迷閉哭聲不止面青眼黃手眼望內掣者乃肺經受風寒之症也治法三關肺經脾土腎水鳳凰展翅按弦搓摩再以竹瀝灌之又以細茶飛鹽皂角各末五分水一鍾黃蠟二分鍋內溶化入前藥末為餅貼心窩中即效塗蔚生曰竹瀝太寒宜酌用即茶皂餅亦宜審慎陳紫山曰小兒眼向上哭聲號四肢掣口眼歪斜鼻流清水或衄血此乃肺經受風或食後感寒而致也治法三關六腑脾土分陰陽清天河水肺經八卦揉五指重揉大小天心又曰總筋青筋耳珠掐之又將燈火臍上下提之陳紫山曰頭仰後四肢向後眼翻或閉腹脹哭聲不止此乃肺經受風積痰所致也治法推三天肺經脾經八卦清天河水重揉手腳灣內關中界掐臍上下青筋縫上喉下各三燋又須重揉委中書曰手足後伸頭後仰灸臍上下即安康陳紫山曰口中扯舌四肢冷而掣哭聲不出乃心經有熱睡中食乳口角入風所致也治法推三關六腑分陰陽運八卦清天河水略推三關多推腎水如舌扯不止燈火胸前六燋塗蔚生曰既是熱症吐舌又何敢用燈火醫者可以審察陳紫山曰兩手抓人捏拳咬牙手望下口望上身寒熱皆因被嚇傷乳心熱生風也治法推三關脾土陰陽八卦又在大指左右手足三灣掐之再用燈火手心太陽眉心腳心各一燋塗蔚生曰此節證論與方治不太符用者宜審擇陳紫山曰四肢掣跳唇口青黑肚脹青筋此乃臟腑受寒之症也治法推三關肺經八卦宜多推運六腑脾土少推內勞宮二扇門再用燈火四心提之肚上青筋縫上七燋陳紫山曰手足掣跳口眼俱閉大叫一聲形如死狀乃心熱生痰症類急風也治法推三關肺經六腑清天河水水底撈明月飛經走氣脾土若吐四心用燈火各一燋塗蔚生曰所謂四心不知是手足心抑是大小天心但既是心熱生痰又何敢用燈火陳紫山曰口吐沫鼻流血四肢軟好吃冷物眼白不哭心脾有熱火盛痰壅之症也治法三關六腑清天河水水底撈明月分陰陽運八卦補腎水赤鳳搖頭陳紫山曰眼翻咬牙手足一掣一死乃心經受風先寒後熱有痰之症也治法推三關六腑肺經清天河水脾土運八卦赤鳳搖頭將兩手相合共掐橫紋如不醒大指頭上掐之上下氣閉人中掐之鼻氣無出入吼氣寒熱作渴隨症治之先掐承山推眉心再燈火手上手背皆二燋若咬牙將兩手捻耳珠屈中指揉頰車穴又運土入水諸熱門推法陳紫山曰諸熱元初各有因對時發者是潮名乍來乍止為虛症乍作無寒屬骨蒸又曰夫胎熱者兒生三朝旬日之間目閉而赤眼瞼浮腫常做呻吟或啼叫不已時復驚煩遍體壯熱小便黃色此因在胎之時母受時氣熱毒或誤服溫劑過食五辛致令熱蘊於內熏蒸胎氣生下因有此症名曰胎熱若經久不治則或鵝口重舌木舌赤紫丹瘤等症又不可以大寒之劑攻之熱退則寒起傳作他症切宜慎之治法推三關退六腑分陰陽清天河水三焦揉外勞宮運八卦自坎至坤宜多二次掐腎水五總經十王穴運鬥肘水底撈明月虎口及曲池各用燈火一燋塗蔚生曰十王穴失考疑即是中指頭之中衝穴未知確否姑存之以待考燈火亦宜酌用陳紫山曰潮熱者時熱時退每日依時而發如潮水之應不差大抵血氣壅盛五臟風熱熏發於外或夾伏熱或蘊宿寒伏熱者大便黃而氣臭宿食者大便白而酸臭是也治法推三關補心經運八卦分陰陽掐十王掐中指六腑水底撈明月運鬥肘陳紫山曰驚熱者或遇異物而觸目忤心或金石之聲而駭聞悚懼是以心既受驚而心氣不順身發微熱而夢寐虛驚面光而汗脈數煩躁治當與急風同法也治法推三關肺經分陰陽推二扇門清心經清天河水五經紋運鬥肘水底撈明月飛經走氣陳紫山曰風熱者身熱面青口中赤熱煩叫不時宜疏風解熱若熱盛而大便熱者下之可也治法推三關瀉大腸掐心經補腎水運八卦掐總經清天河水二龍戲珠運鬥肘陳紫山曰煩熱者氣血兩盛臟腑實熱表裡俱熱煩躁不安皮膚壯熱是也如手足心熱甚者五心煩熱也治法推三關掐中指掐十王瀉五經紋運八卦揉外勞宮分陰陽退六腑水底撈明月打馬過天河運鬥肘塗蔚生曰煩熱之症屬於陰血虛者最多未可概斷為氣血兩盛臟腑實熱蓋血液既少而火無所養也不過小兒此症較少耳陳紫山曰舌絡微縮時時弄舌因脾臟積熱不可妄用涼劑治法推三關退下六腑脾土瀉心火補腎水運八卦分陰陽掐總筋水底撈明月運鬥肘陳紫山曰虛熱者因病後血氣未足四肢瘦弱時多發熱一日三五次者此客熱乘虛而作調氣調血其熱自退治法推上三關退下六腑捻五指運八卦水底撈明月掐總經分陰陽飛經走氣運鬥肘陳紫山曰頭昏頰赤口內熱小便赤澀大便祕結肚腹結脹此實熱之症也宜瀉之臟腑之熱去則病自愈治法推上三關瀉大腸清腎水運八卦推膀胱分陰陽水底撈明月退六腑打馬過天河飛經走氣運鬥肘陳紫山曰積熱者眼胞浮腫面黃足冷發熱從頭至肚愈甚或惡聞飲食之氣嘔吐噁心肚腹疼痛治法推上三關退下六腑五經紋脾土大腸三焦腎水運八卦掐總經分陰陽水底撈明月飛經走氣運鬥肘陳紫山曰疳熱者皆因過餐飲食積滯於中郁久成熱然脾家一臟有積不治傳之別臟則成五疳之疾若脾家病去則餘臟皆安矣治法推上三關退下六腑補脾土推大小腸三焦運八卦掐總筋分陰陽水底撈明月飛經走氣運鬥肘陳紫山曰血熱者每日辰巳時發遇夜則涼世人不知或謂疳熱殊不知此乃血熱之症也治法推上三關推下六腑分陰陽運八卦五經紋掐總筋清腎水水底撈明月揉鬥肘按弦搓摩飛經走氣塗蔚生曰血熱與虛熱有異血熱者乃血分之火氣壯實而反耗其陰液也虛熱則係一種陰血先虛而火無所潛故一則發自上午一則發自下午若夫壯熱則又多系發自氣分蓋熱雖近於火而火究熱之原質熱究系火之所蒸發也陳紫山曰骨蒸熱者乃骨熱而蒸有熱無寒醒後盜汗方止非皮膚之外燒也皆因小兒食肉太早或素喜炙爆麵食之類或好食桃李楊梅瓜果之類或至冬月衣棉太厚致耗津液而成或疳病餘毒傳作骨蒸又或腹內痞癖有時作痛治法推三關推六腑運五經紋分陰陽清天河水水底撈明月補腎水掐總經四橫紋打馬過天河塗蔚生曰骨蒸熱乃陰虛至極者因臟內之陰液消礫已盡而水陰不能化生骨髓故其熱亦至於骨間也雖紫山之解尚未盡當然而食積之熱亦確能消耗陰血也陳紫山曰壯熱者一向不止皆因血氣壅塞五臟生熱蒸尉於內故身體壯熱眠臥不安精神恍惚熏發於外則表裡俱熱甚則生風也治法推三關六腑肺經分陰陽推二扇門清心經清天河水五經紋掐總筋運鬥肘水底撈明月飛經走氣陳紫山曰溫壯熱者與壯熱相類而少異但溫溫不甚盛是溫壯也若胃氣不和氣滯壅塞而蘊積體熱者則名為溫壯熱大便黃臭此腹內伏熱類白酸臭則宿食停滯宜微利之治法推三關推六腑肺經分陰陽推二扇門清心經清天河水五經紋掐總筋運鬥肘水底撈明月飛經走氣陳紫山曰變蒸熱者陰陽水火蒸於氣血而使形體成就者也所以變者變生五臟蒸者蒸養六腑小兒初生三十二日為之一變六十四日為之一蒸十變五蒸計三百二十日蒸變俱畢兒乃成人也嬰兒之有變蒸如蠶之有眠龍之脫骨虎之轉爪皆因類變生而長也身熱如蒸上氣虛驚耳冷微汗上唇有白泡如珠或微腫如臥蠶者是其候也重者身熱神亂腹痛叫不能食乳切不可妄投藥餌及推拿火灸若誤治之必致殺人故不立治法特書以告之塗蔚生曰小兒變蒸之說未知是先賢憑空結撰抑是別有依據謂其為憑空結撰歟而其所謂變蒸之日數與變蒸之形狀似乎著著可信者謂其確有依據欽而此之所謂變蒸又多異乎彼之所謂變蒸似乎毫無定準者余因此互異之點不禁有管見陳焉蓋人之生也臟腑其根本肢體其苗葉必先臟腑充備而後有肢體肢體具而後五官生焉斷未聞有五官肢體既具而後變生臟腑者也如肢體秉於完成臟腑備於變蒸試問小兒未至三十二日變蒸以前而其內之主宰消化乳食者何物司乎化生血液者何物而主乎藏血納血統氣行氣者果又何物假使其內部未臻完成則吾恐其兒縱能誕生亦不過終朝耳又焉能消化乳食化生血液而為第一月生長最速之兒乎不觀夫鍾耶內部之機件完備方能行走使其內部少有損壞滯泥則不能行其定時之職權縱能行動而指亦不準矣豈有活潑整個之兒內部不至完成而即能生長耶余因各傢俱有此說始存之以供參考余又因各家之說互異特闡之以正其誤傷寒門推法陳紫山曰傷寒之病有多般一概推詳便覺難面目俱紅時噴嚏氣粗身熱是傷寒又曰傷寒一日遍身發熱頭疼腦痛人事昏沉甚則胡言亂語治法推三關六腑打馬過天河水底撈明月分陰陽運八卦五指尖鬥肘無汗掐心經內勞宮肩井有汗不用塗蔚生曰傷寒是寒鬱於表治宜惟用溫解而寒涼在其所忌本節有水底撈明月一法用者必須審慎蓋必寒從熱化熱邪入里而後可用此大寒之治法也陳紫山曰傷寒二日結胸腹脹減食沉迷內熱外寒遍體骨節疼痛治法推三關六腑心經分陰陽運八卦開胸膈疼加肺經飲食不進加脾土曲池陽池陳紫山曰傷寒三日遍身骨節疼痛大小便不通肚腹作脹治法推三關肺經和陰陽運八卦開胸運鬥肘天門入虎口四橫紋水底撈明月赤鳳搖頭揉太陽揉五指節攢竹曲池肩井陳紫山曰傷寒四日腳疼腰痛眼紅飲食不進人事顛亂治法推三關六腑曲池虎口二人上馬掐五指節水底撈明月飛經走氣打馬過天河陳紫山曰傷寒五日傳遍經絡或大便不通小便自利或噎氣霍亂治法推三關清天河水脾土八卦清腎水肺經打馬過天河陳紫山曰傷寒六日血氣虛弱飲食不進腰痛氣喘心疼頭痛治法推三關肺經四橫紋運八卦清天心水水底撈明月赤鳳搖頭按弦搓摩飛經走氣曲池肩井合谷分陰陽陳紫山曰傷寒七日傳變六經發散四肢各傳經絡或痢或瘧加減推之治法推三關六腑清天河水肺經四橫紋補腎水和陰陽天門入虎口揉鬥肘曲池肩井太陽推脾土若疸瘧揉五指中節與節根凡推瘧疾必宜常用不易者推之而後用此法最效塗蔚生曰紫山此節症治是拘於傷寒傳變每日傳一經者亦是拘於先賢之叫人著眼傷寒日數者豈知傷寒傳變雖是由淺入深由表入里亦是全憑某經氣血之強弱以為轉移故有遞次日傳一經而至六經者亦有遞次傳至一二經而終止者有始終數十日不離其一經並不傳變者有起首並不在於太陽而直病陽明少陽或三陰者傳遍既殊病狀亦異吾人治病只可見其發見某經之症而以為某經之治萬不可因其日數之多寡以為治陰治陽之歧異若徒拘於日數則五六日之病猶在太陽者豈可為少陰厥陰之治乎故治病之法只宜採用權變因時制宜又常用不易一語頗會解嘔吐門推法陳紫山曰有物有聲名曰嘔乾嘔則無物有物無聲名曰吐嘔者有痰吐者無聲嘔吐出物也胃氣不和蓋衝脈雖麗於足陽明胃經上行而其氣則以下行為順今逆而上行則作嘔吐然有胃寒胃熱之不同傷食氣虛之各異病既不一治亦不同諸吐不思食者總宜節其乳食無論其寒吐熱吐若經久不治胃氣空虛恐成慢風之候最宜預防如已成慢風常嘔腥臭者胃氣將絶之兆也又曰夏天小兒遊戲日中伏熱在胃或乳母感冒暑氣乘熱乳兒或過食辛熱之物多成熱吐其候面赤唇紅五心煩熱吐次少而出物多乳片消而色黃者是也治法推三關六腑脾胃肺經十王穴掐右端正運水入土運八卦分陰陽赤鳳搖頭揉總經揉鬥肘陳紫山曰寒吐者冬日感冒風寒或乳母有寒乘寒乳兒冷氣入腹或傷宿乳或食生冷胃虛不納乳片不化喜熱惡寒四肢逆冷脈息沉微吐次多而出少者是也治法推三關補脾胃肺經掐右端正運八卦分陰陽黃蜂出洞赤鳳搖頭六腑陳紫山曰傷食吐者夾食而出氣味酸臭惡食胃痛身發潮熱者是也治法推三關五指尖掐右端正推脾土運八卦分陰陽水底撈明月打馬過天河六腑揉鬥肘塗蔚生曰左右端正是中指中節左右兩邊陳紫山曰虛吐者胃氣虛弱不能停留乳食而作吐也治法推三關五經紋多補脾胃掐右端正運土入水運八卦分陰陽赤鳳搖頭三關六腑補大腸揉鬥肘泄瀉門推法陳紫山曰胃為水穀之海其精英流布以養五臟糟粕傳送以歸大腸內由生冷乳食所傷外因風寒暑濕所感飢飽失時脾不能消冷熱相干遂成泄瀉若脾胃氣和以消水穀水穀既分安有此症也古人云脾虛則吐胃虛則瀉脾胃俱虛則吐瀉並作若久瀉不止元氣必脫宜大補之治法推三關心經清腎水補脾胃掐左端正倒推大腸外勞宮分陰陽運八卦揉臍及龜尾掐肚角兩旁掐承山寒症加黃蜂出洞三關六腑鬥肘熱症加撈明月打馬過天河三關六腑揉鬥肘陳紫山曰霍亂者揮霍撩亂也外有所感內有所傷陰陽垂膈上吐下痢腸擾悶痛是也治法推三關肺經八卦補脾土大腸四橫紋分陰陽二人上馬蒼龍擺尾又將獨頭蒜一個搗碎將燒紙隔七層敷臍若起泡用雞蛋清塗之即愈腹痛門推法陳紫山曰小兒腹痛有寒有熱有食積癥瘕偏墜寒疝及疣蟲動痛諸痛不同其名亦異故不可一概而論又曰熱腹痛者乃時痛時止也暑月最多治法推三關六腑推脾土分陰陽陰重陽輕黃蜂出洞四橫紋塗蔚生曰黃蜂出洞乃治療寒症之大熱法以之治熱症腹痛恐繫有誤用者慎之採用清天河水等法可也陳紫山曰寒腹痛者常痛而無增減也治法推三關運五經紋二扇門一窩風按弦搓摩運八卦揉臍及龜尾陳紫山曰氣滯食積而痛者卒痛便祕心胸高起手不可按者是也治法推三關分陰陽推脾土揉臍及龜尾掐威靈若腹內膨脹推大腸陳紫山曰冷氣心痛者手足厥逆遍身冷汗甚則手之甲青黑脈沉細微是也治法推三關運八卦分陰陽陰重陽輕補腎二扇門黃蜂出洞鳩尾前後重揉蔥姜推之發汗塗蔚生曰鳩尾在胸前兩歧骨下一寸曰鳩尾者言其骨垂下如鳩尾形也痢疾門推法陳紫山曰痢分赤白二種世人莫不曰赤為陽為熱白為陰為寒或曰無積不成痢或以冷熱之法互治必難取效不究其原何可療治且四時八風之中人五運六氣之相勝夏秋人多痢疾內經曰春傷於風夏生飧泄豈可拘於無積不成痢之說豈一歲之中獨於夏秋人皆有積乎蓋風邪入胃木能勝土不為暴泄則或痢疾赤白交雜此為陰陽不分法當分清陰陽為主又曰夾熱而痢者則痢下紅色此風熱能動血也治法推三關六腑清心經和陰陽推大腸脾土運八卦腎水揉臍及龜尾陳紫山曰夾冷而痢者則下純白也或油上有粉紅色或似豬肝凝血皆為陰症蓋血寒則凝故也治法推三關運八卦脾土大腸和陰陽天門入虎口揉臍及龜尾瘧疾門推法陳紫山曰夏傷於暑秋必病瘧謂腠理開而汗出遇風也或得於澡浴水氣舍於皮膚因衛氣不守邪氣並居其疾始作伸缺寒栗腰背俱痛骨節煩痛寒去則內外皆熱頭疼而渴乃陰陽二氣交爭虛實更作而然陰氣獨勝則陽虛故先寒戰栗陽氣獨勝則陰虛故先熱陰勝陽虛則內外皆寒陽盛陰虛則內外俱熱陰陽各衰衛氣與病氣相離則病愈陰陽相搏衛氣與病氣相集則病復各隨其衛氣之所在與所中邪氣相合而然也塗蔚生曰陳紫山此節之瘧疾談似有獨得之處然其瘧之所以發生寒熱之理尚缺細密參觀第一集秋善病風瘧解釋自知治法一瘧疾兼嘔吐者推三關脾土分陰陽運八卦揉臍治法二瘧疾一旦發者推三關肺經分陰陽運八卦按弦搓摩治法三久瘧不愈而脾虛弱者補脾土分陰陽運八卦治法四邪瘧至晚發者推三關脾土分陰陽運八卦六腑天門入虎口治法五疸瘧但熱無寒者推三關脾土分陰陽運八卦肺經六腑內關天門入虎口揉鬥肘間使疳疾門推法陳紫山曰大抵疳之為病皆因過餐飲食於脾家一臟有積不治傳之餘臟而成五疳之疾若脾家病去則餘臟皆安苟失其治日久必有傳變而成不救之症可不慎哉治法推三關六腑脾土運八卦大腸五經紋心經清天河水運水入土板門積症門推法陳紫山曰兒患積症皆因哺乳不節過餐生冷堅硬之物脾胃不能克化積滯中脘外為風寒所襲或因夜臥失蓋致頭疼面黃身熱眼胞微腫肚腹膨脹足冷肚熱喜睡神昏不思飲食或吐或噦口吐酸氣大便腥臭此為陳積所傷先宜發表後宜攻積治法推三關六腑多補脾土掐四橫紋補腎水分陰陽掐大腸揉板門運八卦退艮重二扇門天門入虎口發熱腹痛宜推水底撈明月大便祕結多推六腑四橫紋揉掐腎水腹痛泄瀉掐一窩風揉臍及龜尾痞症門推法陳紫山曰夫痞與否同不通一也小兒乳哺不節久停於脾不能克化結成痞痞癖突於脅下或左或右俗云龜勞其疾皆因積滯蘊作致有寒熱肚腹疼痛晝涼夜熱氣實者先攻其痞後投補益氣虛者先與調固脾胃神色稍正飲食多進後宜攻之若面黃唇白發焦肌瘦乃為虛極不可輕下乃徐徐調理為上治法推三關脾土大腸肺經四橫紋板門精靈清腎水運五經紋運八卦小天心黃蜂出洞赤鳳搖頭久揉脾土塗蔚生曰痞與塊異痞是中焦循行油膜之氣滯也中焦循行油膜之氣滯則運行上下之氣皆滯而循行油膜之血亦因之而滯矣故外感風寒久不解其風寒邪氣每易循外油膜以入內油膜發生痞積等症塊是先有行之血滯而後纍及於氣滯者也古人有癥瘕之名謂癥為常聚不散血多氣少氣不勝血故不散或純是血質或血中裹水瘕為或聚或散氣為血滯則聚而成形血隨氣散則沒而不見實則亦即痞塊之換相也不可因其名稱岐異而人每覺痞塊與癥瘕相懸殊耳若夫食積則是純粹由於飲食積滯而纍及於原有之氣血周流者也故治痞之法宜疏氣以行血治塊之法宜攻血以行氣治積之法則宜消食以行滯至其現時行狀若何則又宜隨體質之強弱而納補益寒熱之味於公導消散之中者也癇症門推法陳紫山曰古人議癇最多大抵胎內受驚及聞大聲大驚而得蓋小兒神氣尚弱驚則神不守舍舍空則痰涎歸之而昏亂旋暈顛倒口眼相引目直上視手足搐搦背脊強直或發時作牛羊豬馬雞犬之聲便致僵仆口吐涎沫不省人事凡得此症純屬風痰鬱結上迷心竅宜多投疏風化痰順氣鎮驚之劑更須臨症參詳乃無失也治法推三關六腑肺經補脾土天門入虎口揉鬥肘掐板門掐五指節分陰陽運八卦赤鳳搖頭按弦搓摩威靈穴揉中指掐總經炙崑崙咳嗽門推法陳紫山曰夫咳嗽者未有不經感冒而成也經曰肺之令人咳何也岐伯曰皮毛者肺之合也皮毛先受邪氣得其從合則傷於肺是令嗽也乍暖脫衣暴熱遇風汗出未乾遽爾戲水致令傷寒咳嗽初得時面赤唇紅氣粗發熱此是傷風痰壅作嗽日久津液枯耗肺經虛矣肺為諸臟華蓋臥開而坐合所以臥則氣促坐則稍寬乃因攻肺下痰之過名曰虛嗽又當多補脾而益肺藉土氣以生金則自愈矣治法推三關六腑肺經往上二扇門二人上馬五總經六轉六掐多揉肺愈穴掐五指節合谷運八卦多揉大指根天門入虎口板門痰壅氣喘掐精靈穴再掐板門痰結壅塞多運八卦乾咳推六腑痰咳推肺經推脾清腎運八卦氣喘掐飛經走氣並四橫紋塗蔚生曰陳紫山此節症論多未精透參觀第三集咳嗽條自知腫脹門推法陳紫山曰古方有十種論症然脈浮為風虛沉伏為水病沉則脈絡虛伏則小便難即為正水脾脈虛大多作脾腫因循不治乃成水腫蓋脾屬土喜燥而惡濕土敗不能制水則停蓄不行留滯皮膚故作浮腫初得病時是眼胞早晨浮突至午後稍消然此症夏與秋冬治之頗易惟春不然蓋四時之水無如春水泛濫兼肝木旺而脾土受克不能制水所以難療進退不常徐徐調理取效大凡小兒浮腫先用發散然後以泄法治法推三關推脾土黃蜂出洞運五經紋二扇門掐威靈天門入虎口鬥時春夏用水秋冬用蔥姜真麻油調之再用酒一盞飛鹽少許皂角一片為末黃土一鍾同炒布包倒合掌心掐大指節即消塗蔚生曰腫以四肢言脹以心腹言雖同是脾胃主病而其中寒熱虛實亦無不參雜其間挾外感而發生腫脹者亦不過十分中之一二耳治之者必須審定此種腫脹是否有寒有熱有虛有實而為一種寒熱虛實之對待法方不至為病所誤而為紫山之先用發散後以瀉法所瞞也目疾門推法陳紫山曰小兒雙目忽然紅蓋因肝臟熱兼風散風清火斯為妙痘後須知宜別攻火眼之症治宜補腎水推天河六腑分陰陽運八卦推脾土水底撈明月合骨曲池肩井風眼之症治宜推三關揉腎掐五指節分陰陽運八卦推天河六腑水底撈明月合谷曲池肩井塗蔚生曰紫山只云風眼火眼之症而未云風眼究系何如火眼究系何若未免叫人難辨實則火眼色極赤而乾燥風眼色鮮紅而多淚也然火甚可以生風而風甚亦多含火也雜症門推法小兒頭瘡治宜推三關推肺經分陰陽推脾土揉太陽揉陽池小兒口內生瘡治宜退六腑分陰陽撈明月清天河水補腎水鳳凰單展翅小兒偏墜治宜推三關推腎揉板門分陰陽八卦打馬過天河三陰交承山穴外用艾茸為囊收腎卵子甚效塗蔚生曰三陰交在內踝螄骨上三寸乃足厥陰足太陰足少陰交會之點也小兒傍耳流膿治宜推三關六腑推脾土將耳珠揉用前補瀉法小便黃赤可清之治宜治腎水從小指尖往上推為清掐二人上馬運水入土如大小便俱閉則宜分陰陽為主小兒眉目不開治宜掐陽池宜久揉久掐再推四橫紋小兒口渴咽乾者氣虛火動也清天河水為主小兒四肢厥冷治宜推三關補腎土為主小兒口啞不能語言乃痰迷心竅也清肺經為主小兒手不能屈伸者風也宜威靈穴揉之四肢軟者血氣弱也宜補腎土掐四肢橫紋手捏拳者心經熱也急掐水底撈明月仍運八卦小兒頭痛揉臍及陽池外勞宮頭向上者宜補脾土運八卦為主小兒風症不省人事灸上星湧泉少商小兒發熱目上視宜瀉心經掐中衡穴橫門穴俟眼正起視方止小兒眼左視掐右端正眼右視掐左端正中指中節外邊是小兒吐血兩大指甲爪角後一韭葉許即母腮穴掐之母腮穴即是少商穴小兒汗多是腎虛推補腎水汗即止小兒日間病重宜抑陽夜重者宜抑陰小兒子時後火盛者是陽火宜瀉之午後火盛者是陰火宜補之小兒先熱後寒者陰乾陽宜先瀉後補先寒後熱是陽干陰宜先補後瀉小兒浮腫者脾土宜補陰陽宜分腎水宜先補而後瀉用燈火太陽五心脊背上各一燋自愈小兒五指節揉之可以化痰小兒三焦推之治心氣冷痛小兒命門推之止腰痛補下元小兒四橫紋重推可以通上下之氣血小兒板門重推可以止小腸之寒氣小兒之小天心重揉治腎水枯短小兒風池穴用針刺之可治眼痛頭痛塗蔚生曰風池屬於足少陽膽經少陽行人之側走上於頭此穴在耳後顳顬後腦空下發際陷中與啞門風府同刺為治中風口啞偏正頭痛一切風症之要穴啞門入髮際五分刺宜淺風府入髮際一寸刺宜稍深小兒三關灸之可祛腰背之風寒小兒崑崙穴灸之可救半身不遂大小便澀小兒曲池穴灸之可通肺臟氣血治麻痹半身不遂小兒泄瀉在龜尾骨上用艾火一燋可愈若大便多而穢者恐是陰脫多不治小兒吐症心窩上下燈火四燋如喝水多可推脾土小兒腳軟可於鬼眼穴上燈火一燋小兒手軟倒蹭後拐節灣上一燋小兒頭軟心臍上下燈火一燋小兒內熱外寒掐腎水即止小兒外寒內熱者掐陽筋汗出為度小兒作寒掐心經轉熱作熱掐腎經轉涼小兒口或閉多揉脾土心口燈火一燋亦有心窩揉者又有研硃砂一分吹鼻即開小兒上吐下瀉多推脾胃與分陰陽燈火五心提之肚上五火背上五火效塗蔚生曰上吐下瀉固有純屬陰寒者亦有多屬上熱下寒與寒熱參雜者必須將症認清因症施治方能取效萬不可冒用燈火以熱攻熱致誤兒命小兒囟門有紋如針入眼五色皆主死小兒鼻乾年長壽推下效或曰多推肺經以鼻乃肺竅故也小兒久揉脾土後心以肚響應之謂之內消小兒脊骨自下緩緩推上可使之吐大人亦然小兒足三里穴屬胃久揉止肚痛大人胃氣痛者通用小兒便祕者燒酒在腎俞推上龜尾膀胱推下承山但腳裡邊在承山旁抽骨處亦要推下此順氣之法可免急脹之患若要泄瀉亦要逆推使氣升而瀉而止小兒兩手交叉食指盡處為列缺穴可指頭頂面諸症手背掌後橫紋後二寸為外關穴治腰背痛大人通用小兒掐靠山合谷少商內關諸穴治瘧疾小兒精靈穴掐之可治氣喘口歪眼偏哭不出聲口渴小兒掐總筋推天河治口內生瘡吐熱人事昏沉小兒掐湧泉穴治痰壅重則灸之小兒揉二大指頭頂向外轉三十六隨掐之醒脾消食小兒板門推倒橫門可吐橫門推下板門可瀉二穴對掐之止吐瀉小兒運水入土治身弱肚起青筋曰水盛土枯小兒運土入水治腹內作脹眼睜曰土盛水枯小兒危症先劈面吹氣一口若眼皮連動眼睛活轉可救若魚目肝絶不救小兒生血順氣天門入虎口揉鬥肘小兒當時被嚇補童子窖以兩手提耳三四次即效小兒推拿不可拘於推三回一之說但推中回幾下便是小兒推法必是線形毋得斜曲恐動別經而招患也塗蔚生曰陳紫山以上各節多有會解之處豫雖極力領會恐仍有不能合其本意者然以詞意所在又不能不為牽強下去尚希海內名家隨時校正是所至禱查其所以錯誤之點多系傳寫之訛在出版者既系貪圖節省工費不顧謄寫之優劣而著作者又屬忘去自己心血不計刷印之精疵孰知一誤再誤伊于胡底錯誤縱可延長權力縱可拋棄嬰兒豈可長為誤治任其夭札乎余不辭血汗之勞謹為審正以公於世雖是否有當未敢斷定而我之一片婆心當亦為天下所共諒耳第三集治療法辨臍風夏禹鑄曰三朝之內便是臍風如七日之外定然不是前人只曰風由臍入以致撮口噤口並不曾說出一種理來余思嬰兒出世剪落臍帶帶口有水風因乘水由臍入腹然腹與唇舌相去太遠而唇撮舌強何故把賊邪逆犯之理一悟乃知風入於腹始附於肝肝木也風則附木而鳴目乃肝之竅兩眼角故有黃色風入於肝必逆犯於脾鼻準脾之屬故準頭又有黃色入於脾必逆犯於腎兩唇腎屬故色黃口撮入於腎必逆犯乎心舌乃心之苗故舌必強直到此風火交威亡之必矣豫悟臍風顛末至此自問亦不自知語曰思之思之鬼神通之殆此之謂歟臍風初發吸乳必較前稍松兩眼角挨眉心處忽有黃色宜急治之治之最易黃色到鼻治之仍易到人中承漿治之稍難口不撮而微有吹噓猶可治也至唇口收束鎖緊舌頭強直不必治矣一見眼角鼻及人中有黃色而唇不撮緊者曲小兒指揉外勞宮即用燈火於囟門眉心人中承漿兩手大指少商各穴一燋臍輪六燋未落帶於帶口火燃一燋既落於落處一燋共十三燋風便止面黃即退矣此火攻之法何異呂祖壺中藥盧公再生方哉願天下為父母者依豫著治即十百千萬億中斷無一孩死於臍風者塗蔚生曰脾在五行屬土以位置言則居四方之中故有以鼻診脾之說以開竅言則居於口故又有以口診脾之說其說雖異其理則一而夏禹鑄硬欲遷就五行生剋相傳之理以腎屬唇未免有誤蓋腎之分配宜居面部之頦下而其開竅則居於兩耳也再臍輪六燋者離臍不遠不近環臍一周排列圓勢而以火攻六下也陳飛霞曰臍為百風總竅五臟寒門道家謂之下丹田為人身之命蒂兒在胎時口鼻未通呼吸惟臍間真息隨母之呼吸為呼吸其下地囫底一聲氣通口鼻而胎元之一息不復為用矣遂寄於臍內一寸三分中虛一穴左青右白上赤下黑中央黃色八脈九竅經緯聯絡為真息往來之路坎離交會之鄉凡修煉仙胎皆從此處立基所以謂之命蒂故小兒初生惟臍之關係最重斷臍之時亦不可不慎或剪臍帶太短或結束不緊致外風侵入臍中或浴兒時牽動臍帶水入生瘡客風乘虛而入內傷於腎腎傳肝肝傳心心傳脾脾傳肺蘊蓄其毒發為臍風其症面赤啼叫者心病手足微搐者肝病唇青口撮痰涎壅塞者脾病牙關緊急者腎病啼哭不止者肺病五臟之症略見一二者猶可治悉見者不治又曰小兒初生惟臍風病為惡候其症有三曰臍風曰襟口曰鎖肚雖皆臍症而寒熱自別治則宜詳一曰臍風由斷臍後為水濕風寒所乘入於臍而流於心脾令肚腹脹滿吮乳口松多啼不乳此初起之時速用火攻散之若至氣息喘急啼聲不出或肚上青筋吊疝作痛此胎毒夾風邪入五臟外用火攻內服指迷七氣湯集成未詳若肚臍青腫口撮不開牙關緊閉口吐白沫爪青黑者皆不治一曰噤口其症眼閉口噤啼聲漸小舌上聚肉如粟米狀吮乳不得口吐白沫大小便不通遇此先看其上齶有點子即以指甲輕輕刮破以木香白叩仁各五分煎湯化下沆瀣丹動利臟腑氣順自愈一曰鎖肚由胎中熱毒壅盛結於肛門大便不通急令婦女溫水漱口吮兒之前後心並臍下及手足心共七處凡四五次外以輕粉五分研末蜂蜜少許溫水調服以通為度如不通更以蔥白三四寸長用油抹潤輕透穀道納入二寸許以通為快若至七日不通者死塗蔚生曰飛霞之所謂噤口即俗人之所謂鵝口飛霞之所謂鎖肚即傷寒之所謂陽明熱結飛霞以初生小兒不宜有此熱病硬欲將鵝口熱結二症牽入臍風以內是未免過於迂拘者也陳飛霞曰古人之論臍風謂皆由於水濕風冷所致豫則以為古論猶未盡也蓋臍風有內外二因有可治不可治之別外因者風濕所傷內因者稟受父母真陽不足也豫嘗見一婦産育十數胎皆男盡殤於七日內之臍風無存者若謂外邪所傷何以能傷此家之兒又豈無一兒能避之者此內因之顯而易見者凡男子之命門真陽不足者右尺脈必細澀無神生子必有臍風豫察之詳見之確非耳聞者比也其外因者病發於二三四五日之間病生於六腑故可治內因者必發於六七日之間病生於五臟故不可治曩者夏禹鑄有臍風之訣謂之三朝一七看兒兩眼角黃必有臍風不知稟受厚者生下即滿面紅黃乃為吉色誤認臍風其害不小此法不確惟令乳母每日摸兒兩乳乳內有一小核其候也然乳內有核發臍風者固多而復有不發臍風者此法十有七八亦有二三分不確但看小兒不時噴嚏更多啼哭吮乳口松是真候也宜急治之第臍風之治無一成法可遵雖有疏風攻下之法莫能濟急獨豫異授燈火無論臍風痙搐以及凶危險症用藥不能挽回者此火可以生之久經效驗未肯輕傳因見幼科不知火穴往往錯誤用之反致引動風邪蔽固火毒致兒身熱不退火毒內攻因多不救故不忍隱祕盡以吐露以公諸世世之幼科治病輒曰剪風截風夫剪者邀遏之謂也截者堵塞之謂也以火用於中宮任脈所行之地豈非遏堵其邪而犯關門逐盜之戒乎不知風邪之在人身善行數變無聲無形欲除其害無如疏條散達而去之不使久羈於榮衛經絡則善矣如仲景之治傷寒而立汗吐下三法邪在表者汗而散之邪之在上者吐而越之邪之深入者下而奪之總欲其邪盡而後已未聞有邀截者也而今幼科不但不為逐邪而反閉關絶險阻其去路使邪氣進不可退不能猖狂躑躅欲其不倒刃相攻斬關逆犯者不可得也此皆為治者釀成之禍害於邪何尤凡邪之傷人未有不從三陽而入驅邪之法亦必使其從三陽而出故此火穴亦惟三陽有之蓋欲引其出表斷不可使之入里也敬為圖說詳後塗蔚生曰小兒稟受真元不足固有發生臍風易為夭札然亦有由於父母中有梅毒傳至小兒生不數日而夭亡者此亦不可不知其狀生下三二日後滿身起有白點或間有紅點漸次不吸乳食白點亦漸變為紅點旋即夭亡其狀至慘為嬰兒之父母者可不慎歟用火口訣陳飛霞曰夫嬰兒全身燈火誠幼科第一捷法實有起死回生之功火共六十四燋陰符易數能疏風散表行氣利痰解鬱開胸醒昏定搐一切凶危之候火到病除用火之時倘值寒冬必於房中燃燒明火使兒不至受寒燈草大小適中以麻油燃用令老練婦人抱兒解衣去帽從左耳角孫起總依後之歌訣用之但用火不可姑息勿謂火數太多憫其難受蓋小兒受病由其經絡凝滯臟腑不舒以火散之正欲使其大叫大哭方得臟氣流通渾身出汗榮衛宣暢立時見功此火暗合周天不可減少否則不效若救臍風非此不可並列於後集成神火歌陳飛霞曰仙傳神火天然理始自角孫瘈脈起凡用燈火無論男女嬰兒皆從左邊起角孫在耳尖上瘈脈在耳後根聽宮曲鬢本神旁次及天容仍右取聽宮在耳以前曲鬢在鬢腳旁本神在額角天容在耳輪根下左邊已完右亦如此囟會承漿左肩井曲池合谷諸邪解囟會即囟門承漿在下唇宛宛中肩井在肩上宛宛中從左起故曰左肩井曲池在曲肘彎上廉曲縱處合谷在虎口上骨岐叉處氣關已過至神門右亦如此昏可醒氣關在食指第二節神門在掌後下廉鋭骨之端左完右亦如之右乳根中七燋始右亦如之何待齒自左乳根下邊從上至下七燋止右乳根下亦如之臍下陰交續命關平平三點凶危止陰交在肚臍下半寸用火三燋脊中身柱至長強肺俞陽陵承山當身柱在脊骨三節下從進上至下九燋止肺俞在兩飯匙骨縫中陽陵泉在膝外邊下三寸承山在腿肚盡處崑崙解溪丘墟穴湧泉右亦效之良崑崙在外踝骨後解溪在繫鞋帶處邱墟在外踝骨前湧泉在腳底下中心左腳完右腳亦如之塗蔚生曰飛霞此節名為異授不知果系異授抑是別有用意其火穴雖多而病至危急間亦可用蓋火攻可代藥之疏通臟腑也惟人身穴道最多非有直接師授頗難得其真諦古圖既形舛錯此圖亦多模糊豫於其圖則刪之於其注則補之非略之也實以此種穴道非區區之圖所能盡其曲折耳查合谷穴乃大指根骨與次指骨二者二交之間也曲池穴須拱手取之乃肘外輔骨曲肘橫紋頭陷中也乳根乃陽明胃經所主由乳頭正中往下一寸六分則為乳根穴余俱每往下一寸是一穴故彼注云從上至下七燋止但尺寸法須依其本人中指正面之中節兩橫紋相距之間則為一寸也身柱系背之脊骨第三椎須由兩肩平行計算由身柱而下五椎是神通穴六椎是靈臺穴七椎是至陽穴九椎是筋縮穴十一椎是脊中穴三十椎是懸樞穴十四椎是命門穴十六椎是陽關穴二十一椎是腰腧穴脊骶骨端是長強穴余則無穴除身柱長強而外尚有九穴注為九燋想是除去身柱長強而外耳肺俞穴亦須由脊骨算起自第三椎骨兩旁相去各一寸五分則為肺俞穴也用火宜忌陳飛霞曰平素産子有臍風則胎胎不爽於産下第二日勿待其發先以此火散之百不一失胎兒生下多啼不乳噴嚏呵缺吮乳口松即是臍風將作急以此火治之凡兒病面青黑扭項搖頭仰身擦面或眼青怒視或左右斜視或上下竄視或兩目連眨或頭項牽強捲舌露睛噓風撮口啼哭咬人或手如數物或兩手牽引或兩足跳掣忽擾忽亂失張矢志但覺精神與常有異者由從前表裡不清將欲作痙此火至妙傷寒已痙角弓反張眼目斜視左右搐搦但中惡容忤癇證與食填太陰及一切風閉火閉痰閉氣閉乍然卒死者此火最神食傷脾骨肚大筋青於端午日午時用全身燈火後於青筋開叉處以火截之一叉一點其肚自消風寒痰氣閉塞之症此火實有神功凡用燈火既完候兒啼哭已定即用金粟丹半丸集成未詳薑湯化服服後以衣裹之蒙其頭面令之安臥片時以復其神志其病如失小兒四時感冒傷寒汗出大小便調唇舌如常口不作渴此表病輕症也疏散之則愈忌用燈火小兒邪已入里身熱面赤口渴大小便閉唇焦舌緊眼紅或手足心熱夜熱煩焦舌上黃苔揚手擲足掀衣掀被此里症內熱清利自愈切忌燈火小兒大病久病身體怯弱面目青黃唇舌自瑩搖頭斜視昏睡露眼形骸消瘦聲息輕微自汗盜汗或一切嘔吐泄痢痘麻瘡癰久咳久瘧失血之後精神疲倦乳食減少指紋沉細六脈無神此皆極虛之症切忌火攻慮其升散故也一切久熱消渴疳症形骸黑瘦毛髮焦枯由陰枯血弱虛熱所為切忌燈火塗蔚生曰嬰兒之用燈火猶傷寒之用麻姜附非病為陰寒固不可用而非病至危急尤不可用故除臍風而外用者頗少然亦以夏禹鑄之臍風燈火為簡妥醫者須於此等界限認清方不至誤兒性命至其所謂宜燈火之客忤症與火痰閉症則未免失之過當蓋客忤為一種穢惡毒厲之氣多系熱亢只宜清解而火痰閉症則又只宜清利者也小兒初生臍風簡便方陳飛霞曰小兒臍風撮口用完全生蔥二根搗爛取汁又以直殭蠶三個炒去絲研極細末以蔥汁調勻塗兒母乳頭上令兒吮之或灌兒口內小兒臍風撮口以艾葉燒灰填臍上以帛縛之若臍帶已落用蒜切薄片貼臍上以艾火灸之候口中有艾氣立愈小兒噤風初生口噤不乳蟬蛻十四枚全蠍去尾毒洗去鹽泥十四枚炒乾為細末入輕粉三分每用一匙乳汁調灌即愈小兒撮口但看舌上有瘡如粟米者是也以蜈蚣炙焦研末敷瘡上撮口噤風面黃色氣喘聲不出由胎氣挾熱流毒心脾故令舌強唇青口發噤用直殭蠶二枚去嘴略炒為末蜜調納兒口中小兒十日內口噤不乳取大蜘蛛一枚去足炙焦研細末入豬乳一小杯和勻分作三次徐徐灌之神效無比小兒臍瘡及膿出血用海螵蛸胭脂共為末以油潤瘡乃搽藥小兒齒根邊生白點名馬牙啼哭不吮乳即看口內堅硬之處或牙根邊白點將針挑破出血濃煎薄荷湯磨京墨調勻以指攪過再以産母亂髮蘸墨滿口搽之仍用新青皮蘸溫水展口即愈塗蔚生曰以上簡便諸方頗多奇異之處效否固難斷定姑存之以備參考因臍風為小兒最危險最迅速之症也小兒內有積熱固可發生白點成為馬牙然積熱過甚亦多有發生鵝口疳者此症頗為險惡不得治法傷兒亦速其症多在小兒初生百日內外間有二三歲亦患此者初起時口中發生白點逐漸增多拭之即去少刻即有滿口纏遍內竄入候日夜啼哭不乳食俗名雪口又名敷口白實則鵝口疳之義也方用黃連甘草等分煎湯以綢裹指拭去取桑皮中白汁塗之即愈或用陳墨敷之亦效再以益元散燈心湯送下則不復發兒稍大者則以生地元參杭芍薄荷桔梗梔子寸冬連翹甘草等味與之煎服以期速愈嬌兒易死說塗蔚生曰所謂嬌兒者富貴之子也嗣艱之子也數門一息之子也惟其兒嬌則父母愛之之心切惜之之心深平時任其飲食隨其嗜好姑無論矣一旦諸病作焉則冀其抱病之子立刻是一無恙健兒慮其飲食不進也則為之已進一糕午進一餅慮其寒熱不退也則為之申進一湯酉進一藥於是甲醫方去乙醫復來此藥剛下彼藥又至卒使藥與藥戰傷其臟腑斃其性命而後已嗟夫嬌小嬰兒何堪許多之藥柔脆脾胃那堪沖逆之來至此而尚不知悟猶謂吾之嬌愛之兒藥之不急治之未周乃系耽擱誤事豈不是一天下至愚且惑之人哉吾今願為天下之為父母者進一忠告凡兒無病則已如有病焉則除審慎延醫用藥外切勿亂為請醫急為調治蓋欲使醫者得盡其所長而藥得展其所能事也吾今亦願為天下之為醫者進一忠告前治不當則已如其當焉則須猛力為之解說使其勿輕易方切不可貪圖細微診費與之胡亂開方致誤兒命蓋欲使前醫之有以施其長而吾之長亦即顯也我之風症談塗蔚生曰自黃帝有風論篇仲景有傷風說風病之名遂成千古不磨然而後之習醫諸家亦即因此互相立論互相眩迷矣有謂風為陽邪者有謂風為陰邪者彼云此誤此議彼非卒使最易瞭解之風字成一群醫爭訟莫結之案豈不大可怪哉逮至近代西學輸入而醫學高明之唐容川始將西說參合言空中之氣有冷熱二種空氣熱則漲而上升他處冷空氣即來補之試於門中熱火門之上下各有孔則上孔之熱氣必外出下孔之冷氣必內入成風之理與此相同因此成兩種風一為自冷處吹向熱帶之風一為自熱帶吹向冷處之風是成風之理已可得其梗概然其解內經之東方生風為應春氣陽回陰退之象是其猶未能將先聖成風之奧旨闡發無遺而明乎天地之底蘊者也豫以個人之研求體先聖意義之所在謹敢直抒管見而為風症之談雖是否有當不能無後賢之指摘而見之所至實亦曰不敢自己云爾夫風者乃空氣之被牽引而流動以變其常體者也有寒有熱有緩有速不可以寒拘之亦不可以熱拘之不可以陽拘之亦不可以陰拘之先聖名之曰風蓋已以包乎寒熱二者在內與包乎寒熱平均之和緩亦在內也大地之上惟空氣為最多故亦惟風為最甚然風不自成必有使之所以成者而後得行其撼山搖海之威翻天覆地之狀推厥其物則惟日球蓋日球為陽熱凝聚之一大火體其積較地球為大有蒸曬調劑空氣之力有旋轉左右空氣之力其將空氣蒸曬至熱也則空氣失其常度隨陽熱之蒸發由至靜而變為至動成為一種熱風如西人之所謂熱則澎漲容川之所謂自熱處吹向冷處之風是也其將空氣不能蒸曬為熱也則空氣亦失其常度隨陰寒之凝聚亦由至靜而變為至動成為一種寒風如西人之所謂冷則收束容川之所謂自冷處吹向熱帶之風是也吾人試於平旦無風之時觀之見天地清闊本一儼然空氣靜寂之天地也而霎時旭日東升空氣融和漸由溫暖變而為亢烈即覺有微風生焉此即東方生風空氣隨太陽為轉移之一驗也如日被云掩或淪胥西沒則空氣由和暖而變為寒冽亦覺有微風生焉其他暴風旋風等類亦無不繫空氣隨太陽熱度之增減以為轉移進退者矣俗語有開門風關門息關門風開門息之說實則內經東方生風之義而兼含有風之成息之理不過識見尚淺未能將其所以成息之理說出耳而昧者不察以為東方即為生風之處毫與太陽無涉不亦惑乎豫言未竟客有笑於豫者曰古人云東方為震震為木木生風子言東方不能生風得勿木能生風乎曰非也木者風之標也空氣者風之本也然空氣亦非真本太陽則其本中之本耳試思地球之上本木最多然參差於木之間者何物無有不過木體為最高可以代風之揚威耳若曰除木而外湖海不為之激蕩而揚波房屋不為之吹噓而震動此則必無之事伐木以止風竭澤以理痰是何異揚湯止沸故仲景治風大劑之桂枝湯除桂枝祛風白芍扶肝而外余則姜甘大棗俱系溫理脾胃之藥然亦即合助火熱以化陰寒之藥也入稟天地之氣以生雖名為小天地實則與天地有異天地寒熱之風既能傷及萬物而人之元氣有虧亦能受風之襲擊而成病故有元氣本寒又感寒風而病寒者如桂枝湯是也亦有元氣本熱又感熱風而病熱者如風引湯是也如謂風為陽邪則不宜有桂枝湯之用桂枝生薑如謂風為陰邪則不宜有風引湯之用大黃石膏是風之有寒有熱於此益彰天地體人之微生長防風桂枝等類以治寒風又生長天麻白頭翁等類以治熱風是誠天地造化之妙無美不具人體造化之妙因症制宜而利用之道亦可謂無奇不偶矣然感寒而病寒風感熱而病熱風此尚為風之正面非風之對面者也今試再為風之對面者言之人之心臟猶夫日球本以化生血液溫養肢體設也寒為之積火熱不能行其職權則臟腑為之陰凝肢體為之收引而寒風暴然作矣治之之法則惟有疏寒以解之助熱以化之寒退熱盛而風自息設也熱為之熾水陰不能行其既濟則臟腑為之陽亢肢體為之炙灼而熱風暴然作矣治之之法則惟有清熱以降之助水以潛之熱退陰盛而風亦息此皆風之由於內因而為風之對面者也其他若吾人素患陰虛陰液漸形消涸肢體漸形羸瘦俄而舌黃面赤大渴引飲煩躁抽掣坐臥不安甚或昏迷不醒此亦熱風暴發之候急宜滋陰以啓生化之源並宜重用苦寒以降其上亢之火陰滋火潛標風自減若夫病始而為寒風病終而為熱風則非由於外感之傳變汗出過多津液為之涸竭即由於過服辛熱以傷水泉之源也若謂吾兒未出門戶未食生冷過熱等物何至有寒風熱風之感傷是則拘迂之談未知常變者也豫曾親治數兒未出戶門未食生冷而病寒風者以桂枝防風羌活葛根白芍生薑大棗等味而獲愈者余又曾親治數兒未出戶門未食辛熱而病熱風者以生地白芍川芎黃芩黃柏天麻白頭翁甘草等味而獲愈者是豈人事之使然哉夫亦曰履霜堅冰非一朝一夕之故矣仲景桂枝湯桂枝一錢白芍一錢甘草一錢生薑一錢大棗一枚塗蔚生曰上五味為仲景治傷寒風之主劑量小兒之大小以為藥之重輕服藥已須啜稀熱粥以助藥力不可令汗太過重傷津液夫風之所以有汗者以手太陽小腸與足太陽膀胱同司太陽經絡膀胱化氣護外為衛小腸化血布內為營猶主之有正副物之有表裡也先賢僅以六臟各配一腑相為表裡余以謂猶未盡曲微不如以其各經氣之所主尚分一個正副表裡也傷寒是太陽膀胱之正表受病太陽膀胱既化生真陽之氣以為衛外衛陽虛招外寒則寒邪寄居皮毛而毛孔閉塞故無汗傷風是太陽小腸之副里受病小腸化生真陰之血以為營內營血虛招外風則風直達營內而衛氣無所依歸故有汗汗者乃衛氣之變體如空中上升之氣遇冷變而為雨口鼻之氣著漆石復化而為水珠也古人云無汗用麻黃有汗用桂枝於風之治法固已得要略而以肝木生風之說白芍平肝之用便泥於營血是肝血所主治風專責之肝將底面之太陽小腸拋去未免可惜蓋肝雖是藏血之臟而小腸則為生血之陽腑風既有傷營血而小腸亦不能辭其責也柴胡桂枝湯方柴胡一錢桂枝一錢白芍一錢黃芩一錢黨參一錢半夏七分甘草一錢生薑一錢大棗一枚塗蔚生曰此湯雖系仲景治發熱惡寒支肢煩痛之太陽症與治嘔而心下支結外症未去之少陽症而以之治小兒大人傷風之症頗多奇效不過須依時氣之冷暖因症之增減以為權變耳如時令燥熱可將桂枝易以防風荊芥等味如舌苔焦黃大渴引飲可將半夏易以知母花粉甚則石膏亦可加入生薑亦可減去如腹中痛者可去黃芩將白芍加重如咳者可加杏仁五味如心下悸小便不利者可去黃芩加茯苓用之得當即為治風之神方人每疑柴胡為治少陽傷寒之主藥不可以之治風是其泥於少陽傷寒切忌汗下之說而不知尚有少陽傷風者也夫風既入少陽故亦時形惡寒時形發熱出汗柴胡秉少陽春木之氣直進少陽經絡而佐以祛風之味使風之由腠理而入內者仍由腠理而出外是柴胡得桂枝防風等味之援助而益肆其散寒之威而桂防等得柴胡之嚮導而愈著其去風之力也先賢有云運用之妙存乎其人其此之謂歟金匱風引湯大黃一錢乾薑一錢龍骨一錢桂枝一錢甘草一錢牡蠣一錢寒水石一錢滑石一錢赤石脂七分白石脂七分紫石英六分石膏一錢清熱去風湯天麻一錢白頭翁一錢川芎七分黃芩一錢黃連一錢梔子一錢連翹一錢當歸一錢白芍一錢甘草一錢塗蔚生曰此方為豫平日之經驗所立為治熱風之主劑昔人只知有寒風不知尚有熱風然其所用之藥亦多有芩連等味不過其拘於寒鬱生熱之說未知熱極所生之風亦多系熱風耳查其所稱驚風丸即系治熱風之藥惟其稱此種丸藥可治急慢驚風遂使此種魔術傳至鄉里印入俗人腦海奉為金科玉律百折不磨遺害無窮此誠最可痛恨者也不知寒風之與熱風猶水炭不可同爐寒甚風固急起熱甚而風亦可急起用寒藥以治熱風用熱藥以治寒風是則調劑其偏寒偏熱不平之氣使之歸於平耳但未有聞治寒之藥可以治熱治熱之藥亦可治寒者也為此說者既不考其自相矛盾而聞其說者亦隨聲附合不辨真僞是何愚之甚耶願天下之為醫者直斥其非使鄉間盡知其訛是則天下嬰兒之幸亦天下為父母者之幸也地黃去風湯生地一錢玄參一錢白芍一錢萸肉一錢丹皮一錢山藥一錢茯苓一錢知母一錢黃柏一錢黃連一錢天麻一錢川芎六分白頭翁一錢貝母一錢甘草一錢柴胡一錢塗蔚生曰此為陰虛火旺而生熱風之方亦系本余平日經驗所立大人此症最多小兒頗少夫陰虛之所以生火者因水火雖是一家實則相濟為用如水陰虧損不能上濟火化心火猖獗煎熬陰液漸形竭蹶逮三陰俱傷內部純是一團枯槁無依之火氣則飛揚上越發而為風悲號狂呼間類六畜之鳴抽掣搐搦儼如諸寒之引此時平肝以止風則非根本之治理脾以祛痰則系速亡之療惟滋陰以治其本清熱以治其標庶克有濟至佐以去痰除風之藥則系標中之本耳我之驚症談塗蔚生曰驚者何人之內部魂魄神三者卒然受一驚恐可怕之事而失其常度也何以言之魂為陽氣附麗於肝血之上魄乃一塊血質依寄於肺氣之中乃一點湛然朗潤之陰血出藏於心臟之間是為以陽附陰以陰附陽也如猝遇驚恐則魂魄為之飛揚心神為之喪失即為受驚後所得一種之氣血散失也古時諸醫均將驚風合為一症是以風之發熱煩躁心神不安類似乎驚誤之也而後之受其誤者深知痛恨悔改又謂無驚之可病驚為純屬一種虛妄是其尚未徹底考查仍為誤也實則風自風驚自驚風之不可為驚猶驚之不可為風固有先風而後驚者如既感寒風復受驚恐者是也亦有先驚而後風者如既受驚恐復感寒風者是也然此則不過百分中之一二耳安得將天下患風之兒盡括之為驚乎又安得將天下患驚之兒盡括之為風乎更又安得將天下之兒一切病症盡括之為無驚乎近代西醫盛行皆謂人無驚症之可能病然試問其吾人夢寐之時恍惚若有所見並恍惚若有所記俄而登山涉水俄而越牆走壁俄而喜笑怒罵俄而憂愁思慮俄而散步閒遊俄而餓渴飲食是果孰使之然哉則西醫多不能答間有能答者亦不過以神經錯亂為解並未知有魂魄神三者之作用也小兒內臟既無健全肢體即見充足故其受驚之處較大人為獨多余曾親見大人因受驚恐而卒死不救者余又曾見小兒因受驚恐不思飲食日見消瘦多藥不效而用鄉俗喊魂之法得以安全獲愈者是又果孰使之然哉豈非魂魄神三者之作用耶此等症治余擬以潞參當歸白芍琥珀硃砂茯神甘草等味以治之蓋以潞參可招失散之氣歸芍可補飛蕩之血猶恐猝忽血越神蕩不能無瘀滯之血而以琥珀之可以消瘀安魂定魄者療之更以硃砂以安之茯神以寧之務使其氣血復原神與魂魄各安其宅行其固有之職權而後已但未知此等見解有合實用與否治慢風心得神方節録莊一夔福幼篇莊一夔曰慢風之症緣小兒吐瀉得之最多或久瘧久痢或痘後疹後或因風寒飲食積滯過用攻伐腸脾或秉賦本虛或誤用涼藥或因急驚而用藥攻降太甚或失於調理皆可致此症也其症神昏氣喘或大熱不退眼翻驚搐或乍寒乍熱或三陽晦暗或面色淡白青黃或大小便清白或口唇雖開裂出血而口中氣冷或痢瀉冷汗或食穀不化或四肢冰冷並至腹中氣響喉內痰鳴角弓反張目光昏暗此虛症也亦危症也俗名謂之天吊風虛風慢脾風皆此症也若再用寒冷再用消導或用膽星抱龍以除痰或用天麻全蠍以驅風或用知柏芩連以清火或用巴豆大黃以去積殺人如反掌實可畏也若治風而風無可治治驚而驚無可治也此實因脾胃虛寒孤陽外越元氣無根陰寒至極風之所由動也治宜先用辛熱再加溫補蓋補土即所以敵木治木即所以治標凡小兒一經吐瀉多作即是危險之症若其屢作不止無論痘後疹後病後不拘何因皆當急用參朮以救胃氣薑桂枸熟等藥以救腎氣不惟傷食當急救之即傷寒傷暑亦當急救之蓋其先雖有寒暑實邪一經吐瀉業已全除脾胃空虛倉廩空乏若不急救恐虛痰上湧命在傾刻矣庸醫不明皆誤指為食為熱投以清火去積涼血立時告變為之奈何與其失之寒涼斷難生活不若試之溫補猶可救療此語發明吐瀉慢風之理最為明透後之君子願勿忽諸今將慢風辨症臚列於後慢風吐瀉脾胃虛寒也慢風身冷陽氣抑遏不出也服涼藥後往往至此慢風鼻孔煽動真陰失守虛火爍肺也慢風面色青黃及白氣血兩虛也慢風口鼻中冷氣中寒也慢風大小便清白腎與大腸全無火也慢風昏睡露睛神氣不足也慢風手足抽掣血不行於四肢也慢風角弓反張血虛筋急也慢風乍熱乍寒陰血虛少陰陽錯亂也慢風汗出如洗陽虛而表不固也慢風手足瘛瘲血不足以養筋也慢風身雖發熱口唇焦裂出血卻不喜飲冷茶水進以寒涼愈增危篤以及所吐之乳所瀉之物皆不甚消化脾胃無火可知唇之焦黑乃真陰之不足明矣慢風囟門下陷虛之極也莊一夔曰大凡因熱不退及吐瀉而成者總是由陰虛陽越必成慢風並非感冒風寒發熱可比故不宜發散治宜培元救本加薑桂以引火歸元必先用辛熱衝開寒痰再進溫補方為得法塗蔚生曰莊一夔之所謂慢風即余之所謂寒風與熱風相反者其實寒風熱風俱各有急起慢起二種此則虛寒慢起之一種由漸而至劇者莊一夔原文慢字下本系一個驚字余以其與風字有別全為易去非妄之也實欲提清風字眉目耳莊一有知亦當諒我至其以脾胃虛寒之昏睡露睛解為神氣不足亦尚屬一間未到蓋上下眼皮屬脾胃脾胃虛寒收縮而眼皮亦收縮露睛也莊一夔逐寒蕩風湯胡椒炮姜肉桂丁香上四味諒兒之大小酌加藥之輕重以灶心土三兩煮水澄清煎藥大半茶杯頻頻灌之接服後方定茯奇功莊一夔曰此方藥性溫暖專治小兒氣體本虛或久病不愈或痘後疹後或誤服涼藥泄瀉嘔吐轉為慢風清熱散風愈治愈危速宜服此能開寒痰寬胸腸止嘔吐蕩風邪所謂回元氣於無有之鄉一二劑後嘔吐漸止即其驗也認明但系虛寒即宜服之不必疑畏也莊一夔加味理中地黃湯熟地一錢當歸一錢萸肉一錢枸杞一錢白朮一錢炮姜一錢黨參一錢炙草一錢棗仁一錢肉桂六分炙黃耆一錢外加生薑大棗核桃肉為引仍用灶心土煮水煎藥取濃汁一杯另加附子數分煎水攙入量兒大小分數次灌之如咳嗽不止者加罌粟殼金櫻子如大熱不退加白芍泄瀉不止者如丁香只服一劑即去附子只用丁香數粒蓋因附子大熱中病即宜去之也如用附子太多則小便閉塞不通如不用附子則沉寒臟腑固結不開如不用丁香則泄瀉不止若小兒虛寒至極者附子不妨用至一二錢此所謂神而明之存乎其人用者審之此方乃救陰固本之要藥治小兒慢風稱為神劑若小兒泄瀉不止已甚者微見驚搐胃中尚可受藥吃乳便利者並不必服逐寒蕩風湯只服此方一劑而風定神清矣如小兒尚未成風不過昏睡發熱或時熱時止或日間安靜夜間發熱及午後發熱等症總屬陰虛均可服之若新病壯實之小兒眼紅口渴者乃實火之症方可暫行清解但系實火必大便閉塞氣壯聲洪且喜多喝冷茶水若吐瀉交作則非實火可知矣此方補造陰陽所不足實回生起死有神功倘太虛之後服一劑無效必須大劑多服為妙莊一夔曰此方助氣補血卻病回陽專治小兒精神已虧氣血大壞形狀狼狽瘦弱至極皆可挽回之如法濃煎頻頻與服參天救本之功有難以盡述者塗蔚生曰慶一夔此節之證論方治頗著巨效足徵其平素經驗極有心得可謂余之以前證論方治是一個療風的標本對字亦可知用藥猶夫用兵總宜使用活法不宜使用礙法知風之有寒熱二種即知宜寒者之不可以熱宜熱者不可以寒亦即知虛者之不可以瀉實者之不可以補悟透天時固為妙穎瞭解人事的是高明如必吟定風之種類有若干風之形狀為何若是則緣木而求魚終無異膠柱以鼓瑟傷寒塗蔚生曰天地六淫之氣病人以風寒最甚而獨多治之得當療如反掌治之失當其後演成虛實厥亡等症誠非臆及所能道者張仲景之傷寒論以風寒溫為三大提綱而以傷寒居首蓋亦以其為百病之導火線而生死即繫於此幾微樞機也然其謂傷寒為脈浮頭項強痛而惡寒傷風為脈緩發熱汗出而惡風溫病為發熱而渴不惡風是其將三者之顯明界限又為劃分真確者也風溫二者余已有另條專釋茲將傷寒一症略為節疏以最簡單之賅括作治者之指引夫亦曰變化之妙存乎其人耳經云太陽之上寒氣治之以其本寒而標陽也蓋足太陽膀胱與手太陽小腸合化吾人飲入之水透出內外油膜以為周身衛外之氣若空中寒氣襲入皮毛而衛氣不能抵抗則寒氣滯於皮毛之內而為病矣其脈浮者以衛氣行於脈管之外雖為寒氣外束而尚欲鼓動外出也其頭項強痛者以三陽之氣皆上於頭今太陽衛氣為寒所閉已上者不能輸出衛外未上者不能上走頭項故發生疼痛也其惡寒者以太陽化生衛外之氣不能外出以護表也其後尚有發熱背強𠘧𠘧逆滿咳嗽等症亦無不以太陽之受寒氣為使然也蓋太陽既化氣衛外而寒邪束於其表其勢欲出不得欲返不能不得不逞其溫熱之力以為抵禦之奮鬥也其背強𠘧𠘧者以寒氣既入皮毛而後入於經輸經輸不能轉運自如也其逆滿咳嗽者以衛氣不能外出壅塞於肺臟膈膜也茲舉仲景治傷寒之要者二方摘録於下以後見症用藥全憑因時因病以為加減更換耳仲景麻黃湯麻黃一錢桂枝一錢杏仁一錢炙甘草一錢塗蔚生曰上四味先以水煮麻黃去上沫後納諸藥合煮去滓溫服覆取微汗為仲景治傷寒之大法如頭項強痛惡寒無汗者是也然桂枝湯可以無麻黃麻黃湯卻不可以無桂枝因傷風是病在肌肉一層桂枝既直走營血即可療風邪之在營血也傷寒是病在皮毛一層較肌肉為外麻黃力雖猛峻可以直走衛氣然其由內達外非從肌肉不能經過若無桂枝以為之助則恐其力縱猛峻亦不能直達肌肉之營血以達於衛氣之皮毛也仲景葛根湯葛根一錢麻黃一錢桂枝一錢白芍一錢炙甘草一錢生薑一錢大棗一枚塗蔚生曰此湯之煎法服法俱如前即前方合桂枝湯去杏仁而加葛根也其所以加葛根者因寒邪既入皮毛而復入經輸項背強𠘧𠘧也於此足見仲景治病總是叫人使用活法不是叫人使用礙法添一症則添一藥去一症則去一藥有傷風之發熱惡風汗出等症則有直入肌肉營血之桂枝湯有傷風之發熱惡風汗出而兼項背強𠘧𠘧等症則有直入肌肉兼入太陽經脈之桂枝加葛根湯有傷寒之發熱惡寒身痛等症則有直走皮毛之麻黃湯有傷寒之發熱惡寒身痛而兼項背強𠘧𠘧等症則有直入皮毛兼入太陽經脈之麻黃加葛根湯推其喘滿而加杏朴脹滿而加苓朮無不隨其症之所在以為藥之增減也學者能以舉一反三自有無數法門又何至開卷瞭然臨症盲然而胸中毫無所主者哉再若病人體壯而感寒輕者可用小柴胡湯加防風荊芥葛根等味以治之熱稍甚可去半夏酌加苓連寒稍甚可酌減黃芩亦甚穩妥痙病塗蔚生曰痙之為病由於發汗太多以傷衛陽之氣或風病下之而過傷其陰營之血也如仲景所云太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出而不惡寒者名曰柔痙夫痙而曰剛曰柔乃從太陽之傷寒傷風症夾瀉而出其別於痙之正病非痙之正證可知故其下文又曰太陽病發汗太多因致痙夫風病下之剛痙復發汗必拘急瘡家雖身疼痛不可發汗汗出則痙是痙之由於血枯津少不能榮養筋脈已可概見然猶恐醫者之過於拘泥不能隨症變通故其後又曰太陽病其症備身體強𠘧𠘧然脈反沉遲此為痙栝蔞桂枝湯主之太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之痙為病胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯以見痙之不可汗者而有時症兼太陽之寒凝筋脈者亦可汗之痙之不可下者而有時症兼陽明之熱灼津液者亦可下之其正治之法雖未揭明而其曰下之則痙汗出則痙是明教人以治痙之正法不可汗下只可生津液和筋脈者也漢後諸醫多昧於其借賓定主之文而不能將此中奧義詳為指出甚至有除卻剛痙柔痙之外尚有陽痙陰痙之說者殊屬可怪至近代之唐容川出焉始能將此中精微揭出誠可謂獨具慧眼啓千載之昏瞶振萬古之迷濛者矣余於讀客川此節之所得謹撮其要以為痙症之談仲景栝蔞桂枝湯即桂枝加栝蔞一味塗蔚生曰栝蔞桂枝湯與葛根湯為仲景治傷風傷寒而兼有痙病者非治痙之正方也一則重在栝蔞生津止渴大清陽明之熱一則重在葛根疏通經脈直解太陽之寒然細揣此中定義治痙之正病用藥當不外柴胡葛根當歸白芍生地川芎黃芩黨參石膏知母花粉甘草等味恍如前之治虛熱生風者既不患重傷津液之戒又不患風寒凝於經脈之嫌若人民既受禍災以後圖一善後補救之方也仲景大承氣湯大黃一錢厚朴七分枳實七分芒硝一錢塗蔚生曰此方為仲景治傷寒傳於陽明稟熱太甚全無外症而有大便不通發熱胸腹脹滿等症者以之治病在經脈血虛經燥者得勿患虛虛之戒乎然裡熱過劇津液實受其傷火熱一時不降則津液一時不生下一分之火熱即所以保一分之津液也其曰可與二字蓋亦云內熱甚於外之症在經脈到了危險萬分之時不得不挺而走險出於下之一途耳如吾人以識見未及不敢作冒昧可以生地杭芍當歸川芎等味加入以固津液逮其內熱已清再為從事養陰血和筋脈可也溫病周夢覺曰冬月傷於寒即病者為傷寒不即病而伏傷於中至春隨陽氣發見者為溫病其症頭痛項強與傷寒無異唯初起不惡寒便發熱脈數為異耳傷寒由表入里不得不先發其表溫病由里達表不得不先清其里所以溫病有誤汗無誤下之語仲景著傷寒一書自秋分後至春分前為止若春分後則為溫病矣內經雖有先夏至日者為溫病之文仲景雖有太陽病先發熱者為溫之論晉唐以來無人別晰傷寒溫病概以傷寒書治之得失參半治此症者茫無主張延至於金劉河間出始作溫論有明喻嘉言復暢其說溫病乃有圭臬而仲景之書亦得以昭著於世當此韶光明媚之天三陽出於地上日麗風和花香鳥語一片春溫之氣盎盎蓬蓬故病亦名之曰溫輕則白虎湯黃芩芍藥湯葛根升麻湯重則三承氣湯無不應驗間亦有先惡寒而後發熱者仍以傷寒治之又曰冬不藏精春必病溫蓋冬主閉藏漏泄春光邪之所湊其氣必虛古人婚姻六禮定在夭桃之時良有以也余則謂熱蘊之至必致煎熬腎水遇體之充足者但以前湯治之倘體之虛怯者不問精之藏與不藏前湯中重加生熟二地以培其本則二說不相岐而相為用矣何必如喻嘉言之分疏其說也乎塗蔚生曰查仲景傷寒論中只有太陽病發熱而渴不惡寒者為溫病之說並無自秋分後至春分前為止若春分後則為溫病之說不知夢覺是否出自別有經本抑是根據他人臆說惟其說頗佳總算瑕不掩瑜人參白虎湯人參一錢石膏一錢知母一錢粳米一錢炙甘草一錢大承氣湯見前痙病方內小承氣湯大黃一錢厚朴七分枳實七分調胃承氣湯大黃一錢芒硝一錢炙甘草一錢大棗一枚黃芩芍藥湯黃芩一錢芍藥一錢炙甘草一錢葛根升麻湯升麻六分葛根一錢芍藥一錢炙甘草一錢瘟疫周夢覺曰春溫夏熱秋涼冬寒乃天地之正氣人感之而病者為正病久旱亢陽淫霖苦潦雨暘寒燠之不得其正者為四時之沴氣氣輪歲會運值天符水火木金之各據其偏者為八方之厲氣合沴與厲釀而為毒人感之而病者為瘟疫雜見於四時在春謂之春溫在夏謂之熱病在秋謂之晚發痢亦名晚發在冬謂之寒疫內經著於岐伯爰詳五疫之文周禮掌於方相聿嚴逐瘟之令其為瘟也稱名攸異大頭瘟軟腳瘟蝦蟆瘟疙瘩瘟其為斑也形容各殊赤霞斑紫金斑緑雲斑黑砂斑互相傳染大小相似初起邪氣客於募原難經六十七難注五臟之募皆在腹五臟之腧皆在背原即腧之根本募原軀殼之裡經脈所繫之處頭微痛或不痛微惡寒或不寒但一於熱脈數無倫沉沉默默到夜尤甚郁遢之極邪從表出謂之外潰或大汗鼻血隨汗與血而解若邪侵胃腑則內潰矣瀉則完穀不化結則堅硬如石胃枯腸腐舌黑唇青無所不至是為天地之毒氣常以肅殺為心激一己之心肺肝腸魂飛魄走捧心憔悴之形愁雲遍野環四境之鄉閭里黨鬼哭神號滿目淒涼之色毒霧蔽空惟不知其毒而妄治之盈城盈野死於非命知其毒而善調之沿門沿戶立起沉疴其在未潰之初毒猶盤踞募原驅伏魔全憑草果破堅壘須藉檳榔毒而外潰漸殺其勢矣即貝母柴胡可以和其事毒而內潰愈縱其悍矣非芒硝大黃奚能奏其功知斯三門病無遁形設方攻毒妙在一心夫瘟疫乃四時不正之氣溫乃四時之正氣性命攸關最宜分別景嶽瘟疫門中抄寫溫病及傷寒之經文雜湊成章毒害蒼生者莫此書為甚陽犯醫門之刑擢髮難數陰設海底之獄阿鼻難逃若吳又可其於瘟疫根源雖未必解透而其治法劉李朱張而下實為岐黃功臣吳義可達原飲檳榔一錢草果一錢厚朴六分知母一錢白芍一錢炙甘草一錢夢覺柴胡湯柴胡一錢生地一錢貝母一錢黃芩一錢金銀花一錢生甘草一錢白茅根一錢夢覺承氣湯大黃一錢芒硝一錢檳榔一錢厚朴七分甘草一錢枳實七分生薑一錢大棗一枚塗蔚生曰欲治瘟疫須參看吳鞠通之溫病條辨吳又可之達原飲尚多未妥癇症周夢覺曰諸癇病發卒倒搐掣叫吼吐涎因其聲之似而有豬癇馬癇羊癇牛癇雞癇之分溯其源卒倒無知者痰迷心竅也搐溺抽掣者風入肝經也名雖不一不外心肝二經經曰脈滑大久自已脈堅小死不治有得之胎前者兒在母腹其母卒然受驚痰氣逼入心肝與本來氣血搏結成窠此不可治者也有得之懷抱者小兒心肝有餘神氣不足偶有所觸火發於心風動於肝神不守舍痰涎蔓延浸淫乘其隙而入之據以為主此介於可治不可治者也有得之成人者外感風寒內傷飲食逆於臟氣閉塞諸經鬱而生痰膠固心肝此無不可治者也夫有桀驁不馴之虜必恃斬關奪隘之才有頑梗難化之梟必有執鋭披聖之勇蓋負隅徑敵非詩書所能啓牖仁義所能漸摩禮樂所能陶淑不得不挽強弓操毒矢以摧其鋒而搗其窟痰之凝結心肝亦猶是也彼挾心肝以淬其鋒溫之而余氛愈熾據心肝以完其窟和之而固壘難降且協心肝以成其黨而樹其敵補之而邪焰鴟張求其剽悍之性直抵巢穴而能殺伐者其惟礞石與麝香乎其以撥亂而反正能平肝下氣而治驚利痰之聖藥余於是症胎病無論矣小兒未曾診視稍得成人但脈浮大概以礞石滾痰丸麝香丸攻之可服六君子湯一帖得愈者無數有服至一月愈者有服至兩月愈者以痰盡為度經曰有故無隕不信然歟難經訓顛為僵仆直視與癇無異近閲內經顛狂篇亦大同小異以為癇即顛者非也內經明有三條之論以為癇不同於顛者亦非也所言顛癇兩相倣佛故闕之以俟參考王隱君滾痰丸青礞石一兩沉香五錢酒大黃八兩酒黃芩八兩上將礞石打碎同焰硝一兩同入瓦罐內鹽泥固濟曬乾火煅石色如金為度研未合諸藥水丸臨臥時每服二錢五分生薑湯送下周夢覺麝香丸法半夏一錢膽南星七分陳皮一錢枳實一錢麝香二分茯苓一錢炙甘草一錢生薑汁為丸萬密齊曰癇者卒然而倒四肢強直目閉或眼珠翻上不轉口噤或有咬其舌者口中涎出或有無涎者面色或青或白此句宜仔細著眼或作六畜聲其狀不一乃小兒之惡候也昏暈一時即醒如常矣其發也或以旬日計或以月計或以歲計古人有三癇五癇之名症治太多似無一定之說故後學不知其所從也凡治癇之法幼科所載其方甚多而無可取者惟豫家祕新方名斷癇丸真神方也萬密齊斷癇丸川黃連一錢青礞石一錢石菖蒲一錢辰砂一錢蚌珍珠六分鐵華粉一錢膽南星一錢白甘遂五分上沉香二分白茯苓一錢另以人參一錢白朮三錢煎湯煮糊為丸豬心湯下萬密齊通心丸上辰砂一錢馬牙硝一錢明雄黃一錢真麝香二分白附子五分陳枳殼一錢川芎一錢茯苓一錢人參一錢川黃連一錢金銀箔一錢蜜丸麥冬湯下塗蔚生曰周夢覺之痰迷心竅風入肝經二語已將癇之本源所在直為抒出而兒在母腹其母猝然受驚痰氣逼入心肝與本來氣血搏結成窠一節尤為將不治之癇症所以生成之理盡行闡發非慧心人而兼有平素經驗研究者曷能臻此其方藥雖屬猛烈然病系根深蒂固非此強悍之劑勢難取效其理論既與病症相符其方藥當然可用又何發生危險萬密齊之癇症論是將癇之形狀說明未將癇之根源敘清然其藥方已與夢覺暗合余故亦為摘入陳飛霞以為面色青白不宜用藥攻伐痰迷心竅不宜發過清明謬斥密齊之非是其知有常而不知有變也夫面色青白之兒本不宜妄用攻伐然病非血虛咎由痰滯是痰其本而青白其標痰為有形之物心為生血之臟心既為痰所迷則血不能周流全身氣亦隨之停滯氣血既形停滯則上榮於面者少而青白見矣斯時養血以榮面補氣以潤色是何異欲弭亂而賚盜糧者乎至風入肝徑手足抽搐搦掣余意則謂由於痰迷心臟心神不得了了盡其全部勢力以與痰敵爭戰而傳其掣動之狀於四肢也然亦即心竅閉塞各竅隨之停滯而將肝之氣血觸發者也再按以上之各種丸藥均宜酌用寧少勿多為妙咳嗽塗蔚生曰咳嗽一症患者最多而最易治之者每與之反豈咳嗽果為不易治之症歟抑咳嗽之方多未善歟曰由於未將咳嗽之題目認清果能將其認清則除虛癆久咳不治外即無不可治愈之咳嗽矣經云五臟六腑皆有咳嗽而無不聚於胃關於肺是先聖已將兩大咳嗽之法門明白揭示然而肺胃之分亦各有內外之因焉何為內外曰肺主皮毛又為華蓋外之風寒有傷皮毛固可使內部化生之氣不得外出壅聚於肺發生咳嗽而內部之肺陰乾涸津液不能下降虛火上刑肺金亦可發生咳嗽經云外感以咳嗽為輕內傷以咳嗽為重蓋謂此耳其外感風寒者重則宜麻黃湯輕則宜十味參蘇飲小柴胡湯加防風杏仁貝母亦治之熱甚者可去半夏加知母花粉寒甚者可去黃芩加白芷荊芥其內傷肺陰者宜人參清肺湯人參固本湯清燥救肺湯人參瀉肺湯以治之熱甚者知柏芩連均可加入若夫腎陰虧損虛火爍肺外症頭目眩暈溺赤腰痛咳嗽者宜知柏地黃湯加杏仁尖貝五味以治之其虛極而干嗆無痰者則龜阿二膠尤宜加入因其有形之質既損則非草木無形之質所能填補者也然人非消瘦殘弱之人素形體壯而驟得干嗆之症者尤須防系風寒閉塞於肺而妄施滋補焉胃為倉廩之官水穀之海雖不外主皮毛而風寒之襲因寒動水亦可發生咳嗽焉小青龍湯與桂苓朮甘湯乃為治是症之要藥至其內因則不外夫停痰停食停飲何為停痰痰者乃津液之變體也水穀入胃水之精為津谷之精為液上經火化變為氣血內輸臟腑外輸經絡所以榮色澤而溫養其肢體者也若津液為寒所凝或為火爍則津液失其常度變為痰滯上衝肺臟發生咳嗽輕者宜六君子湯審其挾寒挾熱酌加薑桂芩連等味以治之重者宜礞石滾痰丸以滌之停食者食積於胃不能消化溫熱醞釀將每日所已消化之津液亦熏蒸阻滯變而為痰發生咳嗽唐容川曰五更時咳嗽為食積之火至寅時流入肺經宜小柴胡湯加萊蔔子以治之吾謂宜用二陳湯酌加白芍枳殼麥芽黃芩等味以治之停飲者飲入之茶水停聚也仲景雖有痰飲懸飲溢飲支飲四者之分而由多乎脾胃衰敗陽火失職而水陰肆行無忌也唐容川曰飲者水也停茶停酒漩液唾涕皆是而分稠者為痰清者為飲合津液者為漩唾走皮膚者為水腫又曰內之油網透出肌肉則為周身之白膜肥網水隨網油透出肌表則為肥腫及走四肢則為腫疼痰飲之人素盛者水氣充於肌腠也今反瘦者則以肌腠之水氣反入於內而走腸間不走網膜中矣故腸中瀝瀝有聲懸飲者水在脅下脅下有油一大片俗名板油上連胸膈水停板油中不得下咳則引痛懸庋於此故名懸飲溢飲者水入膈膜不下走油網以達膀胱而溢出腠理以走於四肢故稱溢焉支飲者水在油膜中不下走膀胱而上犯於肺如木枝上發之象故稱支飲然總參仲景之治法則不外本乎寒熱虛實而施以汗補溫下之法也其因外寒而動水者大小青龍湯主之其因中土虛寒而停飲者宜桂苓朮甘湯主之其因中土寒而不虛者宜小半夏湯治之其完全由於寒實者宜十棗湯下之其因太陽膀胱寒水不化者宜五苓散治之其因太陽寒而陽明兼虛熱者以木防己湯主之其太陽寒而陽明兼有實熱者以木防己去石膏加茯苓芒硝湯主之其因胸中水飲與火熱交結者以厚朴大黃湯主之藥雖有緩急之分而病實有深淺之異咳者未必盡系水飲而水飲未有不咳憑症以用藥固無慮夫緩急而執藥以尋症總宜計其深淺仲景麻黃湯見前傷寒方內十味參蘇飲人參一錢蘇葉一錢半夏一錢茯苓一錢陳皮一錢桔梗一錢前胡一錢葛根一錢枳殼六分甘草一錢生薑一錢仲景小柴胡湯柴胡一錢黨參一錢黃芩一錢半夏七分甘草一錢生薑一錢大棗一枚人參清肺湯人參一錢阿膠一錢地骨皮一錢知母一錢烏梅一錢桑白皮一錢粟殼六分杏仁一錢甘草一錢大棗一枚人參固本湯人參一錢熟地一錢生地一錢白芍一錢天冬一錢五味一錢知母一錢陳皮七分麥冬一錢炙草六分清燥救肺湯人參一錢甘草一錢黑芝麻一錢阿膠一錢石膏一錢煅杏仁一錢寸冬一錢枇杷葉一錢炙冬桑葉一錢人參瀉肺湯人參一錢黃芩一錢梔子一錢枳殼七分甘草一錢連翹一錢杏仁一錢桔梗一錢桑皮一錢大黃七分酒炒薄荷七分知柏地黃湯生地一錢萸肉一錢丹皮一錢山藥一錢茯苓一錢澤瀉一錢知母一錢黃柏一錢仲景小青龍湯麻黃一錢桂枝一錢半夏一錢細辛六分芍藥一錢五味子一錢乾薑七分甘草一錢仲景桂苓朮甘湯桂枝一錢茯苓一錢白朮一錢甘草一錢六君子湯白朮一錢黨參一錢茯苓一錢陳皮七分半夏六分炙甘草七分二陳湯半夏一錢陳皮一錢茯苓一錢甘草一錢仲景大青龍湯麻黃一錢桂枝一錢杏仁一錢炙甘草一錢生薑一錢大棗一枚石膏一錢仲景小半夏湯半夏一錢生薑一錢仲景十棗湯芫花甘遂大戟上等分為末以肥大棗十枚煎水沖服但此藥味盡系猛劇初起切勿多用宜酌量漸次增加以快利為度因兒有大小強弱不敢定分量也仲景五苓散桂枝一錢白朮一錢茯苓一錢豬苓一錢澤瀉一錢仲景木防己湯木防己一錢桂枝一錢人參一錢石膏一錢仲景木防己去石膏加茯苓芒硝湯木防己一錢桂枝一錢人參一錢茯苓一錢芒硝一錢塗蔚生曰查仲景原方內無茯苓一味然其湯名為木防己去石膏加茯苓芒硝湯其方內應有茯苓可知想系謄寫者之遺失余故為之加入仲景厚朴大黃湯厚朴一錢大黃一錢枳實一錢附方外臺茯苓飲治心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食消痰飲令能食茯苓一錢人參一錢白朮一錢枳實五分陳皮七分生薑一錢陳修園曰此痰飲善後最妥當之方也喘哮塗蔚生曰喘以氣息言氣促而連屬不能以息者謂之喘哮以聲響言喉中如拽鋸及水雞聲者謂之哮喘者多虛而少實哮者多實而少虛喘者多不兼哮而哮者每多兼喘雖同為肺主而喘者究有虛實寒熱之分焉如大病久病之後或久吐久瀉之餘敗症畢見忽然張口大喘此下元虧損真氣浮散呼吸既不歸根脫絶即在目前速施滋補或可挽救否則其命已盡而參茸亦無所用其力矣其由於肺氣虛者宜獨參湯以治之有寒加乾薑有熱加寸冬其由於腎氣虛者宜參茸並用若由腎陰先虧腎陽無歸而後喘者則宜六味地黃湯加參茸以治之有寒加桂附有熱則加知柏此虛喘之概略也實寒之喘非由於風寒之閉塞肺竅即由於水飲之上衝肺臟其由於風寒者必發熱惡寒唇紅面赤鼻息不利清便自調宜麻黃湯荊防葛根湯以解散之由於水飲者飲水則劇安眠不得以息宜葶藶大棗瀉肺湯及小半夏湯以治之熱症之喘其關於虛者余於上條已言之矣其關於實者非由於食之積即由於熱之甚積熱攻發氣急上逆形體健壯不見羸態宜二陳湯加枳殼厚朴山楂神麯麥芽等治積人參白虎湯加知柏芩連等以治熱至哮症則見周夢覺解獨參湯人參上以人參一味量兒之大小強弱以為藥之輕重濃煎取汁服之如家貧難購或市遠難獲可以潞參代之因潞參雖較人參力弱而多則亦可力大也仲景六味地黃湯生地一錢萸肉一錢山藥一錢丹皮一錢茯苓一錢澤瀉一錢仲景麻黃湯見前傷寒方內荊防葛根湯葛根一錢荊芥一錢防風一錢桔梗一錢枳殼六分杏仁一錢白芍一錢甘草一錢仲景葶藶大棗瀉肺湯葶藶子一錢大棗一枚先將葶藶子炒令黃色搗研為末再煮大棗數沸納葶藶子同煎取汁服二陳湯見上咳方內人參白虎湯見上溫病方內周夢覺曰內經有喘無哮至漢方哮喘並論喘之源不一哮之源止有冷痰入肺竅而已夫肺為嬌臟清虛之質不容些毫芥蒂懸於胸間其竅仰上一有所入則不能出而食果飲水積成冷痰浸淫於內是為痰母物交物則引之而已一為潮上肺竅為之閉塞呼吸亂矣呼吸亂而二十七脈之迭見而雜出者無所不至其遇寒而發者寒與寒感痰因感而潮上也其遇熱而發者寒為熱蒸痰因蒸而潮上也必待鬱悶之極咳出一點如魚腦之形而症斯愈脈亦隨之而平本草所訓性味猛烈惟麻黃砒石可以開其關而劫其痰麻黃能發汗一列哮症雖盛暑之月不發汗砒石能傷人一到哮症雖羸弱之軀不傷人有是症有是藥而卒不能除其根者麻黃能開寒痰之路而不能拔痰踞之窠砒石能剿痰招之黨而不能殲痰伏之魁藥到即愈愈而復發者此也余嘗見少年患癆傷咳嗽吐血體瘦脈數敗症備矣詢其素有哮症癆無可治者以二藥治其哮得愈者數人又嘗見老人患上氣咳嗽喘悶脈急不寐困頓極矣問其素有哮症氣無可治者以二藥治其哮得愈者亦數人瑤池古冰雪肺為凝冷痰斯言近之矣制砒石法以淡豆豉曬乾研末一兩砒石一錢飯和為丸疳症周夢覺曰道人於聖學本無所窺而少者懷之雅有同志竊於疳症三致意焉十六歲以後謂之癆十六歲以前謂之疳其症頭皮枯澀毛髮焦稀腮縮鼻乾脊聳體削鬥牙咬甲煩渴自汗口鼻溺赤肚脹潮熱酷嗜瓜果泥炭等物外則肢體生瘡是其候也疳之綱領有五脾肺心肝腎至於條目不可窮紀姑舉其要曰脊疳曰蛔疳曰腦疳曰丁奚疳曰無辜疳曰哺露疳名有百端理為一致雖見症不同不外熱積蟲三者而已考古名方有塌氣丸龍膽湯蘆薈丸木香丸胡黃連丸及各種肥兒丸其理正其義深其效神信非仙家莫傳因方書論症支吾雖傳其方無人敢用如景嶽論中其或氣血兩虛有非大補不可固屬門外揣摩即錢仲陽為小兒科中一代名醫而以為皆因脾胃虛損亦是老生常談於疳症何涉錢氏如此其它可知道人不惜苦口饒舌細為分晰病源既明則作方者之苦心庶得以闡明於世楊氏曰疳者干也道人則曰疳者甘也因奉養太過肥甘之味鬱而為熱蒸而生蟲久而成積而疳以是名焉惟其煎熬津液肌肉為之消削惟其成積肚腹脹大飲食為之減少惟其生蟲吮臟腑則偏嗜異物蝕肢體則瘡癢不痛種種症候大半得之膏粱之家食藜藿者十居一二道人云遊以來每見朱門子弟反不如居茅屋之神完氣足總由飲食不節之故何關乎元氣之盛衰脾胃之強弱此其大彰明較著者也各方中不離黃連為君者解其煎熬之熱毒也用蘆薈生地山梔青黛膽草黃柏者清其火也用蕪荑君子川楝雷丸鶴蝨烏梅者殺其蟲也用莪朮神麯山楂麥芽青皮木香者消其積也用干蝦蟆蟾酥者以毒攻其毒也用夜明砂靈脂者去瘀而生新也有是症則有是藥藥味之寒與毒夫復何疑嘗見患是症者請一目不識丁之醫或揣之曰莫不是疳將師所傳治疳之方遂撮一帖猶或幸中彼原不知黃連之寒蕪荑之毒請一讀書明理之醫明知是疳開口便曰脾胃大損非峻補不可枯瘦之軀何堪此黃連之寒蕪荑之毒主人曰穩當不知熱得補而益熾積得補而堅甚蟲得補而更多至於不救則曰有命此非讀書之過不善讀書者之過也道高一尺魔高一丈其斯之謂歟然則惟攻熱積蟲遂可以治疳乎非也五疳有所見之疳諸疳又各有所見之症變化生心豈可膠柱鼓瑟不過胸有成竹而後能畫竹然則治疳一於攻而全無補法乎亦非也經曰大毒治病十去五六相其熱退積減蟲安窮寇勿追或調理脾胃滋腎平肝一任醫之運用塗蔚生曰夢覺分析此節論症精詳治法簡明猶設雷燈於暗道施航海家以南針濟世濟人厥力豈淺鮮哉然其鬱而為熱蒸而生蟲久而成積一節余以為其次序當積繫於先熱次之蟲更次之蓋必有積而後有熱有熱而後有蟲有蟲而後有酷嗜瓜果泥炭等物之事也試觀夏月吾人之置食菜與肉於地最易生蛆可知至其蟲之吮臟腑所以能發生偏嗜異物則夢覺尤未能說明以余度之當系某臟腑被蟲蝕之後其陰液即系虧損自不得不求救於性類所屬之物質以為補助者也如脾疳而嗜泥土腎疳而嗜生鹽等是也考古各方塌氣丸米糊為丸治腹脹大白豆蔻麥芽五靈脂砂仁莪朮陳皮青皮使君子各二錢癩蝦蟆三錢下蟲丸米糊為丸苦楝子一錢米泔浸焙貫衆一錢檳榔一錢桃仁一錢蕪荑一錢木香一錢鶴蝨一錢木香丸生薑水為丸治疳痢黃連一錢木香一錢厚朴七分夜明砂一錢大蕪荑湯治小兒發熱作渴少食大便不利發黃脫落蕪荑一錢梔子一錢當歸一錢白朮一錢茯苓一錢柴胡一錢麻黃一錢羌活六分防風一錢黃連一錢黃柏一錢炙甘草一錢四味肥兒丸治小兒食積五疳目生雲翳牙根腐爛蕪荑一錢神麯一錢麥芽一錢黃連一錢上等分為末豬膽汁為丸緑豆大蘆薈肥兒丸豬膽為丸黍米大治熱疳蘆薈龍膽草人參木香麥芽各二錢土鱉去頭足酥炙檳榔使君子蕪荑各三錢胡黃連一錢黃連一錢龍膽丸煉蜜為丸治疳熱腦瘡龍膽草一錢升麻六分苦楝根皮一錢赤茯苓一錢防風一錢蘆薈一錢油發灰一錢青黛一錢黃連一錢蟾酥丸治小兒頭頂結核面色黃瘦飲食不甘腹大發熱蟾蜍二三個將糞蛆一杓置桶中以尿浸之即將蟾蜍打死與蛆食一晝夜用布袋盛起置急流水中一宿取出瓦上焙乾為末入麝香少許米為丸集成集聖丸治冷熱新久一切疳症以之為主可隨症加減蘆薈一錢五靈脂一錢夜明砂一錢陳皮六分莪朮一錢使君子一錢廣木香一錢當歸一錢川芎一錢人參一錢川連一錢乾蟾酥一錢酥炙西砂仁酒炒二分塗蔚生曰此方出自幼幼集成與前之蘆薈肥兒丸相似而人參與靈脂同用尤恐人參畏其侵奪之力也集成參苓白朮散治脾胃虛弱飲食不進或嘔吐泄痢及大病之後補救脾胃此方為神人參一錢白朮一錢茯苓一錢懷山藥一錢桔梗一錢苡仁一錢建蓮肉一錢炙甘草一錢上共為細末每服一二錢薑棗湯調服集成清胃散治走馬牙疳黃連一錢當歸一錢升麻六分生地一錢丹皮一錢白芷一錢細辛五分集成大肥兒丸治小兒脾胃虛弱泄瀉骨蒸人參山楂肉炒白朮土炒莪朮炒川朴薑汁炒神麯炒陳皮炒胡黃連炒川連薑製青皮醋炒茯苓乳蒸杭芍酒炒地骨皮酒炒澤瀉炒肉豆蔻煅檳榔川芎炒柴胡酒炒使君子肉炒乾蟾蜍醋炙炙甘草各一錢五穀蟲二錢上共為細末煉蜜為丸彈子大米飲化下集成走馬牙疳方並治口疳破爛及齒齦腐爛黑臭者用藥後須防其涎流口內人中白一兩煅兒茶五錢黃柏薄荷青黛各一錢冰片三分上共為細末用集成急疳方治蝕爛口鼻欲死海中紫貝子炭灰煅過俗名南蛇牙齒大名牙螺嶺南稱狗支螵為末獵豬油調塗嘔吐周夢覺曰嘔吐之症一曰寒一曰熱一曰虛寒則脈遲熱則脈數虛則脈虛即其脈可以分其症最易治者寒陽明為消磨五穀之所喜溫而惡寒一自寒犯於內兩相齟齬食入即吐不食亦嘔彼法夏丁香白蔻砂仁本草所注一派止嘔定吐之品非不神效不如一碗生薑湯而其效更速者經所謂寒氣客於腸胃厥逆上出故痛而嘔是也最誤治者熱寒之不已鬱而為熱醫不知其熱仍以辛熱治其寒愈嘔愈熱愈熱愈吐彼麥冬蘆根定吐書有明文尚不知用何況石膏之大寒大涼乎不知石膏為止嘔定吐之上品本草未注其性內經實有其文經曰諸逆上衝皆屬於火諸嘔吐酸暴注下迫皆屬於熱是也最好治者虛不專責之胃而兼責之脾脾具坤靜之德而有乾健之運虛難轉輸逆而嘔吐調理脾胃乃醫家之長策理中湯六君子湯皆能奏效經曰足太陰之脈挾咽連舌本是動則病舌本強食則嘔是也夫嘔吐病之最淺者也噎膈病之至深者也極為易辨嘔吐其來也猝噎膈其來也緩嘔吐得食則吐不食則有欲吐之狀噎膈食入方吐不食不嘔嘔吐或寒或熱或虛外見寒熱與虛之形噎膈不食亦與平人一般嘔吐不論年之老幼噎膈多得之老人嘔吐脈有遲有數有虛噎膈脈緩方書所論嘔吐牽扯噎膈之文噎膈半是嘔吐之方有何疑似之難辨而茫無定見也昔在湘中壺碟會友一老醫曰吾治噎膈得愈數人核其藥曰附子理中湯考其症乃脾虛之嘔吐者又一老醫曰吾治噎膈得愈數人核其藥曰黃連法夏湯考其症乃胃熱之嘔吐者藥能醫假病人多得假名其即二老之謂歟至於老人氣鯁時嘗嘔吐不可概以嘔吐論亦不可遽以噎膈論蓋津少氣虛難以傳送古人刻鳩於杖祝其無噎者此也孕婦嘔吐法夏不犯禁例且能安胎準繩已詳言之更有婦人天癸來時為風寒所襲傳入肝經血凝於肝食入即嘔一載有餘醫家以尋常治嘔吐之法治之或寒或熱俱不見效只以桔梗紅花諸藥去瘀生新數劑而愈此又不可不知也經曰寒氣客於腸胃厥逆而出故痛而嘔陳飛霞曰陽明胃氣下行為順今逆而上行故作嘔吐其症有聲有物謂之嘔有物無聲謂之吐有聲無物謂之噦又曰乾嘔久病見此者死蓋小兒嘔吐有寒有熱有傷食然寒吐熱吐未有不因於傷食者其病總屬於胃復有溢乳哯乳嘔噦皆與嘔吐相似而不可以嘔吐治之更有寒熱拒隔之證又有蟲痛而嘔者皆當詳其證而治之凡治小兒嘔吐先宜節其乳食節者減少之謂也然嘔吐多渴不可與之茶水水入復吐終不能止必強忍一二時之久而後以米湯與之吐自止矣寒吐者乳片不消多吐而少出面白眼慢氣緩神昏額上汗出脈息沉微宜溫中消食輕者藿香正氣散不止理中湯加藿香又不止參香散若再不止此陰盛格陽謂之拒格急以理中湯一劑用公豬膽汁和童便少許將藥潤濕炒熟煎服即止此內經熱因寒用之法蓋陰寒太過陽熱之藥拒而不納故以豬膽童便為嚮導其始則同其終則異下咽之後陰體漸消陽氣乃發熱吐者面赤唇紅吐次少而出物多乳片已消色黃遍身發熱而煩躁夏月多此症宜五苓散加藿香不止藿連湯再不止用理中湯煎熟調六一散冷服即止此寒因熱用也傷食吐者眼胞浮腫面色微黃足冷其熱夜重日輕或吐餿酸之氣或吐黃水或吐清痰其脈弦實而滑此有宿食也宜下去其積乃止消積丸治之傷乳吐者才乳即吐或稍停而吐此因乳食無度脾胃嬌嫩不能運化此滿則溢也名溢乳但宜節其乳則吐自止哯乳者時時吐乳而不多似吐非吐皆胃虛所致也宜參香散有乳多而吐者非真吐也苟不知禁即成真吐也百日內小兒多有之蓋身小身軟必待乳母擁抱之苟有傾側乳即溢出此人事也不須用治嗽吐者兒有咳嗽必待其嗽定方可與乳若嗽未定以乳哺之其氣必逆乳不得消化而為痰痰氣壅塞嗽不得轉而吐乳也枳桔二陳湯小兒初生三日內吐乳者用丁香三粒陳皮三分生薑三片煎服自止又不若煨薑湯更妙此余用最多者益三四日內總皆寒吐也初起哯乳即當調治如哯不已即成吐吐不已即成嘔嘔不已即成噦至此胃氣大虛精神漸脫矣若嘔吐不已日漸沉困囟陷顱腫青筋大露者並頻吐不食昏沉語塞喘急大熱常吐腥臭者死噦者有聲無物最危之候凡人久病以後而見此者皆為不治凡嘔吐不納藥食者先將薑湯和土作丸塞其兩鼻孔徐徐灌之白虎湯治熱吐石膏一錢寸冬一錢粳米一錢炙草一錢夢覺理中湯治寒吐黃耆一錢焦術一錢乾薑一錢附子五分炙甘草一錢大棗一枚六君子湯見前咳嗽方內治虛吐集成藿香正氣散治內傷脾胃外感風寒吐瀉霍亂等症藿香梗家蘇葉大腹皮廣陳皮牙桔梗法半夏茯苓神麯白芷各一錢川朴炙甘草各五分生薑一錢大棗一枚上為末以薑棗湯沖服固可酌量煎服亦可五苓散見前咳嗽方內集成藿連湯治熱吐川黃連紫油朴藿香葉生薑大棗集成參香散治胃虛作吐諸藥不止人參切片焙乾沉香銼末公丁香藿香根焙廣木香銼屑上等分為細末木爪煎湯服六一散西滑石六錢研末水飛用甘草一錢上共為細末陰陽水沖服集成消積丸治食停胃口作吐西砂仁十三個酒炒公丁香九粒烏梅肉三個蒸去核巴豆仁一粒煨透去淨油上共為末米糊為丸緑豆大白開水下集成枳桔二陳湯枳殼一錢桔梗一錢陳皮一錢半夏一錢茯苓一錢炙甘草一錢生薑一錢大棗一枚塗蔚生曰飛霞此節證論方治多未穩恰不如夢覺之精美而純如其曰寒吐熱吐未有不因於傷食者是其將寒熱所以成吐之理盡行抹煞未知寒自寒熱自熱而食自食也縱寒熱有因於食亦斷無盡因於食之理如其盡因於食其擬用之理中湯五苓散等劑何以竟非消食之藥乎其所擬用之藿香正氣散多系散寒消滯破氣之藥設使人非感寒內傷食積與觸時疫不正之氣者無不立見僨事又如其謂熱吐遍身發熱而煩躁者用五苓散是猶為以塗糊塗蓋五苓散為治寒水不化之大劑其見症雖有發熱煩躁作渴等等亦確係水停而津不能散布始見標熱之象也如桂枝可治熱吐則黃連知母得勿可治寒吐者乎故曰不如夢覺之精美而純至於少陰水虧虛火上犯脾胃而作吐者則猶為此症不可不知余曾治一嘔吐多方不效之症以六味地黃湯少加桂附而愈者可見嘔吐之症不專屬於脾胃之虛寒也然亦可見嘔吐之症不專屬於肝腎之虛熱也醫者能以舉一反三方為通權達變泄瀉經曰水穀之寒熱感則害人六腑又曰虛邪之中人也留而不去傳舍於腸胃多寒則腸鳴飧泄多熱則泄瀉陳飛霞曰夫泄瀉之本無不由於脾胃蓋胃為水穀之海而脾主運化使脾健胃和則水穀腐化而為氣血以行榮衛若飲食失節寒溫不調以致脾胃受傷則水反為濕谷反為滯精華之氣不能輸化乃至合汙下降而泄瀉作矣凡泄瀉腸鳴腹不痛者為濕宜燥滲之飲食入胃不住或完穀不化者是氣虛宜溫補之腹痛腸鳴痛一陳瀉一陳者是火宜清利之時瀉時止或多或少是痰積宜豁之腹痛甚而瀉瀉後痛減者為食積宜消之體實者宜下之如脾泄已久大腸不禁者宜澀之元氣下陷者宜升提之泄瀉有五寒熱虛實食積也但宜分別所下之色凡暴注下迫屬火水液澄清屬寒老黃色屬心脾肺皆實熱宜清解淡黃色屬虛熱宜調補青色屬寒宜溫白色屬脾虛宜補醬色屬濕餿酸氣屬傷食宜消脾土虛作瀉所下白色或穀食不化或水液澄清其候神疲唇舌俱白口氣溫熱宜理中湯或六君子湯熱症作瀉瀉時暴注下迫謂其出物多而迅速也便黃溺赤口氣蒸炙煩渴少食宜五苓散加梔仁有傷食及滯瀉者其候口噯酸氣吞酸腹脹一痛即瀉一瀉痛減保和丸消之如食已消痛已止而猶泄瀉不止者脾清陽之氣不升氣虛下陷補中益氣湯有風瀉瀉而色青稠黏乃肝木乘脾宜六君子湯加防風柴胡白芍有濕瀉腹內腸鳴肚不痛身體重而瀉水或兼風者水穀混雜宜升陽除濕湯凡大瀉作渴者不論新久皆用七味白朮散生其津液蓋白朮散為渴瀉之聖藥倘渴甚者以之當茶水不時服之不可再以湯水兼之否則不效矣久瀉未止將成疳者參苓白朮散加肉豆蔻煨焙加淮山藥共為末每日服之則泄瀉自止津液自生不致成疳矣久瀉不止多屬虛寒宜參苓白朮散加肉豆蔻煨熱為丸服之自止經曰五虛者死一曰脈細二曰皮寒三曰少氣四曰泄瀉不止五曰飲食不入五虛悉具者死能食者生凡瀉不止精神不好者脾敗也吐瀉而唇深紅者內熱也色若不退者死面黑氣喘者死遺尿不禁者腎氣絶也周夢覺曰難經訓泄有五胃泄飲食不化脾泄腹脹嘔吐所謂大腸泄者食已窘迫可賅脾泄論所謂小腸泄者便血腹痛大瘕泄者數至圊而不便宜以痢門論則泄止可言脾胃二經診其脈數而邪之自外來者屬胃其氣化而為熱輕則黃連厚朴佐以利水和胃之品至於完穀不化則泄之甚者也須芒硝大黃滌其邪而泄自止診其脈遲而虛之由內生者屬脾其氣積而為寒輕則焦術和中佐以燥濕補脾之味至於脹滿嘔逆則泄之劇者也必附片乾薑溫其寒而泄乃除余略仲景理中湯人參一錢甘草一錢白朮一錢乾薑一錢若臍上築者腎氣動也去白朮加肉桂吐多者去白朮加生薑悸者加茯苓腹滿者加附子服湯後半時許飲熱粥一升許六君子湯見前咳嗽方內五苓散見前咳嗽方內補中益氣湯黃耆一錢人參一錢炙草一錢白朮一錢當歸一錢陳皮七分升麻五分柴胡一錢生薑一錢大棗一枚集成升降除濕湯升麻五分柴胡一錢神麯一錢防風一錢宣澤瀉一錢豬苓一錢陳皮七分蒼朮一錢炙甘草一錢生薑一錢大棗一枚上水煎服若胃寒腸鳴加益智子半夏各一錢集成七味白朮散人參一錢白朮一錢茯苓一錢廣木香六分藿香葉一錢粉葛根一錢甘草一錢炙夢覺五苓散焦術一錢茯苓一錢桂枝一錢黃連七分澤瀉一錢豬苓一錢車前子一錢苡仁一錢夢覺銀黃散治熱甚泄瀉銀花一錢大黃一錢芒硝一錢炙甘草一錢生薑一錢大棗一枚夢覺溫中湯黃耆白朮茯苓蓮子肉各一錢法半夏七分訶子七分陳皮五分苡米仁一錢生薑一錢大棗一枚夢覺附子理中湯治寒甚泄瀉黃耆一錢附片三分乾薑六分焦術一錢肉桂五分蓮子肉一錢炙甘草一錢生薑一錢大棗一枚塗蔚生曰飛霞此節證論方治除其未了解五苓散非治熱症吐瀉之專方與詞意多涉重復外較前尚為真切然其所稱完穀不化是虛寒與夢覺所稱完穀不化是實熱得勿有相矛盾乎曰非也胃熱過甚亦能逼迫完穀直下不過其外部亦須有熱之表見約在百分之一二耳夢覺隨將虛寒泄瀉接書於下其意在詳人所略可知至於少陰水虛亦能發生泄瀉此又醫者不可不知民國十四年夏季余在信陽治一泄瀉嬰兒連服參朮等藥不效余以瀉則傷陰為之用知柏地黃湯頗著巨效嗣以余暫他住其父母急於兒愈復延一醫為之用附子理中湯暮服最歿是泄瀉之症不專責之脾胃也當泄瀉之初固屬過在脾胃而泄瀉日久即可纍及腎陰蓋腎陰在下而泄瀉亦自上而下也逮其腎陰既傷即宜滋腎只知理脾即為得半失半不然參朮已見數服縱無大效豈無小效哉今毫無效驗是腎陰之虛熱因脾土之培補剋制不得不縱虛火上犯使其將化之水穀津液依然下瀉也始則脾胃連纍腎陰終則腎陰連纍脾胃毫釐之差可不慎歟又水瀉胃苓湯極可採用胃苓湯白朮一錢茯苓一錢豬苓一錢澤瀉一錢桂枝五分川朴六分陳皮六分蒼朮五分甘草一錢霍亂經曰足太陰厥氣上逆則霍亂又曰連熱則熱至熱至則身熱吐下霍亂陳飛霞曰夫霍亂之病起於倉卒其證揮霍擾亂無有寧止故名霍亂多因夾食傷寒陰陽乖隔上吐下瀉而煩躁悶亂者是也蓋人有三焦上焦受納水穀主入而不出中焦腐化水穀流行於五臟六腑下焦分別水穀主出而不納故邪在上焦則吐邪在下焦則瀉邪在中焦則上吐下瀉凡霍亂得吐瀉則邪氣上下得出陳莝盡出而吐瀉自止乃有上不得吐下不得瀉為乾霍亂又名絞腸痧其病因脾胃之邪無從而出若加喘滿作搐者十不救一其有上吐下瀉者當分寒熱治之亦宜止其乳食恐其增痰也故霍亂飲水湯不必與之以其助胃邪故也宜藿香正氣散有先瀉後吐者乃脾胃虛寒故先瀉白水而吐亦不多氣緩而神色不慢額上有汗六脈沉細此為虛冷宜溫之六君子湯不愈則理中湯加藿香木瓜各一錢有先吐後瀉者乃脾胃有熱故喘促唇紅面赤口渴脈洪而數宜和之五苓散加藿香其乾霍亂上不得吐下不得瀉最為危迫速用鹽湯探吐之必待其吐出宿食積痰然後用藥或以針刺十指甲旁令出血或刺膝中名委中穴出血即解然後用藿香正氣散集成藿香正氣散見前嘔吐方內六君子湯見前咳嗽方內仲景理中湯見前泄瀉方內五苓散見咳嗽方內塗蔚生曰五苓散為治寒水不化之熱劑義已見前飛霞引治熱症霍亂仍為誤也醫者須當審慎查上吐下瀉為霍亂吐瀉不得為乾霍亂吐瀉而兼腹痛者方為絞腸痧宜用針刺法刺手十二井最效手少商在大指內側離甲爪角如韭葉許手商陽在食指內側去爪甲角如韭葉許手中衝在正面中指端去爪甲韭葉許手關衝在無名指外側去爪甲角韭葉許手少衝在小指內側去爪甲角如韭葉許手少澤在小指外側去爪甲角五分兩手合共十二穴故名十二井穴夫霍亂雖由於實邪擾害中土者多而虛寒侵犯中土者亦復不少藿香正氣散既純系一派消導攻散之藥靡不誤事欲求其一明瞭穩健之法則莫如折中於仲景仲景之霍亂論曰霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多而不用水者理中丸主之雖其後隨出四逆湯與通脈四逆加豬膽汁法而霍亂之提綱治法究不外是餘本此法以為診治從未誤事蓋脾土既因寒邪上下分爭之劇而發生泄瀉則正氣自虛而寒邪愈實扶土以安中宮則邪退而吐瀉自止其熱多欲飲水者以脾土不能化水水津不能四布也故主苓澤以利之桂枝以化之使其津生水布而渴自止其寒多不用水而用理中湯者以水津雖能上升而溫化之力太差尚使水液下注也故主白朮以燥之乾薑以溫之使虛寒消盡而吐瀉自愈若其所謂先吐後瀉乃脾胃有熱而主以五苓散加藿香是誠為盲人引渡者也夫既曰有熱則宜治以清涼而五苓散為治寒水不能利化水陰不能上達始行發熱作渴之熱劑豈可以之治有熱作嘔者乎即加藿香而藿香亦為宣去惡氣之藥於熱毫無干涉余遇此症頗多其寒濕兼滯者則用五苓散理中湯以治之其為上熱下寒之霍亂每以六君子湯加黃連生薑治之得愈輕者則只以小半夏湯加黃連其黃連分量亦須與參朮相等蓋熱在上而治熱宜求乎上寒在下而治寒宜求乎於下雖熱寒互相為用而藥性各循其經不相沖突斯則亦相剋相濟之道也仲景四逆湯乾薑一錢附子五分甘草一錢仲景通脈四逆加豬膽汁湯甘草一錢附子三分乾薑一錢將藥煎好以豬膽汁入尿摻入服之六君子湯見上小半夏湯見前咳嗽方內傷暑經曰因於暑汗煩者喘滿靜者多言體若燔炭汗出而散又曰氣盛身寒得之傷寒氣虛身熱得之傷暑陳飛霞曰嬰兒之患夏秋為甚蓋火土旺於長夏正當金水受傷稚陽陰微已失天和加之暑而熱陽氣浮於外生冷戕其中夏失長養則不能生金而病於暑然有中暑而病者有因暑而致病者雖病有不同而總由於暑詞意重復二而一也故其為病有陰陽二症曰陰暑曰陽暑治猶冰炭不可不辨也陰暑者因暑而受寒也凡膏粱之兒畏暑貪涼不避寒氣又或居深堂廣廈又或乍寒乍熱之時不謹衣被以致寒氣襲於肌表其症頭痛無汗惡寒身體拘急此以暑月受寒雖名陰暑即傷寒也治宜溫散五積散清暑益氣湯不惡寒而發熱者人參白虎湯熱退後用調元生脈散補之又有不慎口腹過食生冷瓜果冷茶冷水以致寒涼傷臟而為吐嘔瀉痢腹痛等症此亦因暑傷寒寒邪在內治以溫中為主加味五苓散不應理中湯陽暑者藜藿之兒有之常在烈日之中坐於熱地之上澡浴寒澗之內其證發熱頭痛煩躁大渴大汗脈洪滑大便結小便赤者白虎湯脈虛煩渴而少氣者人參白虎湯若眩暈者生脈散兼治暑薷苓湯凡治暑者最當辨其陰陽虛實若外中熱邪內亦煩躁而熱此表裡俱熱方是陽症治宜清補如前若脈虛無力或為惡寒背寒或為嘔惡或為腹痛泄瀉或四肢鼻尖微冷或不喜茶冷水或息促氣短無力以動之類皆陽中之陰症也凡見此證但當專顧元氣四君子湯為主治或理中湯加芍藥若虛寒甚者則舍時令而從證桂附在所必用切不可因暑熱之名而執用寒涼解暑否則其禍不可勝言矣集成溫散五積散白芷一錢陳皮五分川朴七分桔梗一錢枳殼七分川芎五分白芍一錢茯苓一錢白朮一錢當歸一錢半夏六分桂枝五分炮姜五分炙甘草一錢生薑一錢大棗一枚人參白虎湯見前溫病方內集成調元生脈散潞參一錢炙耆一錢寸冬一錢五味一錢炙甘草一錢生薑一錢大棗一枚集成加味五苓散白朮一錢茯苓一錢豬苓一錢澤瀉一錢桂枝七分藿香梗一錢宣木爪一錢砂仁五分生薑一錢大棗一枚上燈心十莖為引水煎熱服白虎湯見嘔吐方內生脈散人參一錢寸冬一錢五味子一錢集成薷苓湯白朮一錢香薷一錢茯苓一錢豬苓一錢澤瀉一錢桂枝五分白扁豆一錢川朴五分炙甘草一錢生薑一錢大棗一枚燈心一錢塗蔚生曰天地六淫之氣曰風寒暑濕燥火然風者吾知其為風寒者吾知其為寒暑濕燥火者吾知其為暑濕燥火再試究詰其何者為暑暑為何若則人莫不曰暑乃天地間一種炎熱之氣至亢至烈人感之而病身熱自汗面赤口乾煩躁多渴便赤祕結等症斷未有聞項背強痛發熱惡寒而名為傷暑者亦斷未有聞寒中腹痛腸鳴泄瀉而名為中暑者蓋暑乃天地自然化生之熱氣人則體天地自然化生之道而名之曰暑並未有若何矯揉造作者也然患項背強痛發熱惡寒寒中腹痛腸鳴泄瀉等症亦多在於長夏何也天地之不能以時值盛夏而無片時寒涼之氣亦猶天地之不能以時值隆冬而無片時溫暖之氣也值盛夏而病項背強痛等證亦猶值隆冬而病發熱惡寒舌黃煩渴二便祕結等症也不能謂天地此時無此氣亦即不能謂吾人此時無此病不能限定天地何時何地只有何種空氣亦即不能限定吾人何時何地只有何種病症然亦即不能謂吾人此時舍此病而外不應有其他種病症者也如謂暑期之寒病熱病均須一律以暑字貫之而強分以陰暑陽暑則試問於冬月之發熱惡寒與發熱惡熱等症其將何以名乎謂前者為陽傷寒乎而時值凜冽寒氣病人並無陽字之可加謂後者為陰傷寒乎而病在陽火群熱用事又無陰字之可加豈不進退維谷乎況暑氣炎烈吾人最易貪涼圖清爽而疏衣被嗜口腹而傷生冷值此時而病背痛惡寒寒中泄瀉等症此猶時勢之所必至人事之不容或已者也而先賢過拘時令均以此時炎熱不應有此種之寒症而此種之寒症既已發生則即宜一律以暑字聯絡之貫穿之不宜於暑字病外另有其他病名是何迂之甚耶潔古曰靜而得之為中暑動而得之為中熱中暑者陰症中熱者陽症是其欲分暑熱為二也吾謂不如就人事之安逸以分中暑之深淺又安能將暑之炎熱而尚分為寒燠者乎蓋好逸惡勞人之常情而貪涼避暑尤夏季人之常情然有時能力為之束縛經濟為之壓迫不能不從事工作此亦事之無可如何耳如山間之樵叟田野之農夫有時精疲力乏僵臥桑陰李下側息短埂橫坡俄而斜陽直射炎光透肌使其欲得片刻之清涼者一變而為暑氣傷人此為靜而得之為中暑之義也若夫執戈以藝苗荷鋤以芟黍使炎熱之光無可趨避良好身體一變而為暑氣傷身此動而得之為中熱之義也不然其深居高堂廣廈之中息臥於電榻汽椅之上僕妾侍於旁風扇置於上有時而貪涼過甚偶患寒中腹痛等症豈亦可謂之中暑者乎彼炎熱之暑雖欲中之又烏得而中之乎獨怪高明有如夢覺亦尚泥於其說以暑為陰邪熱為陽邪其曰中暑也感地激之氣陰與陰遇頭痛身熱面垢自汗與中熱異而小便清利大便塘泄嘔吐少氣安靜好眠脈則虛怯較之中熱大相徑庭焉又曰暑必傷氣非黃耆不足以益其氣暑必兼濕非焦術不足以燥濕暑必積寒非附子不足以溫其寒然而其所用經驗方則為耆朮姜附苓甘扁豆苡仁等藥是即普通人之所謂夏月寒中而用溫暖之法也其曰中熱也感天炎之氣陽與陽遇頭痛身熱面垢自汗與中暑異而小便赤澀大便堅硬胸滿氣喘煩躁不得眠脈則洪數較之中暑殊隔天淵焉又曰熱甚發燥非麥冬不足以清其燥熱甚為毒非黃連不足以解其毒熱甚涸水非豬苓不足以利其水然而其所用經驗之方則為苓朮連甘前仁麥冬豬苓澤泄等藥是即普通人之所謂夏月傷暑而用清涼之法也以吾觀之其曰陰與陰遇發生頭痛身熱便利溏泄等症乃人事之貪清涼而疏衣被之類也其曰陽與陽遇發生頭痛身熱便赤堅硬等症方為人事之辛苦而中天時之暑熱也非然則暑字與熱將何以解中暑之與中寒又何以異余今斷言之曰冬時既不能無火熱名之而夏時亦即不能無傷寒等病冬時之火熱等病既可以火熱名之而夏時之傷寒等病亦可以傷寒名之又何必苦拘時令而分暑為陰暑陽暑諱言傷寒也乎亦又何必分暑為陰邪熱為陽邪而誤會聖意也乎傷濕經云諸濕腫滿皆屬於脾又曰風雨則傷上清濕則傷下陳飛霞曰是濕之為病有出於天氣者雨露是也有出於地氣者泥水是也有出於飲食者酒漿生冷是也有出於人事者汗衣臥濕如小兒澡浴糞穢衣襁不幹皆是也然所因雖異悉由乎脾氣之虛而辨治之法其要惟二一曰濕熱一曰寒濕盡之矣病而發熱者謂之濕熱病而多寒者謂之寒濕濕熱之治宜清利熱去濕亦去也寒濕之治宜燥宜溫非溫不能燥也濕熱症其症發熱身痛多燥渴小便赤澀大便祕結脈見洪滑方是熱症宜清宜利柴苓湯茵陳飲如果濕熱之甚或元氣壯而兼祕結不通者方可推蕩之集成沆瀣丹寒濕證為脹滿泄瀉嘔吐皆寒濕之病也凡小兒喜弄冷水坐臥濕地其證頭痛身重寒熱往來宜胃苓湯如兼嘔吐加藿香砂仁如因中濕浮腫者胃苓湯合五皮飲如不效必用溫補俟陽氣漸復如理中湯八味丸宜擇用之凡脾虛多病濕內因酒麴停滯嗜瓜果喜生冷炙肥甘以致濕熱壅溢而為病者此內因也復有坐臥濕地霧露陰雨所客澡浴為風所閉泥水為濕所鬱於腠理則發黃也此濕由外生可見內外所感皆由脾氣虛弱而濕邪乘而襲之中濕發黃者茵陳五苓散不效六君子湯燥脾而黃自退集成紫苓湯治中濕惡熱如瘧黨參柴胡黃芩半夏白朮茯苓豬苓澤瀉濕一錢桂枝五分炙甘草一錢生薑一錢大棗一枚集成柴瀣丹治小兒一切熱症如胎毒鵝口重舌乳蛾便結癬疥風熱等症川芎九錢酒洗大黃九錢黃芩九錢酒洗黃柏九錢酒洗黑牽牛六錢炒去頭末薄荷四錢五分滑石六錢水飛檳榔七錢半童便洗曬枳殼四分半麵炒連翹六分去心赤芍六分炒上為末蜜丸如芡實大月內之兒每服一丸稍大者二丸茶湯化服乳母忌油膩以微瀉病愈為度胃苓湯見前泄瀉方內治中濕頭重身體往來寒熱集成茵陳飲治中濕發黃大小便澀茵陳二錢梔子赤茯苓甜葶藶甘草燈心各一錢小枳實七分五皮飲合胃苓湯專治浮腫生薑大腹皮茯苓桑白皮五加皮燈心大棗各一錢茵陳五苓散治中濕發黃茵陳二錢白朮茯苓豬苓炙甘草生薑各一錢桂枝五分大棗一枚塗蔚生曰濕與燥反濕為水火相交之氣燥乃水火不交之氣然脾土非濕不足以濡化水穀之堅非燥又不足以消爍水穀之陰是燥濕雖屬相反而實相生相濟者也如欲脾土無病則惟有調劑其燥濕之得其平耳蓋濕甚壅寒足以發生腫滿咳嗽嘔吐泄瀉等症而積濕成熱又足以發生面目赤黃胸滿氣逆等症故治濕之方濕寒淮在溫燥濕熱惟在清利雖燥與濕遠清與濕近而其使之剛柔得中亦即同為濕之良將經云脾土喜燥而惡濕又曰太陰之上濕氣治之中見陽明解者既以其惡濕而無濕之必要又於中見陽明之義僅拘為太陰經之支絡見走於陽明經絡之上是未免將治濕之全副底蘊得半失半者也吾以為中見陽明之義不是僅拘於支絡者是謂太陰之上雖是濕氣治之不使發生濕病然其治法究以何者為中和曰欲其中和必須見陽明之氣為若何而後濕氣之治為何若陽明之氣以燥為本其中和亦即以燥為本也蓋必如是而後能中和必如是而後無不中和也後賢雖未將此中微義揭出而知治濕以燥是其將先聖之妙得心法亦無不體會畢具者矣第四集治療法痢疾經云飲食不節起居不時陰受之則入五臟下為腸泄久為腸澼陳飛霞曰小兒此病初起兩眉皺而多啼由腹痛也煩躁不安由裡急後重也數至圊而不能或赤白相兼或單紅單白是其候也周夢覺曰痢有不與世相遞嬗而名則因時而變易方策所傳其來有自不容不據古以准今素問謂之腸澼難經謂之裡急後重漢謂之滯下晉謂之秋燥至唐方謂之痢即其名而繹其義便血曰澼痛甚日急壅甚曰滯皺裂曰燥不利曰痢痢之情形已顯示於稱名之表歷代以來揚榷指陳揚榷猶言大概也不啻以暮鼓晨鐘發人深省治是症者顧可孟浪從事翻欲緘滕扃鐍而置之死地乎當此暑炎方退金飆初起土間其中熱濕燥匯於一時三氣湊而為病有時行者從皮毛入微惡寒腹痛泄盡宿食方轉紅白風之所過行於一家則病一家行於一境則病一境有傳染者從口鼻入不惡寒腹痛隨泄宿食即轉紅白氣之所觸染於一人則病一人染於一方則病一方於斯時也撫枕席而興嗟何分男女如廁坑而抱痛莫測死生天氣陰晴詬聞一室燈光明滅呻徹五更飲膏粱者無論已可憐寒土當災朋盡回車難邀甲戌之峙人皆掩鼻從傳庚癸之呼聚桑梓者猶可也最苦旅人遠適今雨不來誰恤零丁異地聞風爭避那管客子離鄉儒者考古今之得失證一己之功修於是證而參上乘焉本來惻隱之心自應以之普度也喻嘉言初用辛涼以解表次用苦寒以清裡劉河間曰調氣則後重自除行血則膿血自除余於痢之時行初起者而宗嘉言焉疏經絡而趨邪敗毒散克壯元老之猷於痢之傳染初起者而宗河間焉和營衛而導滯芍藥湯允占丈人之吉及其歸宿鬱則為熱試診其脈未有不數者所以香連丸為治痢之總方顧在表忌用者邪猶未入於裡也久病難用者恐重傷其生氣也昔趙養葵以六味地黃湯治傷寒人譏為趙氏之創見而下多傷陰余嘗以六味地黃湯治痢此又余之創見也如果脈虛自汗赤白將盡真人養臟湯訶子散俱可酌而用之夫痢不分赤白既出於熱反服辛熱而愈者此乃從治之法蓋人之稟賦有寒有熱邪熱之中人每從其類而化辛熱藥能開鬱解結使氣血得以宣通特宜於以寒化熱之人若遇以熱化熱而誤用之其禍有不可勝言矣存心濟世者倘遇以寒化熱之痢用溫補而大獲其效慎勿執以為例人參敗毒散人參一錢羌活五分獨活五分柴胡一錢前胡一錢川芎五分枳殼一錢桔梗一錢茯苓一錢甘草一錢芍藥湯芍藥一錢當歸一錢黃芩一錢黃連一錢大黃一錢木香六分檳榔七分肉桂五分炙甘草一錢香連丸黃連二錢吳萸一錢上二味同炒去吳芋加木香五分不見火共研細末醋糊為丸真人養臟湯粟殼一錢訶子一錢肉豆蔻一錢木香六分甘草一錢肉桂五分人參一錢白朮一錢當歸一錢白芍一錢訶子散粟殼一錢訶子一錢乾薑七分陳皮一錢上共為細末空心服桂附湯附子三分肉桂三分乾薑六分焦術一錢砂仁五分炙甘草一錢塗蔚生曰痢雖只分紅白與紅白相兼者三種而寒熱虛實之症亦無不盡在其中唐容川曰腸胃之中除卻糟粕只微有脂膏水液而已脂膏屬血分水液屬氣分病氣分則水混而為白痢病血分則血擾而為赤痢氣血交病則赤白相半由何處釀成真膿而從大便泄出哉有之則毒聚腸胃將腸胃脂膏血肉蒸化為膿或下如爛瓜或如屋漏水此腐腸潰胃之危候與癰之腐爛無異此非尋常治痢之法所能克也是容川已將痢之發生原由揭示其大概矣而治之之法有謂宜發汗者有謂宜清涼者有謂宜寒熱合治者有謂由於夏月貪涼過食生冷至秋伏陰內動應時而痢宜溫暖者有謂時痢宜瀉久痢宜補者有謂宜收澀者有謂初痢忌用芩連者有謂宜燥濕者有謂宜消導者以上之主張既不一致而彼此之互相攻訐亦因以起矣余以患痢五年深恨大醫之難延名醫之炎涼時醫之誤我於是引咎自奮棄儒就醫偏於痢症一門三致意焉逮其痢自治愈稍有心得始知諸家之所主張均有至理而亦即有所偏也吾人如欲長於治痢必須知諸家之有所長與諸家之所短而取其所長舍其所短互相參考補用聚群衆之精華成一己之利器方能有中而不偏有濟而無僨也夫痢之所以宜發汗者以寒邪從皮毛而入循外之周身油膜以入內之腸胃油膜腸胃之氣化既受陰凝下降而為白痢吾人即急當升提開發使邪之由外而入者仍由外而出此葛根柴胡等藥之在所必用也若有裡急後重欲便不便者而木香檳榔枳殼當歸白芍等在所必用有寒熱風者而防風天麻白頭翁等在所必用此即先賢所謂逆流挽舟之法以及理氣則後重自除也痢之所以宜清涼者以內部之火熱既擾傷經絡之陰血使下降而為赤痢則吾人之欲熱退痢止亦惟在清涼之一途故知柏芩連歸芍等味在所必用其兼有由於外之風熱者而天麻白頭翁殭蠶桑寄生等在所必用其兼有裡急後重者而木香檳榔枳殼厚朴等味在所必用其兼有日久血虛者而生地阿膠龜膠等味亦在所必用此即先賢之所謂清熱解毒以及調血則便膿自愈也若唐容川所謂血色黑暗脈遲手足冷者屬虛寒黃土湯主之此係紅痢之變症亦猶白痢之亦間有可少用芩連者也痢之所以宜寒熱合用者以寒邪既傷六腑之氣而火熱又傷其六臟之血使寒熱參雜赤白間下則惟有寒熱合用之一途此葛柴荊防歸芍芩連香枳薑棗之在所必用也唐容川謂此寒熱合用必有寒熱兼見之實症不得籠統言之而混用寒熱雜方也即如仲景烏梅丸所治之症消渴氣上衝心心中疼熱飢不欲食此熱症之實據也食即吐蛔下之痢不止此即寒症之實據也惟其有腑熱臟寒之實據故用烏梅丸兼寒熱治之又如仲景生薑瀉心湯所治之症云心下痞硬乾噫食臭此火症也脅下有水氣腹中雷鳴此水病也惟其有此火在胃中水在腸間之實據故用生薑瀉心湯治之大便初頭硬後半溏者此胃中有寒腸中有熱也陳修園擬用理中湯加大黃此皆寒熱兼見之實據醫者必辨症如是之嚴而後用藥處方不失銖黍此等精細注腳詢可謂不易多得者也痢之所以宜溫暖者以生冷雖傷內部生陽之氣而將值夏令猶可借吸入之天陽以調劑其陰凝寒滯逮至時遷勢移嚮者溫暖之空氣一變而為清涼之空氣則吾人向日陰凝寒滯之臟腑其氣血自不得不隨寒冷之凝結一發而為痢下矣吾人欲其痢止則不得不從溫暖此茯苓白朮苡仁陳皮木香甘草生薑大棗等味之所必用也痢之所以時痢宜瀉久痢宜補宜收澀者此蓋謂寒熱既初傷其氣血使氣血之原質變為赤白痢下其勢方熾不得不從事推蕩俾已成之痢盡行推下減其積垢即所以減其邪勢減其邪勢即所以止其痢候此枳殼檳榔木香陳皮芒硝大黃之在所必用也然此必須毫無外感而後可用否則亦須加解外諸藥若夫久痢不止氣血下陷則魂魄將隨之而脫魂魄既脫其死亡也可立而待故治之之法惟宜滋補有熱者清燥救肺湯主之有寒者八珍湯加升麻主之仲景之桃花湯烏梅丸皆是澀以止脫之義慎勿謂澀則邪氣固結於內而不敢用收澀之藥也痢之所以忌用芩連者此蓋謂寒涼足以傷胃胃傷則生化之源頓絶然必有伏陰在內寒邪凝滯之實據方可忌用芩連若火結腸胃下迫至甚腹痛如錐則芩連硝黃又為此症得力之猛將也痢之所以宜燥濕者以濕之有傷氣血無異寒熱之傷氣血吾人欲其去痢止則惟有燥之之一法然濕有寒熱而痢又宜以寒熱為轉移此茯苓白朮車前苡仁澤瀉等類有時與姜附同用而有時又須與芩連同用者也痢之所以宜消導者此蓋時痢宜瀉之義以痢多食積必須消其食積而後可冀痢止此枳殼厚朴大黃山楂神麯麥芽萊蔔子之所必用也然容川解曰痢症之裡急為急欲下便是肝木之疏泄後重為欲便不得是肺氣之斂而於止奔迫解鬱閉一方而肝肺並治者擬用白頭翁湯加石膏知母杏仁桔梗枳殼檳榔柴胡麥芽當歸白芍等治之輕則用小柴胡加當歸白芍杏仁枳殼檳榔麥芽花粉調和肝肺則肺氣不迫注肝氣得開利矣又云肝氣欲泄而下注肺氣欲收而不開故痢多發於秋秋金肺氣閉而不開肝氣決裂而不遏是以迫痛治宜甘桔湯加白芍以桔梗開提肺氣以白芍平治肝木本此意以為加減則鱉甲龍膽草青皮秦皮蘆薈皆平肝之藥當歸生地桃仁五靈脂元胡索皆治肝經血分之藥黃芩麥冬桑皮知母皆清肺之藥枳殼貝母杏仁陳皮皆肺經調氣之藥隨宜致用變化在人烏有不治之痢哉容川此節證論雖僅足為時痢之方針而臨症擇而用之亦無不效若桴鼓者矣黃土湯方灶心土二錢甘草一錢白朮一錢熟地一錢黃芩一錢附子炮五分阿膠一錢仲景烏梅丸方烏梅一錢細辛六分乾薑五分黃芩一錢黃連一錢當歸一錢附子五分川椒一錢桂枝七分黨參一錢黃柏一錢仲景生薑瀉心湯方生薑一錢甘草一錢人參一錢乾薑五分黃芩一錢半夏六分黃連一錢大棗一錢清燥救肺湯方見前咳嗽方內知柏地黃湯方見前咳嗽方內八珍湯方當歸一錢白芍一錢熟地一錢川芎五分白朮一錢茯苓一錢黨參一錢甘草一錢仲景桃花湯方赤石脂一錢乾薑五錢粳米一錢仲景白頭翁湯方白頭翁一錢黃連一錢黃柏一錢秦皮一錢仲景小柴胡湯方見前咳嗽方內仲景甘桔湯方甘草二錢桔梗一錢噤口痢唐容川曰噤口者下痢不食是火熱濁攻胃氣被傷而不開各書俱遵丹溪用石蓮湯金鑑謂內熱盛上衝心作嘔噤口者用大黃黃連好酒煎服以攻之按腸胃所以能食者以胃有津液清和潤澤是以思食西洋醫雖滯於跡亦間有可信處言谷入於胃即有胃津注之將谷渾化如糜常探胃津攪飯頃刻亦化為糜據此謂說則胃之思食全是胃津使然試觀犬欲得肉則涎出於口此液即欲食之本也人之胃津其思食之情亦類乎此今胃為邪熱濁氣所攻踞其清和之津盡化而為濁滯下注於大腸則為痢停聚胃中則拒不納食丹溪石蓮湯雖知清火補胃然石蓮是蓮米有黑殼者今醫用石蓮子不知何物斷不可用即蓮米性亦帶澀痢症宜滑以去著澀乃所忌且胃中濁滯非洗滌變化不為功此方雖寒熱未瘥然未洗滌其滯變化其濁非起死回生方也清瘟敗毒飲竹葉石膏湯人參白虎湯麥冬養榮湯出入加減庶可以洗胃變津為開胃進食之良法至嘔不思食金鑑用二黃好酒取其峻快以攻逆然治逆洵為得法而不知化生胃津終未得進食之本也吾意以為宜用大柴胡湯加石膏花粉人參則攻逆生津開胃進食兩面俱到治噤口者從無此論吾今悟出切實之理為斯人大聲疾呼海始欲以文章報國今己自分不能庶幾發明此道稍有補於斯民歟又補論曰凡噤口痢上噤下痢法宜和中此與霍亂對看自明霍亂上吐下瀉必以和中而愈則知噤口痢上噤下痢亦必以和中而愈第霍亂是中寒而發為上下俱脫之症法主理中湯以溫之噤口痢上噤下滯其為中熱可知熱結於中上下不開和中之法宜反理中湯諸藥以寒涼治之生薑瀉心湯去乾薑為宜人參白虎湯亦佳石蓮湯方人參一錢黃芩一錢黃連一錢石蓮一錢即蓮米有黑殼者竹葉石膏湯淡竹葉一錢石膏一錢人參一錢甘草一錢寸冬一錢半夏七分生薑一錢粳米一錢塗蔚生曰生薑半夏俱辛燥於是症宜酌用即有石膏寸冬之寒亦恐其消耗津液因此症原係一種熱症也清瘟敗毒散石膏一錢知母一錢生地一錢犀角五分黃連一錢梔子一錢桔梗一錢黃芩一錢赤芍一錢玄參一錢連翹一錢丹皮一錢甘草一錢竹葉一錢大柴胡湯柴胡一錢黃芩一錢人參一錢半夏七分大黃一錢枳實七分生薑一錢大棗一枚人參白虎湯見前溫病方內麥冬養榮湯人參一錢知母一錢寸冬一錢甘草一錢五味子一錢當歸一錢白芍一錢陳皮六分黃耆一錢生地一錢瘧疾周夢覺曰儒者讀書十年窮理十年自謂於醫已通三昧及其視病兩相齟齬不歸責藥肆之假便諉咎染病之真與之強辨無庸也請試之治瘧夫瘧病之淺而顯者也最易足以驗醫之得失世之用劫藥而僥幸以成功者不在此論如果堂堂之陳正正之師而百戰百勝焉庶可懸壺都市負籠鄉邦猶是投之罔效屢易其方古籍粃糠空披萬卷寒窗燈案辜負十年經曰邪氣客於風府循膂而下其氣上行九日出於缺盆余讀經文而知瘧脈之所以弦也軀殼之內腫腑以外屬半表半裡而邪居之宜脈之弦與少陽同是故風無常府以所中處為府其中頂骨也三陽之脈皆上於頭陽明之脈循髮際至額顱邪氣並於陽明令人頭痛灑淅寒甚久乃熱則為陽明之瘧少陽之脈上抵頭角下耳後邪氣並於少陽令人頭痛寒不甚熱不甚惡見人則為少陽之瘧至於太陽之脈從巔入絡腦還出別下項正過風府處故頭痛腰重體重寒從背起所以中於陽者太陽之瘧居多其中骶骨也三陰之脈皆發於足太陽之脈上膝股內入腹邪氣併入太陰令人足軟不嗜飲食多寒熱則為太陰之瘧厥陰之脈入毛中繞陰器邪氣併入厥陰令人足軟小腹滿小便不利則為厥陰之瘧至於少陰之脈上股後廉直貫膂正當風府處故足軟嘔吐甚多寒熱熱多寒少所以中於陰者少陰之瘧居多其中於陽也陽氣漸入於陰分日下一節其行也遲故其作也日晏一日難愈其中於陰也陰氣轉入陽分日下二節其行也速故其作也日早一日易愈治之之法瘧在三陽則以三陽治之瘧在三陰則以三陰治之倘弦化脈虛有汗但輔其正氣而邪自除則統陰陽而溫補之未有不隨手而效者機要曰瘧有中三陽者有中三陰者其症各殊同傷寒論知治傷寒則知治瘧余謂第知治傷寒猶不足以治瘧知傷寒矣而知邪客風府則足以治瘧矣所同於傷寒者症所異於傷寒者脈傷寒之脈隨陰陽變遷瘧症之脈一弦字貫徹知所以治傷寒而於陰陽勝復之理邪正交戰之時臟腑行徑之穴無不灼知之矣業醫者欲驗一己之功修請自試之治瘧夢覺陽明經症瘧疾方葛根一錢升麻五分黃芩一錢白芍一錢草果一錢炙草一錢生薑一錢大棗一枚夢覺陽明腑症瘧疾方大黃一錢芒硝一錢檳榔一錢厚朴五分炙甘草一錢生薑一錢大棗一枚夢覺少陽瘧疾方青皮七分厚朴七分柴胡一錢黃芩一錢茯苓一錢半夏七分白芍一錢草果一錢炙甘草一錢生薑一錢大棗青皮引夢覺太陽經症瘧疾方麻黃一錢桂枝一錢杏仁一錢炙草一錢生薑一錢大棗一枚夢覺太陽腑症瘧疾方焦術一錢茯苓一錢豬苓一錢澤瀉一錢草果一錢炙甘草一錢生薑一錢大棗一枚夢覺三陰瘧疾方附子理中湯加草果玉竹一錢焦術一錢乾薑七分草果一錢炙甘草一錢附片三分生薑一錢大棗一枚夢覺虛症瘧疾方統治虛瘧黃耆一錢焦術一錢附子三分首烏一錢當歸一錢玉竹一錢草果一錢茯苓一錢炙甘草一錢生薑一錢大棗一枚塗蔚生曰周夢覺之瘧疾症治固已精美完善然考其所本多半出自仲景不過仲景簡而賅而夢覺繁而詳實則本仲景之法以為治即無不治之瘧亦無治不能愈之瘧蓋瘧系風寒由外之油膜以入內之油膜者而仲景之治瘧則根據少陽以為治必使邪之由外而入者仍由外而出今人不查此中原理動以截止為能事每至旋愈旋覆即以其不能根本解決也豫每以仲景之法治瘧凡遇瘧之一二劑不能全愈者必勸其多服數劑使其卒歸於愈愈而不復今將其原文摘入雖為治瘧者之備考夫亦曰存古云耳張仲景曰瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下差弦遲者可溫之弦緊者可發汗針灸也浮大者可吐之弦數者風發也以飲食消息之唐容川曰內經言瘧邪藏於風府旁連募原募即膜也膜之原在臍下即三焦之連網矣三焦膀胱皆腎之府三焦為陽府而化水行於里則為小便膀胱為陰府而化氣於表則為衛氣內經就瘧所發言責在衛氣故邪在太陽之風府仲景就瘧之所留言故責在三焦膜原是以瘧症未有小水清利者三焦之決瀆病也仲景以少陽立論其義在此正與內經互相發明後人不知三焦至謂仲景之證與內經不合謬矣張仲景曰病瘧以月一日發當十五日愈設不瘥當月盡解如其不瘥當云何曰此結為癥瘕名曰瘧母當急治之宜鱉甲煎丸鱉甲煎丸鱉甲炙一錢射干一錢黃芩一錢柴胡一錢鼠婦一錢乾薑一錢大黃一錢桂枝七分石葦一錢去毛厚朴一錢紫葳即凌霄一錢半夏七分阿膠一錢芍藥一錢丹皮一錢䗪蟲一錢葶藶一錢人參一錢瞿麥一錢蜂窠一錢赤硝一錢蜣螂熬一錢桃仁二錢上二十三味為末取煅灶下灰一斗清酒一斛五升俟酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁納諸藥煎為丸如梧子大空心服七丸日三服千金用鱉甲十二片又有海藻三分大戟一分無鼠婦赤硝二味唐容川曰夫瘧邪本伏於營血之中衛氣會而始發故久則營血結聚而為瘧母衛氣不通而為留痰是血為瘧母之主痰屬衛氣所生乃瘧母之兼有者也故治瘧母以攻利營血為主而行痰降氣為輔知此則知仲景此方破血之藥所以獨多總是治營以通衛也塗蔚生曰各家之對於瘧症所以先寒後熱以及結成瘧母之理雖不乏精細辨論而能理由充足不致令人疑慮者殊少其人以余度之瘧症即系邪氣伏居少陽油膜之上而下焦化生之氣亦必須循油膜上行而外達以為護衛今以邪氣之阻不得外達而為護衛故始而惡寒特甚逮至邪正交戰既久紛爭已畢終系邪氣勢弱而正氣勢強孰知正氣愈鬱結而勃發愈猛故繼而發熱特甚設使邪隨汗出則瘧可冀愈否則病人設為健壯化生正氣迅利則正氣之團結亦速出與邪爭亦急今病者之體有強弱化生之氣有遲緩故瘧有一日一發間日一發營血之行以衛氣為轉移今衛氣屢為邪氣鬱阻而營血不能隨其鬱阻經火煉以為鬱滯而為瘧母焉夫瘧母名者以邪氣縱隨正氣紛爭盡出而此血之凝滯與邪伏居油膜無異仍可使瘧疾發生焉故主鱉甲䗪蟲大黃桃仁等味攻血者以攻利之厚朴葶藶等味理氣者以疏散之然猶慮邪未盡除也仍用柴胡桂枝以解之人參以托之血虛受傷也兼用阿膠白芍以固之余則清熱滌水之味務使其邪氣盡除不至血痰交結而為瘧母焉此說此見不知有合聖意否尚希國內高明醫士隨時教正是幸張仲景曰陰氣孤絶陽氣獨發則熱而少氣煩冤手足熱而欲吐名曰疸瘧若但熱不寒者邪氣內藏於心外舍分肉之間令人消瘦肌肉唐容川曰陰氣指少陰心腎也心腎之陰虛故熱而少氣心中煩冤邪氣能入於心而內藏於心皆少陰陰氣孤絶之證也陽氣指太陽膀胱也水中之陽化氣為熱以衛周身今獨有陽氣則純熱合於陽明則為手足熱合於三焦則欲嘔外合於腠理分肉之間則令肌肉消爍治少陰宜雞子黃湯治太陽宜白虎湯後世如清瘟敗毒飲一方可以兼治按史記倉公傳風疸客脬言疸邪客居膀胱此疸瘧亦發於膀胱與牡瘧正相對牡瘧是邪在心也張仲景曰溫瘧者其脈如平身無寒但熱骨節煩疼時嘔白虎加桂枝湯主之白虎湯加桂枝知母一錢石膏一錢甘草一錢粳米一錢桂枝七分唐容川曰身無寒但熱為白虎湯之正證加桂枝者以有骨節煩疼症則有伏寒在於筋節故用桂枝以逐之也張仲景曰瘧多寒者名曰牡瘧蜀漆散主之蜀漆散蜀漆一錢燒去腥雲母一錢燒二日夜龍骨各等分上三味杵為散未發前以漿水服半錢匕附外臺祕要三方牡蠣湯治牡瘧牡蠣一錢麻黃一錢甘草一錢蜀漆一錢注意蜀漆即常山苗也柴胡去半夏加栝蔞蔞根湯治瘧病發渴者亦治勞瘧柴胡一錢人參一錢黃芩一錢甘草一錢栝蔞根一錢生薑一錢大棗一枚柴胡桂薑湯治瘧多寒微有熱或但寒不熱服一劑如神柴胡一錢桂枝七分乾薑一錢栝蔞根一錢黃苓一錢牡蠣一錢腫滿經云膚脹者寒氣客於皮膚之間腹大身盡腫皮厚按之窅而不起腹色不變此其候也又曰諸濕腫滿皆屬於脾又曰水病上為喘呼不得臥者標本俱病陳飛霞曰腫滿之證悉由脾胃之虛也脾土喜燥而惡濕若中氣素弱脾虛無火故水濕得以乘之脾虛不運則乳食凝而不化停積於中而腫滿作焉治腫者當以脾胃為本而以浮腫為標若以消伐為能事未有不致危殆者也又當分別上下經曰面腫者風足腫者濕凡腫自上而起者多因於風其治在肺宜發散之參蘇飲合五皮飲自下而起者因於腎虛水泛或因脾氣受濕宜滲利之仲景云治濕不利小便非其治也宜五苓散加防己檳榔身盡腫者或因稟賦不足卒冒風寒或因瘧痢脾虛皆能作腫輕者胃苓丸重者加味胃苓丸凡風寒之腫若身無熱宜五苓散加肉桂膀胱氣化小便利而腫消矣陽水腫身熱大便祕小便赤澀煩躁口渴以五皮飲送沆瀣丹微下之陰水腫者身不熱口不渴身冷發寒二便自調平胃散加茯苓草果木香藿香凡腫先起於腹而散於四肢者可治先起四肢而後歸於腹者不可治若小兒元氣本虛復遇大病之後而渾身浮腫四肢冷不渴小便清長大便滑泄不思飲食此陰寒之極脾胃將絶治腫之方俱不可用唯以六君子湯加肉桂炮薑砂仁白蔻以救其脾胃斯可矣昧者但見其腫不知元氣之竭絶而猶消導利水復以舟車禹功暨大戟芫花甘遂劫奪之者此殺人之事慎之戒之加味胃苓散見前泄瀉方內即胃苓丸原方如頭面腫初起略加麻黃作喘加桑白皮杏仁小便黃赤加木通身腫加五加皮腹脹加砂仁白蔻丁香枳殼腳冷不溫加附子肉桂防己五苓散見前咳嗽方內五皮飲沆瀣丹俱見前傷濕方內加味四君子湯人參一錢白朮一錢茯苓一錢肉桂五分炮姜五分砂仁六分白蔻六分公丁香七分炙甘草一錢大棗一枚平胃散蒼朮一錢陳皮一錢厚朴六分甘草一錢脈經曰水腫之脈浮大易愈沉細難痊周夢覺曰余謂醫不細揣脈與症斯已難矣果脈清症確浮大固可十全沉細未必難痊余少時曾患水腫而回生者欲知水腫幽明路說法何妨我現身人生飲入於胃氣化之妙全憑脾肺腎三經脾專運用之職肺擅通調之官腎司熏蒸之用而後云興雨施滲入膀胱三經失權其氣不化蓄諸中洲橫流四肢泛濫皮膚一身之中無非水為之灌注矣以其脈之沉細者言之脈而沉細病愈深而侵入臟矣即脈之沉細分症之陰陽其為陰水腫也形寒傷肺濕寒侵脾虛寒損腎大便溏瀉小便清利脈則沉細而遲補土以溫金實脾湯實開斯世之福壯水兼補火腎氣湯能挽造化之窮其為陽水腫也火盛剋金熱鬱侮土燥過枯水大便堅硬小便黃赤脈則沉細而數石膏友麥冬本草中足稱治水之橇黃連伴黃柏醫方內大是分水之犀余嘗閲是症陰陽俱厥有令人不可測度陽水之厥更有十倍於陰水者陰水誤以陽治先或聲啞而死陽水誤以陰治定是吐血而亡至於脈之浮大邪猶在表病之最淺者也水蓄膀胱五皮飲可潔清淨之府水行肌表越婢湯足開鬼門之閉其朝寬暮急暮寬朝急者水隨氣之升降也何必曰陰虛陽虧上氣喘促夜臥難安者水淫肺之葉孔也何必子胎母宮曰風水曰石水曰皮水多其水名曰濕腫曰血腫曰風腫總是水腫揣摩脈症辨別臟腑沉細浮大有何難易之分酌理准情無非從前所有之語披肝瀝膽盡是劫後餘生之言其於是症煞吃苦幸矣愁成白髮三千丈歷盡洪濤十八灘夢覺實脾湯焦術一錢茯苓一錢炙甘草一錢厚朴六分肉桂五分草蔻七分木瓜一錢木香五分附片三分乾薑五分大棗一枚全匱腎氣丸即桂附地黃湯熟地三錢山藥一錢茯苓一錢萸肉一錢澤瀉一錢丹皮一錢肉桂五分附片三分夢覺麥冬湯石膏一錢麥冬一錢粳米一錢炙甘草一錢生薑一錢大棗一枚夢覺連柏湯黃連一錢苡米一錢黃柏一錢車前一錢肉桂五分知母一錢炙草一錢仲景越婢湯石膏一錢麻黃一錢炙甘草一錢生薑一錢大棗一枚塗蔚生曰水腫之症猶古時洪水之患瀰漫遍野渾無際涯斯時補脾以利水暖腎以化水此皆築堤之見不及之治不若大禹之治水疏通河道引水注海奪而去之之為愈也豫以為除風腫虛腫而外水之陽者宜採用阿膠大黃甘遂湯從陽以救陰水之陰者宜採用十棗湯與五皮散從陰以救陽雖劑嫌猛烈而滔天之水誠非此猛烈之劑旁無能克者也下後再以六君子湯四君子湯六味地黃等湯調停善後庶不至養癰貽患尾大不掉雖食鹽一層為水腫之大忌而如此治法亦在所不禁不過病之劇者以食鹽置罐敷緊燒熟為宜耳又水腫極易與風腫氣腫有混不可不辨風腫氣腫按之隨手而起水腫按之隨手沒指此其分別處也金匱阿膠大黃甘遂丸阿膠二錢大黃一錢甘遂七分上三味以阿膠溶化為丸如緑豆大大人初次可與服六七丸不下漸次增至十數丸二十丸不等小兒初次只可服三二丸不下漸次增加至七八九丸不等總之務必須量人之大小以為藥之輕重耳十棗湯見前咳嗽方內脹滿經曰足太陰虛則鼓脹又曰胃中寒則脹滿又曰濁氣在上則生䐜脹陳飛霞曰夫脹滿者腹脹氣滿也因於脾肺不能健運所以作脹也有虛脹寒脹實脹熱脹大抵虛脹寒脹十之八九實脹熱脹十之二三蓋實熱之證人所易見或因傷食或因傷寒入里所以易知而易治虛寒之證由中氣衰弱脾氣不化而脹所以難見而難醫若以虛寒之脹而誤為實熱之脹治之其變有不可勝言者矣虛脹者或因吐瀉之後或因服藥攻下太過致成腹脹者宜溫中調氣厚朴溫中湯若虛而兼寒者加桂附實脹者腹中原有食積或因飲食過飽固結於中外證則胃口胸前高脹身熱口渴倦臥不語腹痛微喘目閉不開儼然虛極之象小兒此證最多而難識昧者不為詳審見其四肢不舉口閉不開誤以為慢風而用寧神導痰之藥十中十死無一活者不知大實有羸即此是也急宜下之集成沆瀣丹集成三仙丹同服熱脹者或傷寒熱邪入里大便閉結小便短赤渾身壯熱面赤煩躁集成沆瀣丹寒脹者由中氣素寒冷滯鬱結無身熱口渴面唇青手足厥冷氣喘腹脹先以塌氣丸消之復以異功散調其脾胃凡遍身瘡疥因淋洗塗搽逼毒歸內而腹脹者輕則荊防敗毒散升散之重則集成沆瀣丹微利之瘡出脹消者吉不出者凶經謂臟寒生脹滿者蓋脾為陰中之至陰如脾濕有餘陽火不能施化如土之久於雨水則為泥矣豈能生育萬物必待和風日暖濕去陽生自然生長也凡此宜以辛熱之藥運用之可也經謂下之則脹已此以濕熱飲食有餘脾胃素實形體氣質壯實者言之也若脾虛內寒而氣不能運精微以成脹滿者只宜以甘溫補脾為主少佐辛熱以行壅滯之氣庶使脾土健旺脹滿運行斯可愈矣此經之所謂塞因塞用用從治之法耳醫者不察惟執下之脹已急於獲效病者喜以下藥以求痛快不知暫快一時則真氣愈傷脹滿愈甚去死不遠矣厚朴溫中湯治胃寒心腹脹川朴七分陳皮一錢黑薑炭一錢茯苓一錢草蔻仁六分木香五分炙甘草一錢虛兼寒者加熟附子肉桂生薑少許集成塌氣丸治寒鬱結肚腹虛脹胡椒仁全蠍尾去鉤子洗淨炒乾上以胡椒略去皮去淨一兩炒過和蠍尾碾末麵糊為丸極小每服一二錢陳皮湯送下沆瀣丹見前傷濕方內集成三仙丹五靈脂二兩廣木香五錢巴豆仁四十粒去淨油醋打曲糊為丸緑豆大硃砂為衣量兒大小服之異功散白朮一錢茯苓一錢黨參一錢甘草一錢陳皮一錢荊防敗毒散芥穗一錢防風一錢連翹一錢枳殼七分升麻五分薄荷一錢羌活七分獨活五分粉葛根一錢川木通一錢金銀花一錢黃芩一錢川芎五分梔子仁一錢甘草一錢上身腫加蔥三莖下身腫加燈草十莖清水煎服塗蔚生曰陳飛霞謂虛脹或因吐瀉之後或因攻伐太過致成腹脹然吐則傷陽瀉則傷陰而攻伐之足以傷陽傷陰亦無異於吐瀉陰陽既形損傷則滋陰補陽即不容或已豈容再施消導者哉查厚朴溫中湯原方多系破氣之藥於此證未免失宜余以為宜用六君子湯稍加木香為佐既無虛虛之患又無實實之嫌臨時能因其寒熱而加桂附歸芍枳查芩連等味而虛寒實熱之脹亦無不左宜右宜也氣鼓血鼓周夢覺曰醫學中劉李朱張而下瓣香敬祝者汪子訒庵獨於氣鼓症列之濕門中殊不謂然究其源方書俱然不自訒庵始余考其症是氣也當列於氣門氣以類而方明病雖難而易治夫氣之功用全賴脾土為之轉運土旺而氣乃周流四體土衰而氣遂停中洲貫注軀殼充盈腠理鬱而為熱氣鼓成焉經曰諸脹腹大皆屬於熱是也其為症也四肢日見瘦羸肚腹日見脹滿任人揉按痛癢不關稍進餱糧飽悶難受脾愈虛肝益肆其侮氣愈積熱益張其威脈之弦且數其所由來者有明徵矣治是症者當青筋未大見臍心未大突缺盆未大滿之時重用黃連以解其熱清金以制肝盛培土不受肝邪藥草固有維持之力尤宜卻鹹味斷妄想存神靜慮以養無形之土不治氣而氣自宣通多有得安者其名不一曰單脹以其獨脹於腹也曰鼓脹以其中空無物也曰蠱脹若蟲食物而中空也曰熱脹由熱而脹也曰氣脹由氣而脹也統名之曰氣鼓也彼水脹寒脹列於濕門宜也原於此症毫不相涉東垣一代偉人中滿分消丸亦尚未分晰也夢覺黃連人參湯人參一錢黃連一錢焦術一錢麥冬一錢青皮一錢肉桂六分炙甘草一錢東垣中滿分消湯厚朴一兩枳殼黃連黃芩法半夏各五錢陳皮知母澤瀉各三錢茯苓砂仁乾薑各二錢人參白朮甘草豬苓各一錢蒸餅為丸每服三二錢不等白開水下唐容川曰血鼓之證脅滿小腹脹滿身上有血絲縷煩躁漱水小便赤大便黑腹上青筋是也醫書俱云是婦人之病惟喻嘉言謂男子恆有之面色萎黃有蟹爪紋絡脈雖極虛而履步如故多怒善忘口燥便祕脅脹腹疼逮脹之既成腹大如箕遂不可救東南最多所以然者東南饒魚鹽魚者甘美之味多食令人熱中鹽者鹹苦之味其性偏於走血血為陰象初與熱合不覺其病日久月增中焦沖和之氣亦漸為熱矣氣熱則結而血不流矣於是氣居血中血裹氣外一似婦人受孕者然至彌月時腹如抱甕推而言之凡五方之膏粱厚味椒薑桂糈成熱中者皆其類也治之之法以六君子湯加乾薑川芎防己為末陳米荷葉煎湯泛丸白湯下執中央以運四旁法也容川又曰謹按喻氏之論其言血鼓之原最為詳確惟所主之方與氣熱則結而血不流通之說未能吻合蓋六君子與所加之藥於治痰膨為宜且須寒飲方為切合如論所謂宜用清和理氣之品攻劑代抵當丸主之和劑丹梔逍遙散加薑黃香附治之諸書皆用桃奴散或琥珀散治之第兩方用溫藥亦血因寒凝之劑與喻氏所論又有不同醫者審證擇用可也容川又曰又有石瘕腸覃狀如懷子腹日以大月事以時下者為腸覃以寒氣客於腸外氣病而血不病也宜橘核丸主之月事不以時下者為石瘕乃寒氣客於子門子門閉塞惡血當下不下衄以留止故成石瘕是氣病而血亦病也宜琥珀散桃奴散治之後服溫經湯單腹脹者為血膨若四肢皆脹或先後四肢腫起其色紅者謂之血腫亦有不紅者血從水化而為水故不紅也或得於吐衄之後瘀血化水而腫或得於婦人經水不行血化為水而腫既化為水則兼治之五皮飲加當歸白芍蒲黃丹皮桃仁治之或用乾漆雄黃醋丸麥芽湯下亦可又凡鼓脹浮腫但要分陰症陽症陰症脈沉澀弦緊必有寒痰諸症宜用中滿分消湯加桃仁陽證脈數口渴便短氣逆等證宜小柴胡湯加知母石膏防己丹皮桃仁豬苓茯苓車前子治之六君子湯見煎咳嗽方內代抵當丸大黃一錢酒炒莪朮一錢山甲珠三片紅花一錢丹皮當歸各三錢牛膝二錢夜明砂三錢每次三五錢不等可以隨時酌量丹梔逍遙散當歸一錢白芍一錢茯苓一錢白朮一錢丹皮一錢梔子一錢柴胡七分甘草一錢橘核丸橘核一錢香附一錢楝子一錢楂核一錢荔核一錢吳萸小茴各五分研末寒食麵為丸淡鹽湯送下量兒之大小以為服之多少桃奴散肉桂五分五靈脂一錢香附子一錢砂仁七分桃仁一錢延胡索一錢桃奴一錢雄鼠屎一錢琥珀散琥珀一錢三稜一錢莪朮一錢丹皮一錢肉桂五分延胡索一錢烏藥一錢當歸一錢赤芍一錢生地一錢劉寄奴一錢五皮飲見前傷濕方內小柴胡湯見前咳嗽方向塗蔚生曰喻氏氣居血中血裹氣外一語已將血鼓之概略閘發使後治血膨者得其途徑不至盲無適從斯誠有功世道之文而經唐氏之詳為指解尤屬南針直指證治照然豫曾遇一老婦患吐血後遂得血臌之症前醫為之破氣下水者均屬無效已頻於危余鑑前醫之用藥失當復深究喻氏唐氏之言為之用六君子湯加血竭桃仁廣木香頓見巨效旋以戰事發生蔣士傑死守信陽城中內外間隔該婦遂隕於命雖屬時勢為之無可如何而前賢之於此症正法正治變法變治總屬不吾少欺可為吾之經驗上膽識上增一番之長進矣心腹痛周夢覺曰古傳心痛有九循其名而責其實纖毫難混曰蟲凡痛脈多伏今反洪數者纖蟲也厥名曰蛔長寸許首尾通紅踞於心窩子吮血吸精傷心之患莫慘於是以雄黃檳榔白礬為丸殺之而痛自除二曰疰疰者自上疰下也令人沉沉默默心中隱隱作痛甚有疰至滅門戶而莫名其病者脈則乍短乍長乍澀乍細非尋常藥餌所能療惟蘇合丸阿魏膏庶可以治三曰風風得火而益熾火得風而愈威風而入於心則痛之猝者也其脈浮緊而數以白菊白礬為君侯氏黑風散可採也四曰悸有觸而驚曰驚無觸而驚曰悸悸而至於痛則悸之甚者也其脈虛而滑加乳香沒藥為使李氏養心湯盍用之五曰食食入於胃停滯未化攻衝作痛其脈短而澀平胃散洵為對證之方六曰飲飲入於胃攻注無常激射作痛其脈濡而遲五苓散實為導水之劑七曰冷寒氣犯於繹宮脈則或遲或結吳萸川椒砂仁木香止痛書何難共證八曰熱火氣鬱於胸膈脈則或數或促生地梔子黃連苦楝除痛藥確有明文九曰去來痛經脈周流有礙則痛過其所礙而旋止巡至所礙而復發氣充血足何礙之有不必診脈補之可也顧同是心腹痛也以蟲傷人最酷者居首以疰之傷人最隱者居二以風之傷人最速者居三以悸之介在可以傷可以無傷者居四以飲食之不輕傷人者居五六以寒熱之恆有者居七八以去來痛之人皆知而能治者居九想古人位置之宜亦大費躊躇矣然名則列之有九義實本之於經曰蟲痛者經言蛔蜒心腹痛也曰疰痛者如飛尸遁尸之類也曰風痛者經言肝心痛也曰悸痛者手少陰之脈起於心中也曰食痛飲痛者足太陰之脈其支上膈注心中也曰冷痛者寒氣客於背腧注於心也曰熱痛者寒氣客於經脈與熱相搏也曰去來痛者經言氣不宣通也要皆非真心痛也若真心痛手足冷至節旦發夕死夕發朝死彼醫家所傳之方大半言止冷痛本草所注之性間有止熱痛之語夫冷熱之痛病之最淺而最易辨者諸書尚且聚訟何況痛之至隱而至僻者乎領會靈素微詞才是醫家學問變化本草訓語方知用藥權衡蘇合丸麝香沉香丁香檀香香附蓽茇白朮訶子硃砂青木香烏犀角各二兩薰陸香龍腦香各一兩安息香二兩另為未用無灰酒熬膏方為末用安息香膏加煉蜜為丸每兩十丸蠟皮包裹溫酒化服阿魏膏山楂肉膽南星法夏麥芽神麯黃連連翹阿魏栝蔞仁貝母風化硝枯咸蘿蔔子胡黃連上為末薑湯浸蒸餅為丸相其本體之強弱寒熱體強而熱阿魏丸體弱而寒蘇合丸俱宜隨時酌用多寡侯氏黑風散白菊五錢白礬一錢防風一錢白朮一錢桔梗八分人參一錢茯苓一錢當歸一錢川芎五分乾薑五分細辛三分牡蠣三分共為末調服李氏養心湯黃耆一錢茯苓一錢當歸一錢川芎七分法半夏五分甘草一錢柏子仁一錢棗仁一錢遠志一錢五味子一錢人參一錢肉桂五分乳香六分沒藥六分生薑一錢大棗一枚平胃散見前腫滿方內五苓散見前咳嗽方內夢覺香砂湯治冷痛廣木香砂仁肉桂等分共研細末每服五分夢覺梔仁湯治熱痛黑梔子三錢乾薑一錢五分炙甘草一錢五分夢覺耆朮湯治去來痛黃耆一錢焦術一錢肉桂五分當歸一錢法半夏五分陳皮七分茯苓一錢炙甘草一錢生薑一錢大棗一枚塗蔚生曰先賢有謂肚臍以上為心痛肚臍以下為腹痛者實則肚臍以上亦是胃痛不與心痛相干因心位至高界居膈膜以上而胃則界居於胸口之下也陳飛霞曰凡病心腹痛者有上中下三焦之分上焦者痛在膈上此即胃脘痛也是其不知何為上焦膈位何在而胃脘又何在也不過胃脘痛至甚其氣上逆亦可牽連心臟不安使之發生疼痛耳故難經云有厥心痛無真心痛如真心痛則旦發夕死夕發旦死周夢覺雖未將痛之界限分清僅將痛之種類分別晰清因症用藥而其碩誠偉見已足高人一等不過其食痛而下藥味均可加減誠能觸類旁通其中自有無數法門陳飛霞謂可按者為虛拒按者為實久痛者多虛暴痛者多實得食少減者為虛得食益甚者為實痛輕莫得其處者為虛痛劇有定所者為實又謂冷痛面色或青或白甚者面色暗淡唇口爪甲皆青熱痛面赤壯熱四肢煩躁手足心熱食痛口中氣溫面黃唇白多眠少食大便酸臭蟲痛面白唇紅六脈洪大痛則口出涎沫清水腹內結聚成團然豫每遇是症除蟲痛外俱以針刺之法為之調劑補瀉輕者刺委中手十二井足三里等穴而愈重刺中脘分水等穴而愈如心痛再甚則為之刺巨闕一穴而無不愈矣但此中補瀉之法未易深明寒熱之症尤須分曉惜乎吾國針學近者每下愈況醫者不知趨向尚耳癖積經曰新積痛可移者易已積不痛者難已也又曰胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也結而橫有積矣陳飛霞曰凡飲食之積其漸積者不過以飲食偶傷必在腸胃之內故可行可逐治無難也惟飲食無節以漸留滯者多成癖積於左脅膈膜之間此陽明宗氣所出之道也若飢飽無論飲食疊進以致陽明胃氣一有所逆則陰寒之氣得以乘之而脾不及化故余滯未消並腸外汁沫摶聚不散漸成癥結矣然其初起甚微人多不覺及其既久則其根深蒂固而藥餌難及今西北小兒多有此疾而尤以食麵之鄉為最正以面性多滯而留積於皮裡膜外所以不易治也惟當以漸消磨求法治之幸毋孟浪欲速妄行攻擊徒致胃氣受傷而積仍未去以速其危也癖者血膜化水則癖脅傍時時作病時熱潮熱或寒熱往來似瘧故瘧家多有此症凡瘧疾發過之後必令其熱退極盡方可飲食若熱未盡而飲食之則脘中多蓄黃水日久而成癖積小兒臟腑和平脾胃壯實則榮衛宣暢津液流通縱使多食生漿不能為病惟脾胃不勝乳哺不調三焦不運水飲停滯冷氣摶之結聚而成癖也體素弱者消癖丸氣壯實者赭石挨癖丸大約有癖之兒虛者居多攻下之藥非可常用即不得已而用之待其略減用消癖丸緩緩消之至為良法塗蔚生曰其動應衣脈宗氣也之衣字恐系誤待考又衣字似當作為乎字集成消癖丸治癖在脅下面黃肌瘦午後發熱似瘧用之人參白朮陳皮茯苓青皮川朴枳實半夏砂仁神麯麥芽鱉甲九肋者三稜莪朮廣木香肉桂炮姜黃連薑汁炒上為細末米糊為丸每服一二錢量兒大小加減米湯下以癖消藥止塗蔚生曰消癖丸內有砂仁神麯炮薑肉桂諸熱藥必須其癖積由於寒凝而來者方為合法若為因熱而結之癖積則又須易去其熱藥而為知柏芩連之寒藥方能取效也總之積熱宜乎寒下寒積宜乎熱下而加以固本之藥耳集成赭石挨癖丸治腹中癖塊或生寒熱或時作痛小兒壯實飲食素強者方宜用之脾胃素虛者切不可服惟以前藥攻補兼施久之自愈代赭石火煨醋淬至酥研末水飛過用青皮醋炒莪朮廣木香肉桂各三錢巴豆霜去油極淨取霜一錢大黃二錢上為細末醋煮麵糊為丸蘿蔔子大每服五丸淡薑湯送下諸汗塗蔚生曰汗者氣分之水由而氣變為汗如空中之氣遇寒冷變而為雨口鼻之氣遇漆石變而為水也古人有陽虛自汗陰虛盜汗之說因陽氣既虛則衛外者無所統御而內部化生充溢皮膚之氣即無所攝收故當醒寤之時發而為自汗也宜用六君子湯加炙耆棗仁茯神以治之陰血既虛則營內者無所主宰而外部化生依歸營血之氣即無所收容故當夢寐之時虛火干犯陽分發而為盜汗也宜用六味地黃湯加牡蠣龍骨寸冬五味以治之重者須當歸六黃湯治之然但頭汗出身不得汗者乃陽氣內郁冒於上而為汗宜以小柴胡湯解之手足濈濈然汗出與醒後遍體出汗許久不幹者乃胃中瘀血食積之火結聚中州也宜用玉燭散加枳殼厚朴以治之若夫時汗時止時冷時熱則為風淫腠理宜用柴胡桂枝湯以解其外來之邪久病之陽大汗不止則謂之陽將脫宜用參附湯以扶其內竭之陽臨症酌而用之幸毋膠柱鼓瑟六君子湯見前咳嗽方內六味地黃湯見前喘哮方內當歸六黃湯生地二錢熟地二錢黃連一錢黃芩一錢黃柏一錢黃耆一錢當歸一錢小柴胡湯見前咳嗽方內玉燭散生地一錢當歸一錢川芎六分白芍一錢朴硝一錢大黃一錢枳殼六分厚朴五分大棗一枚柴胡桂枝湯見前風症談參附湯人參一錢附片三分消渴經曰二陽結謂之消周夢覺曰同一消也而氣分血分判焉氣分結者病發於陽血分結者病發於陰二症相反如同冰炭其發於陽也陽明被火煎熬時引冷水自救脈浮洪而數其發於陰也陽明無水涵濡時引熱水自救脈沉弱而遲發於陽者石膏黃連可以折狂妄之火人所共知發於陰者其理最為微妙非三折其肱殊難領會人之灌溉一身全賴兩腎中之水火猶之甑乘於釜釜中水足而甑自水氣交流倘水涸火熄而甑反乾枯縫裂血分之渴作如是觀當此舌黑腸枯之時非重用熟地不足以滋其水非重用桂附不足以益其火火熾水勝而渴自止余嘗治是症發於陽者十居二三發於陰者十居七八用桂附多至數斤而愈彼本草所注無非治氣分之品而治血分之藥性不注於本草方實治始於仲景至喻嘉言而昌明其說上消如是中下消可類推矣昔漢武帝患是症仲景進桂附八味湯服之而愈因賜相如服之無效或曰相如之渴發於氣分或曰相如為房勞所傷非草木之精華所能療武帝不賜方而賜以金莖露一杯庶幾愈焉未可知也夢覺甘石湯治氣分有熱消渴石膏二錢知母一錢炙草一錢黃連一錢粳米一錢桂附地黃湯即腎氣丸見前腫滿方內塗蔚生曰夢覺所論之氣分消渴亦即水虛消渴如火過盛而水之化氣過少不能上輸肺部水津四布者亦須加入人參使氣滋火降津升渴止若其所謂發於陰者用桂附地黃湯則必須腎中水火俱虧兼有下消症者方可用否則水虧火旺滋陰降火尚恐不濟何可以熱濟熱速其危殆者哉故知柏地黃湯實為治消渴症之要藥因此症較他症為多也如其陰虧已極則補有形之陰必須有形之質而龜膠尤可加入至於瘀血消渴則為血阻氣升清其瘀而渴血自止雜病消渴則為水停不化化其水理其脾益其火而渴亦自止此皆非消之正症者也亦不可不知知柏地黃湯見前咳嗽方內二便經曰北方黑色入通於腎開竅於二陰陳飛霞曰夫二陰者前陰竅出小便後陰竅出大便又云前陰主氣後陰主血蓋膀胱之津液血所化也由氣而後能出太陰之傳送氣之運也由血而後能潤此便溺之流通見氣血依附而人之所以為生者以其有此出入關竅耳清陽出上竅謂呼吸也濁陰出下竅謂二便也倘一息不運則機息窮而死矣故二便不通加以腹痛氣喘嘔惡煩躁者不可治也凡二便祕宜八正散外用醃臍法蜜導煎法則前後俱通矣八正散治熱聚下焦二便不通木通一錢滑石一錢梔子仁一錢車前子一錢瞿麥穗一錢錦紋黃一錢芒硝一錢等分量兒大小加減用之除大黃芒硝外將各味水煎極熟加入大黃再煎斟出後再加芒硝沖服醃臍法治中下二焦大小便不通蓮鬚一錢生薑一錢淡豆豉一錢食鹽一錢同搗爛作一餅子烘熱掩肚臍以帛扎之良久氣通二便自利蜜導煎法治二便不通以此通其大便則下焦氣行而小便自導矣白蜜煉至滴水成珠不散入皂角研細末二錢和勻稍冷捻如小指大一條外以蔥涎塗上輕輕放入穀道中氣通則便通矣塗蔚生曰用皂角水以管注入穀道中其大便下利亦極迅利較蜜導煎尤佳又寒熱結於膀胱亦可發生閉塞不可不辨大便不通經曰太陰司天陰痹大便難陰氣不用病在於腎又曰太陽之勝隱曲不利互引陰股陳飛霞曰夫飲食之物有入必有出也苟大便不通出入之機幾乎息矣急宜通之使舊谷去而新谷得入然有實閉有虛閉最宜詳審如形實氣實脈實又能食者的有可下之證則下之如八正散承氣湯木香檳榔丸之類擇而用之中病即止不可過也如形虛氣虛脈虛而兼食少者雖有可下之證宜緩不宜急但用保和丸加枳實微利之如平素便難者血不足也宜潤腸丸蜜導煎法八正散見二便方內大承氣湯見前痙病方內枳殼一錢厚朴一錢大黃一錢芒硝一錢集成木香檳榔丸黑牽牛炒取頭末五個尖檳榔錦紋黃木香神麯上共為細末薑汁打米糊為丸量兒大小加減用之集成保和丸神麯一錢陳皮一錢法半夏一錢茯苓一錢山楂肉一錢連翹一錢集成潤腸丸火麻仁去殼光杏仁去皮桃仁去皮陳枳殼當歸尾以上各七錢半阿膠珠蘿蔔子蘇葉各二錢上為細末煉蜜為丸每服一二錢量人加減白湯調下塗蔚生曰潤腸丸即仲景脾約丸之意脾約丸為治脾火太旺將腸胃津液煎枯而大便乾結者潤腸丸雖本此意以為加減而蘇葉之雜於其間則不如脾約丸之純推此意以求則陰虛至急腎火至盛將腸胃煎熬極枯燥結極甚者則生地萸肉知柏芩連俱可加入豫在正陽曾治一素患陰虛之人忽患大便燥結他醫盡為推蕩愈治而愈甚豫為之用脾約丸原方重用生地龜膠芩連等味而愈者足見大便之結不僅實熱然也而陳飛霞以虛者用保和丸加枳實微利之是其既未免患虛之嫌又未知虛者又有何種類如何治法也若夫脾濕陰滯津液不降須得苓朮而大便通者則猶非飛霞所能知者也但此中最少不過百分之一二耳不可不知仲景脾約丸一名麻仁丸麻仁二錢白芍一錢大黃一錢枳殼七分厚朴五分杏仁一錢小便不利經曰膀胱者州都之官津液藏焉氣化則能出矣又曰膀胱不利為癃不約為遺溺又曰肝有熱則小便先赤陳飛霞曰凡小便赤澀為熱小便自遺為寒熱者火有餘水不足治宜瀉心火滋腎水加味導赤散寒者火不足水有餘治宜溫腎水益心火益智散小便不通乃由腎臟氣虛受熱壅滯宣化不行非塞非痛但閉而不痛腹脹緊滿宜五苓散加車前燈心大病之後氣虛津液不足而小便閉者不可利之利則中氣日虛津液愈涸宜人參散小兒患淋小便淋瀝作痛不必分五種然皆屬於火熱宜清利之海金砂散小兒久病氣虛而淋病者不可利小便宜六味地黃丸滋其化源小便自出而不禁者謂之遺尿睡中自出者謂之尿床此皆腎與膀胱虛寒也益智散加附桂龍骨小便初起黃赤落地良久凝如白膏者謂之尿白傷脾所致久而成疳胃苓散鹽湯下小兒小便出時色白渾濁隨尿而來謂之白濁此心經虛熱宜清心蓮子飲加味導赤散治心熱肝熱小便赤澀用木通生地炙甘草枯黃芩黑梔仁澤瀉柴胡各一錢淡竹葉七片燈心十根水煎空心熱服益智散治水有餘火不足而遺溺用益智五錢鹽水炒補骨脂三錢鹽水炒茯苓五錢酒炒上共細末每服一錢鹽水調下五苓散見前咳嗽方內集成人參散治氣虛津液不足小便不通用人參一錢麥冬一錢黃柏一錢炙甘草一錢生薑一錢集成海金砂散治小兒諸淋皆屬於熱香附米酒炒川芎酒炒赤茯苓酒炒各五錢海金砂一兩滑石一兩小飛陳枳殼澤瀉炒石葦焙檳榔炒各二錢上共為細末每服一錢淡鹽湯調下六味地黃丸見前喘哮方內集成清心蓮子飲專治白濁茯苓一錢五分建蓮子二錢益智仁一錢寸冬人參遠志肉石菖蒲車前子各五分白朮六分澤瀉四分甘草五分燈心十莖水煎空心服胃苓湯見前泄瀉方內塗蔚生曰濁固關於小便病症之一種而飛霞所舉之清心蓮子飲則未可治濁之要藥今將唐容川之白濁症論簡略治法妥善者摘入以為治濁之補助容川曰濁者小便不清或白或黃或青或赤此如暑天洪水泥潦之類乃濕熱為之也濕甚用胃苓湯加黃芩黃連黃柏白芍治之熱甚用茵陳蒿梔子黃柏秦皮木通車前子防己甘草梢治之又有敗精為濁者或由思淫不遂或由淫而精停治宜萆薢分清飲加鹿角屑桑螵蛸白芍肉蓯蓉治之本其前者以為加減頗為治濁良方至其後者之濁誠為少數云耳胃芩湯見前泄瀉方內萆薢分清飲萆薢三錢菖蒲一錢甘草梢一錢烏藥一錢益智五分青鹽一錢夜啼陳飛霞曰小兒夜啼有數症有臟寒有心熱有神不安有拗哭此中寒熱不同切宜詳辨臟寒者陰盛於夜至夜則陰極發燥寒甚腹痛以手按其腹則啼止起手又啼外症面青手冷口不吮乳夜啼不止加減當歸散心熱煩啼者面紅舌赤或舌苔白澀無燈則啼稍息見燈則啼愈甚宜導赤散加麥冬燈心甚則加川連龍膽草神不安而啼者睡中驚悸抱母大哭面色紫黑蓋神虛驚悸宜安神丸定其心志有吐瀉後及大病後啼亦由心血不足治同上集成當歸散當歸一錢吳萸一錢肉桂五分川芎三分黑薑炭三分廣木香三分小茴香一錢炙甘草一錢導赤散梔子一錢當歸一錢甘草一錢集成十味安神丸黨參一錢茯苓一錢寸冬一錢山藥一錢龍齒七分辰砂一錢寒水石五分粉草一錢梅花片三分赤金箔五分上共為細末煉蜜為丸芡實大每服一丸塗蔚生曰夜屬陰故寒痛至夜甚又安能陰極發燥然欲知小兒寒痛哭而眉頭皺摺者是也疝氣經云邪客於足厥陰之絡令人卒疝暴痛又曰病在小腹痛不得大小便病名曰疝得之寒陳飛霞曰故疝氣者寒邪結聚而成也內則臍腹絞痛外則卵丸腫大專屬肝經與腎無涉蓋肝主怒小兒性急多叫哭而得之者此氣動於內謂之氣疝應行氣開鬱初宜柴苓湯升散之次宜加減二陳湯或木香內消丸如因久坐濕地得之者此冷氣入腹謂之寒疝宜溫中散寒加減當歸散茱萸內消丸有腫而不痛由中濕所致卵雖腫而無熱腹不痛宜行濕消腫加減守病丸小兒素有疝氣或一年半年發者發則有形外連睪丸內貫小腹腫硬一條如小杵約長五六寸大小便不通當歸木香湯小兒外腎腫大不痛連年不消者不早治便為終身痼疾宜茱萸內消丸加牽牛子半生半炒取頭末用更灸臍旁章門穴大效取穴法以本兒手掌第五指本節橫紋對臍心中針灸大成云宜季脅肋端腨臍上二寸兩旁六寸側臥屈上足伸下足舉臂取之又曰肘盡處是穴小兒濕地上坐或有蚯蚓吹其卵腫大而垂者以鹽湯浸洗之蓋鹽能殺蚯蚓毒也或以蒼朮煎湯加鹽少許洗之即效小兒陰囊生瘡潰爛者謂之脫囊用紫蘇葉研末敷之以荷葉包之或用生荷葉火烘令軟包之雖囊丸露出亦可治也外腎臊臭時復濕癢柴胡龍膽湯癢甚不可止者胡椒煎湯洗之柴苓湯見前傷濕方內治少陽膽經有邪而病疝用之加味二陳湯治性急多哭卵腫痛連小腹謂之疝氣用之陳皮一錢半夏一錢茯苓一錢小茴一錢川芎六分肉桂五分炙甘草一錢生薑一錢水煎熱服集成木香內消丸木香一錢三稜煨一錢豬苓一錢澤瀉一錢川楝肉一錢陳皮一錢酒炒香附酒炒一錢青皮醋炒一錢上共為細末酒煮米糊為丸每服一二錢空心鹽湯下集成加味當歸散治受寒濕之氣小腹絞痛外腎紅腫並腹痛啼哭等證用之當歸身一錢吳茱萸一錢青化桂五分川芎五分黑薑炭五分廣木香五分小茴香一錢炙草一錢水煎臨服加鹽七分空心溫服集成茱萸內消丸治寒濕所襲留伏作痛㿗疝偏墜用吳茱萸醋浸一宿焙乾炒過大茴香鹽炒肉桂去粗皮棗仁去皮核延胡索醋炒青皮醋炒橘紅以上各一兩桃仁五錢白蒺藜炒廣木香各五錢上共為細末酒煮麵糊為丸龍眼大每服一丸淡鹽湯下集成加減守病丸治卵腫不痛此濕氣也又名木腎用漂蒼朮制南星白芷山楂肉川芎橘該半夏神麯吳茱萸以上等分共為細末酒煮麵糊為丸龍眼大每服一丸小茴香煎湯下集成當歸木香湯治小兒久疝不愈用橘核一錢全當歸一錢正川芎七分木通一錢小茴香一錢川楝肉一錢青皮一錢豬苓一錢澤瀉一錢廣木香五分黑梔仁一錢集成龍膽湯治小兒外腎燥臭時復濕癢柴胡一錢澤瀉一錢車前子一錢木通一錢生地一錢當歸一錢龍膽草一錢頭項囟證治經曰頭痛耳鳴九竅不利腸胃之所生也陳飛霞曰小兒頭囟之證多有由脾胃而得又頭為六陽所會七竅居焉故小兒之頭四時宜涼但見頭熱即有病生宜預防之解顱者謂頭縫開解而顱不合也是由稟氣不足先天腎元大虧腎主腦髓腎虧則腦髓不足故顱為之開解然人無腦髓猶樹無根不過千日則成廢人其候多愁少喜目白睛多面㿠白色若成於病後者尤凶宜久服地黃丸外用封囟法囟腫者囟門腫起也脾主肌肉若哺乳不常飽飢無度或寒或熱乘於脾家致使臟腑不調其氣上衝為之䐜脹囟突而高如物堆垛毛髮短黃骨蒸自汗然亦有寒氣上衝而腫者則牢蘄堅硬熱氣衝上而腫者則柔軟紅色然寒腫十之一熱腫者十之九更有包裹嚴密蓋復過厚陽氣不得外出亦令赤腫皆用封囟法熱腫者瀉青丸寒腫者參蘇飲囟陷者有因泄瀉久而氣虛弱不能上充腦髓故下陷如坑此乃胃虛脾弱之極宜急扶元氣若與枕骨同陷者百無一救此中有稟受父精不足母血虛羸而陷者有因久病而陷者然枕陷尤甚於囟陷二者皆因腎氣敗絶之證也俱參苓白朮散或八味地黃丸天柱骨倒小兒外視體肥容壯不為瘦悴孰知形體過肥中氣愈弱是盛於外而歉於內也忽然項軟傾倒者此肝經風熱也小柴胡加葛根當歸白芍有因於久病之後或泄瀉日久忽然頸項傾側名天柱骨倒最為危候速救真元十全大補湯加鹿茸有小兒生下頸便軟者胎氣不足也由稟父之腎元虛敗峻補先天其幾庶矣補腎地黃丸與六君子湯間服天柱骨例之證雖則三條總系真陽大敗之候為小兒之惡症宜保救真元是其大要外以生筋等藥貼之可也六味地黃湯見前哮喘方內封囟法天南星不拘多少以薑汁炒枯研細末醋調塗於絹帛上烘熱貼囟上以合為度瀉青丸羌活川芎梔子仁龍膽草當歸防風大黃上共為細末煉蜜為丸青黛為衣黃豆大清茶化下酌量服用參蘇飲見前咳嗽方內參苓白朮散見前疳症方內八味地黃湯見前腫滿方內小柴胡湯見前咳嗽方內十全大補湯熟地三錢當歸一錢白芍一錢川芎七分黨參一錢白朮一錢茯苓一錢甘草一錢肉桂五分黃耆一錢補腎地黃湯熟地二錢山藥二錢萸肉一錢鹿茸三分丹皮一錢牛膝一錢茯苓一錢澤瀉一錢補骨脂一錢五味子一錢上為末蜜丸緑豆大每服三錢鹽湯下六君子湯見前咳嗽方內生筋散治筋軟無力天柱骨倒木鱉子六個萆麻子六十個去殼淨以藥研如泥先抱頭起以手摩其頸令熱津唾調藥塗頸項又方治項軟生附子二錢去皮生南星三錢去皮共研末攤貼患處目疾證治經曰諸脈者皆屬於目又曰東方青色入於肝開竅於目陳飛霞曰夫目雖為肝竅而五臟俱備神之所化故白珠屬肺黑珠屬肝瞳仁屬腎兩角屬心上下眼胞屬脾五臟五色各有所司心主赤赤甚者心實熱也赤微者心虛熱也肝主青青甚者肝熱也淡青者肝虛也脾主黃黃甚者脾熱也淡黃者脾虛也目無睛光及白睛多而黑睛少者肝腎俱不足也目內赤色心經積熱上攻宜瀉丙火從小便而出導赤散加黃連防風目內黃者脾熱也宜瀉黃散上下眼胞腫者脾經風熱亦同上治目連眨者肝有風也凡病或新或久肝風入目上下左右因風吹兒不能任故連眨也瀉青丸目直視者肝有熱也熱氣入目障其筋脈目之兩角俱緊不能轉運故直視也瀉青丸小兒初生目閉此胎熱也內服地黃湯外用膽草煎湯洗目上一日七次恐延纏則損目小兒生下眼泡赤爛者由産時拭洗不淨以致穢惡浸潰兩目角故兩泡赤爛至長不瘥真金散小兒久嗽其目兩眶腫黑如物傷損白珠紅赤如血謂之血眼內服瀉白散外用貼法小兒生下數月內夜不見物謂之雀目由肝虛也六味地黃湯丸常以豬肝煮熟壓之小兒熱病其目羞明喜暗者風熱也宜疏散風熱清陽散火湯導赤散見前夜啼方內集成瀉黃散治脾經積熱白珠生黃藿香梗一錢二分黑梔仁一錢熟石膏一錢防風一錢炙甘草六分淨水煎半飢服瀉青丸見前頸項方內生地黃湯治小兒胎熱初生眼閉不開用生地一錢赤芍藥一錢川芎五分當歸一錢天花粉一錢炙甘草一錢燈心十莖長流水煎服集成真金散治小兒眼泡赤爛用川雅連一錢黃柏一錢當歸一錢赤芍藥一錢杏仁一錢去皮尖上銼碎以乳汁浸一宿飯上蒸過取濃汁點眼內瀉白散治小兒久嗽兩眶黑腫白珠如血用炙甘草一錢桔梗一錢陳皮一錢桑白皮一錢地骨皮一錢又貼藥用生地一兩黑豆一兩上二味用水同浸一宿取起搗為膏貼眼皮上其血自散血淚既出腫黑自消六味地黃丸見前喘哮方內清陽散火湯治小兒風熱眼疾羞明喜暗用荊芥穗一錢條芩一錢川芎五分防風一錢連翹一錢黑梔仁一錢當歸一錢熟石膏一錢羌活五分炙甘草一錢燈心十莖水煎食後服塗蔚生曰眼科另是一種專門學問自有方書可查小兒除風火食熱等症外內外障疾頗少故本書不多贅及但其所謂之兩眼角屬心當有心腎之分未可混合大眼角之紅筋屬心紅而脹大者心實熱也小眼角則屬於腎紅甚固屬火甚淡紅則屬相火虛也粟黍之辨似過於迂誠恐差以毫釐謬以千里耳耳病證治經曰北方生寒在臟為腎在竅為耳又曰腎氣通於耳腎和則耳能聞五音矣陳飛霞曰故耳本屬腎耳珠前屬少陽膽經小兒有因腎經氣實其熱上衝於耳遂使津液壅而為膿或為清汁亦有因沐浴水中灌為聾者內服蔓荊子散外用龍骨散搽之耳珠前後生瘡浸淫不愈者名曰蝕瘡俗謂以手指月則令耳之前後生瘡皆用外治之法黃柏散搽之效若耳中忽作大痛如有蟲在內奔走或出血水干痛不可忍者用蛇蛻散有忽然氣塞耳聾此由風入於腦停滯於手太陽經宜疏風清火用導赤散加防風或通竅丸耳傍赤腫者熱毒也若不急治必成大癰外用敷毒散內服清毒飲蔓荊子散治小兒腎氣上衝灌為聾耳蔓荊子一錢粉乾葛一錢赤芍藥一錢信前胡一錢桑白皮一錢木通一錢生地一錢白芍一錢赤茯苓一錢緑升麻五錢甘草一錢燈心十莖水煎服龍骨散治小兒聤耳流膿出汁以此吹之正龍骨煅白礬煅鉛丹炒以上各二錢胭脂胚二錢當門子五釐共為末以綿展干耳內膿內用小竹筒吹藥入耳黃柏散治小兒耳珠前後生瘡浸淫不愈川黃柏白枯礬海螺蛸白滑石石龍骨上五味皆等分共為末瘡濕用干搽瘡乾用豬油調搽蛇蛻散治耳中痛不可忍或血水或干痛用蛇蛻燒灰存性為細末鵝毛管吹入耳內取蛻之善脫以解散鬱火也導赤散見前夜哭方內通竅丸治小兒忽暴聾雄磁石煅一錢真麝香五錢共為細末以棗研爛和為一丸如棗核大綿裹塞耳中又以生鐵一小塊熱酒泡過含口內須臾氣即通矣敷毒散治小兒耳傍赤腫熱毒也恐防作癰用之緑豆粉不拘多少以老醋調成膏敷腫處干易之消毒散治小兒耳傍赤腫內服之藥羌活一錢防風一錢黃芩一錢連翹一錢桔梗一錢黨參一錢川芎七分當歸一錢柴胡一錢甘草一錢生薑一片燈心十莖水煎服鼻病證治經曰西方白色入通於肺開竅於鼻又曰五氣入鼻藏於心肺有病而鼻為不利也陳飛霞曰蓋鼻為肺之竅鼻塞者肺氣不通於竅然肺主皮毛風寒外感則肺氣壅用而鼻塞川芎膏鼻涕者肺為寒風所襲而津液不收則為鼻涕細辛散疏之鼻齆者肺受風寒久而不散膿涕結聚不開使不聞香臭則齆矣萬金膏以上三證皆宜疏利俱用通氣散鼻乾者心脾有熱上蒸於肺故津液枯竭而干當清熱生津導赤散加麥冬如病已極鼻乾而黑竅張帝出冷氣者肺絶也不治之證鼻淵者流涕腥臭此膽移熱於腦又名腦崩宜用辛夷散凡小兒初生三朝一七忽然鼻塞不能吮乳不得呼吸者因乳母夜臥之時不知回避鼻中出氣吹兒囟門或因洗水未避風寒所以致兒鼻塞通關散和蔥膏攤帛貼囟門愈鼻衄者五臟積熱所致蓋血隨氣行得熱而妄動溢出於鼻宜涼血降火加減地黃湯外用吹鼻散集成川芎膏治小兒外感風寒肺氣壅閉而鼻塞川芎一錢細辛一錢藁本一錢白芷一錢炙甘草一錢梅花片七分杏仁一錢去皮頭當門子三釐共研細末煉蜜為丸龍眼核大每服一丸燈心湯化下集成細辛散治小兒風寒所襲鼻流清涕用黨參一錢前胡一錢細辛四分防風一錢川芎五分炙甘草一錢共為末每服一錢薑蔥湯調下集成萬金膏治小兒風熱侵肺鼻齆不聞香臭羌活一錢川芎一錢細辛六分木通一錢麻黃一錢菖蒲一錢共為細末每服一錢以蜜和勻薑湯化服導赤散見前夜啼方內集成麗澤通氣散治小兒鼻涕鼻齆用羌活六分獨活六分蒼朮一錢防風一錢升麻五分荊芥穗一錢粉乾葛一錢白芒一錢川芎五分木通一錢麻黃一錢細辛五分炙草一錢生薑三片大棗三枚水煎食後服集成辛夷散治小兒鼻流濁涕而腥臭用辛夷仁一錢蒼耳子一錢白芷一錢薄荷葉一錢黃連一錢共曬乾為末每服一錢蔥湯調下集成通關散治乳子鼻塞不能吮乳香附子一錢川芎一錢荊芥穗一錢直殭蠶一錢細辛七分豬牙皂一錢共為細末以蔥搗成膏每用末藥五錢與蔥膏和勻攤軟帛上臨臥烘熱貼兒囟門上早晨取去集成加減地黃湯治小兒鼻中出血用生地二錢黃芩一錢黑梔仁一錢赤芍一錢茅根一錢水煎溫服集成吹鼻散治小兒鼻出血用黑梔仁炒亂油發燒存性俱等分共為細末微吹鼻中口瘡證治經曰中央黃色入通於脾開竅於口又曰脾氣通於口脾和口能知五味矣陳飛霞曰口者脾之外候鵝口者口內白膩滿舌如鵝之口此肺熱而心脾為甚故發於口也內服沆瀣丹外以保命散吹之口瘡者滿口赤爛此因胎稟本厚養育過溫心脾積熱熏蒸於上以成口瘡內服沆瀣丹外以地雞擂水搽瘡上地雞即桶蟲人家磚下有之口糜者滿口生瘡潰爛乃膀胱移熱於小腸膈腸不便上為口糜以導赤散去小腸之熱五苓散去膀胱之熱當以二方合服口瘡服涼藥不效乃肝脾之氣不足虛火泛上而無制宜理中湯以收其浮游之火外以上桂末吹之若吐瀉後口中生瘡亦是虛火理中湯昧者以為口瘡悉為實熱概用寒涼必不救上齶有脹起如懸癰者此名重齶由脾胃挾熱氣血不能收斂而成用針刺去惡血內服沆瀣丹以碧雲散吹之小兒兩頤流液浸漬胸前者此名滯頤蓋涎者脾之液口為脾竅脾胃虛寒不能收斂津液故涎從口出而滯於頤宜溫脾丹小兒口頻撮者氣不和也蓋唇應於脾氣出於肺脾虛不能生肺以故口頻撮異功散補脾散補脾生肺愈矣小兒口撮面青多哭此陰寒之至肝脾虛冷臍下痛也理中湯溫之小兒急欲吮乳而口不能吮者心脾有熱舌不轉運瀉黃湯清之集成沆瀣丹見前傷濕方內集成保命散治小兒鵝口口瘡箭頭沙枯白礬明牙硝各一錢共為細末吹之五苓散見前咳嗽方內導赤散見前夜啼方內理中湯見前泄瀉方內碧雲散治小兒懸癰重齶用蒲黃末洋青黛白硼砂明牙硝生甘草各等分共為細末吹之溫脾丹治小兒脾冷流涎浸潰頤間用木香半夏各三錢炮姜白朮各二錢陳皮青皮各一錢上共為細末煉蜜為丸龍眼核大每服一丸末飲下導功散見前脹滿方內瀉黃散治小兒心脾有熱舌不轉運不能吮乳茯苓黃芩黃柏黃連梔仁茵陳蒿澤瀉各一錢燈心十莖水煎服下塗蔚生曰陳飛霞五苓散去膀胱之熱語未免有誤蓋五苓散最熱為溫化寒水凝結之藥而其熱所以能去者因水滯中焦而膀胱失其火化不能化氣上行則津液四達故口渴而身熱胸煩也今苓澤利水下降桂枝化水上行則衛氣得升津液得達故真寒可除而假熱可去也若以是為治膀胱火熱之藥是何異以硝黃為治陽明寒結者乎然則膀胱之熱果何以去曰五苓散去桂枝加以知柏芩連木通等味斯可耳舌病證治經曰南方生熱熱生火火生心心生舌在竅為舌又曰心氣通於舌心和則舌能知五味矣陳飛霞曰夫舌為心之苗胃之根小兒多生舌病以心脾之積熱也故有重舌木舌弄舌舌胎等證宜辨其虛實而治之重舌者心脾有熱蓋脾之大絡出於舌下有熱則氣血俱盛附舌根下忽重生一舌面短小內服沆瀣丹外以針刺去其惡血以碧血散竹瀝調勻敷之弄舌者脾臟虛熱令舌絡緊時時舔舌俗人稱為蛇絲驚者是也切勿以寒涼攻下治之少與瀉黃散服之不效四君子湯或渴欲飲水面無紅赤色此脾胃津液不足不可誤認為熱宜七味白朮散面黃肌瘦胸心煩熱而弄舌者此疳證也須從疳證門參考宜集聖丸大病後精神困憊飲食少思而弄舌者凶候蓋氣血兩虧精神脫卻速以十全大補湯挽救之舌上黑苔其熱已劇急以薄荷煎湯洗之如舌轉紅色者可治涼膈散下之洗之不紅者不治泄瀉後舌上白胎此津液不榮不能上潮於口為虛熱也理中湯集成沆瀣丹見前傷濕方內碧雪散見前口瘡方內七味白朮散見前泄瀉方內瀉黃散見前口瘡方內六君子湯見前咳嗽方內集聖散見前疳症方內十全大補湯見前頭項方內涼膈散治心脾有熱舌上黑苔者連翹一錢梔仁六分大黃五分薄荷一錢黃芩六分芒硝五分甘草四分竹葉七片燈心十莖水煎服加生蜜十匙對服理中湯見前泄瀉方內塗蔚生曰舌上黑苔必須乾燥無津液者方可斷為其熱已劇若舌上雖為黑苔而有津液油潤者猶是陰寒至極外見假熱之色此等精微未可忽視者也牙齒證治經曰天有列星人有牙齒又曰手陽明之脈入下齒中足陽明之脈入上齒中陳飛霞曰上齒屬胃下齒屬大腸齒屬腎凡齒生遲者腎氣不足也蓋腎主骨齒者骨之餘也不足則髓虧不能充乎齒所以齒遲宜地黃丸上下牙床腫者此手足陽明實熱也涼膈散為君加知母升麻石膏為佐頻頻含咽齦腫者腎臟積熱附齦而腫痛也以針刺去其血用鹽湯洗淨黃柏為末敷之效小兒有多食肥肉齒牙臭爛不可近者名為臭息此胃膈實熱也內服沆瀣丹外以荊竹瀝和薑汁含嗽牙疳者初作臭氣次則牙齒黑甚則齦肉爛而出血名為宣露此由腎熱其氣直奔上焦故以走馬為喻宜速治之若上下唇破鼻穿齒落者名曰崩沙氣喘痰潮飲食減少則不可治內服沆瀣丹外以如聖散敷之夢中咬牙風熱也由手足陽明二經積熱生風故令相擊而有聲也必在夢中也風屬陽明動則風行於陽靜則風歸於里也宜風散咬牙一症惟痘疹見此為危候余則皆無大害亦有因病戰栗鼓頷而鬥牙者治其本證則自止牙齒落後不復生者由於舌舔之故其肉頑厚用針刺去其血以鼠骨散搽之自生六味地黃湯見前喘哮方內涼膈散見前沆瀣丹見前傷濕方內如聖散治小兒走馬疳並奔沙宣露用婦人尿桶中白垢刮下瓦上煅至煙盡加銅緑二分麝香五釐共為細末先以蠟樹葉浸米泔水洗淨後搽此藥宣風散治小兒夢中咬牙用尖檳榔五兩陳皮一兩五錢牽牛一兩炒取頭末甘草五錢共為細末每服一二錢加蜂蜜調之空心服塗蔚生曰查宣風散所用之藥多系破氣消食之藥品並無一味去風者足見夢中咬牙亦是食積之熱名為是風則未免錯了過半矣鼠骨散治小兒齒落不生用雄鼠一支爛去其皮取全骨炙枯研細末加麝香一分擦刺處良久以薑湯嗽之塗蔚生曰小兒除齒遲齦腫等證外頗少齒痛之症然豫於齒痛除由於風火而外得一虛火牙痛之方治療最速收效最神蓋齒總屬於腎腎陰一虛不能上輸滋養則虛火熾炎爍齒作痛治之之方唯有滋陰降火兼清陽明之燥熱耳方用加味玉女煎至風火牙痛之外治法以蒜瓣一片研搗如泥加入輕粉少許置於小蛤蜊殼內放於虎口穴上在合骨下令其燒熱至極痛時始去之頃刻此處肉起一小泡用針刺破流出黃水牙痛立止終身不復牙痛但此必須是牙痛由於風火內熱者否則亦不大效加味玉女煎生地二錢玄參一錢骨碎補一錢石膏一錢知母一錢寸冬一錢甘草一錢懷牛膝二錢咽喉證治經曰咽喉者水穀之道也喉嚨者氣之所以上下者也又曰二陰一陽結謂之喉痹陳飛霞曰蓋咽者胃管主納水穀而居後喉者肺管主呼吸而居前為人一身之總要若胸中鬱積熱毒至生風痰壅滯不散發於咽喉病名雖多無非熱毒速宜清解緩則有難救之患輕則甘桔湯重則化毒湯如痘瘡咽喉痛者毒氣上攻也加減甘桔湯喉中生瘡不吮乳化毒湯小兒為諸骨所哽骨大難咽者以鵝毛掃咽吐之骨小者用海上方治之甘桔湯治小兒膈膜積熱致生風痰而患喉痹用粉甘草二錢牙桔梗一錢以淨水煎細細咽之化毒湯治小兒咽喉證危迫者用牙桔梗一錢薄荷一錢荊芥穗一錢炙甘草一錢芒硝一錢山豆根一錢馬牙硝一錢硼砂一錢明雄黃一錢鏡面砂一錢共為細末每服一錢白湯調下仍以此藥吹喉中海上方治小兒諸骨所哽用金鳳花根搗碎以米醋濃煎用有嘴瓶盛之口銜瓶嘴仰面吸藥吞之其骨即下吞藥勿令沾牙又或以玉簪花根亦可如上法煎咽塗蔚生曰喉痛一症雖多由於風火然必陰虛之人始易患此小兒縱無伐傷腎陰情事然食積等火爍陰亦與伐傷無異故小兒素患久患喉症者亦宜兼顧其陰楊氏咽喉七十二症無不以六味地黃湯為加減蓋為此也至陰虛至極虛火上犯而作腫痛有時必須加入桂附少許以為反佐立時引火歸源腫消痛止者此又不可不知但桂附須用上等者方不至誤事此亦不過百分中之一二耳五軟五硬小兒生後有五軟五硬之證乃胎元怯弱稟受先天陽氣不足不耐寒暑少為六淫所犯便爾五軟見焉五軟者頭項軟身體軟口軟肌肉軟手足軟是為五軟然頭項軟肝腎病也肝主筋腎主骨肝腎不足故頭項軟而無力手足軟脾胃病也脾主四肢脾胃不足故手軟而懶於抬足軟而慵於步也身體軟陽衰髓怯遍身羸弱而不能強立口軟者虛舌出口而懶於言肌肉軟者肉少而皮寬身體虛尫之象也總之本於先天不足宜地黃丸以補肝腎而所以更重者在胃蓋胃為五臟六腑之化源宜補中益氣湯升舉其脾氣但得脾胃一旺則臟氣有所稟諸軟之症其庶幾矣五硬者手硬足硬腰硬肉硬頸硬也仰頭取氣難以動搖氣壅疼痛連於胸膈手心腳心冰冷而硬此陽氣不榮四體也為獨陰無陽難治若肚筋青急乃木乘土位俱宜六君子湯加薑桂升麻柴胡以補脾平肝若面青而小腹硬者不治六味地黃湯見前喘哮方內補中益氣湯見前泄瀉方內六君子湯見前咳嗽方內外加乾薑上桂升麻柴胡丹毒證治陳飛霞曰小兒赤遊丹毒皆由心火內壅熱與血搏或起於手足或發於頭面胸背遊移上下其熱如火痛不可言赤如丹砂故名丹毒自腹出四肢易治自四肢入腹難治治丹之法用辛涼解表使毒漸消方可搽敷若先不解表遽用搽敷必逼毒入腹以致不救小兒一歲外者易治未周歲者難治然治之得法無論大小豫嘗治百日內外火丹從陰囊下起按法治之三日後陰囊去一殼而愈小兒十種丹毒如三日不治攻入腸胃則不救宜逐一辨認依方治之百不一失凡治丹毒俱宜先服防風升麻湯以解毒發表次用瓷鋒針去其血則毒隨血而散至神至捷百發百中防風升麻湯治十種丹毒用防風一錢升麻五分梔仁一錢麥冬一錢荊芥穗一錢木通一錢乾葛一錢薄荷一錢玄參一錢牛蒡子一錢粉甘草一錢便閉加大黃利之燈心十莖水煎熱服瓷針砭法用上清瓷器輕輕敲破取其鋒鋭者一枚將箸頭劈破橫夾瓷針露鋒於外將線扎緊以瓷鋒正對丹毒之處另以箸一條於瓷箸上輕輕敲之其血自出多刺更妙毒血出盡立時見功治丹若不砭去惡血十不救一十種丹證一飛灶丹從頭頂腫起然後散開先用蔥白搗取自然汁塗之效二走灶丹從頭頂起紅腫異常用紅豆飯研末雞蛋清調塗三鬼火丹從面部紅腫起用灶心土研末雞蛋清調塗四天火丹從背上起赤點用桑白皮切碎焙乾為末米醋調塗五天灶丹從兩臂赤腫黃色起用柳木燒炭研末淨水調塗六水丹先從兩脅起赤腫用多年鏽鐵磨濃汁豬油調塗七葫蘆丹先從臍下起紅腫用尖檳榔切碎焙乾研末米醋調塗八野火丹先從兩腳起紅腫用乳香去油研末羊油調塗九煙火丹從腳背上起紅腫用豬槽下土研末麻油調塗十胡漏丹從陰囊下起紅腫用門檻之下千腳土羊油調塗更有胎毒重者遍體皆是速用蕓薹子即油菜子一兩酒一大壺和研濾去渣取酒復熱數沸不拘時溫服二盞又方蕓薹即油菜取葉搗爛敷之隨手即消如無鮮菜乾者為未調敷凡丹毒遍身或連腰周百方不能治者惟此最神破傷風陳飛霞曰小兒或因跌僕或刀斧破傷風邪暗襲傷處發腫謂之破傷風速宜治之不然則發痙矣內服疏風活血散外以紫金錠塗之疏風活血散治小兒破傷風已痙未痙者全當歸二錢生地一錢赤芍藥一錢防風一錢紅花五分川芎七分蘇木一錢炙甘草一錢生薑一錢大棗一枚紫金錠山慈菰三兩五倍子三兩牙大戟一兩半明雄黃一兩鏡面辰砂一兩麝香三分共為細末糯米飯和藥為丸錠水磨搽之市中有售者不必自制但須防其以僞亂真諸瘡經曰諸痛癢瘡瘍皆屬心火陳飛霞曰世界瘡癢癤疥惟小兒最多豈其稚陽純氣易於歲運火攻相乘耶抑或不識不知而寒溫動定之乖其道耶復有父母之遺毒為兒終身之害者可不有以治之乎小兒初生遍身蟲疥與夫流水風瘡一般皆胎毒也切勿外治宜內服胡麻丸尚誤用搽洗逼毒入腹致腹脹危候也急服解毒湯為佳凡頭面遍體有瘡原未搽洗而瘡忽自平更加痰喘氣急者切不可下宜連翹丸解托之小兒未過周歲無論一切瘡疥不宜搽洗總以胡麻丸為主治至穩小兒生癰毒腫癤皆氣血凝滯而火熱乘之內服大補湯外以紫金錠塗之項上結核腫脹欲發熱者內服胡麻丸外以五倍子為末醋水調敷一日二易為妙集成胡麻丸治小兒風瘡疥癬嫩苦參五錢何首烏蒸胡麻仁炒蔓荊子炒威靈仙炒荊芥穗焙皂角刺各三錢石菖蒲炒白菊花各二錢上共為細末酒打米糊為丸每服一二錢量兒大小竹葉湯下集成解毒湯治小兒瘡疥誤入搽洗逼毒入內以此托之玄參一錢連翹一錢升麻五分黃芩一錢赤芍藥一錢當歸一錢羌活五分防風一錢木通一錢炙甘草一錢燈草一錢生地一錢荊芥穗一錢如大便祕結則加大黃集成連翹丸治小兒瘡疥毒陷入里以此托之連翹桑白皮白頭翁丹皮防風各三錢黃柏桂枝淡豆豉海螵蛸獨活秦艽各三錢上共為細末煉蜜為丸龍眼核大每服一丸燈心湯下集成大補湯治小兒癰疽膿後或頑瘡破爛久不收口凡一切潰瘍皆屬不足切不可再用寒涼黨參一錢黃耆一錢川芎五分連翹一錢白芷一錢茯苓一錢當歸一錢白朮一錢生地一錢白芍一錢炙甘草一錢生薑一錢大棗一枚接骨方塗蔚生曰小兒最好搬物上高故其跌打折骨之事亦最多方書接骨之法本繁然非系珍貴難購亦多系鄉間倉猝不易辨者欲求其簡而易辨平而最效之法頗非易易余在正陽時有宋姓者施接骨丹遠近多往求之頗著巨效然其對於此方之保守祕密決不肯輕易示人余以多方求之始悉其方為鍋煙藥名百草霜及磚頭灰也余以深恨中國此種無意識之嚴守祕密阻礙醫學進步不能使全國民衆得其利益謹將此法書出以為民衆及醫士者創其法分未斷者與已斷者二種未斷者用磨下極細過羅之磚頭以當窯門口之經火頭上者為尤佳灰及鍋煙各樣一歲一分黃酒沖服儘量出汗已斷者加花蜘蛛一歲一個與磚頭灰鍋煙一併用黃酒沖服但隔日者須先用全當歸一歲一分黃酒沖服後服鍋煙及磚頭灰自然接合矣治瘋狗咬方塗蔚生曰瘋狗之毒最劇其中人也亦最烈患之者既多若無良方而治之者每主張以毒攻毒甚非平易之治余得人參敗毒散加地榆紫竹根法試之者屢矣而收效勢若桴鼓洵為珍奇之治也人參敗毒散加地榆紫竹根法人參羌活獨活柴胡前胡枳殼桔硬川芎茯苓甘草地榆紫竹根塗蔚生曰如無紫竹根或他種竹根多用之亦可服後既無疼痛便血尿血之苦又無忌風忌過河忌食狗肉之禁誠平易之治也閲者慎勿忽諸治蠍子咬方取家子桃花或連葉搗研取汁貼敷其痛立止又家子桃亦名架子桃解砒霜毒方取薜荔嫩葉與嫩枝搗研取汁多多服之自愈薜荔即俗名爬牆虎蔓藤大葉叢生又用防風四兩井水調服亦可解砒霜毒此係閲微草堂方也余亦未經試驗姑存之以備用解鴉片毒方取灰猛養系西藥三錢陰陽水化開灌入搖之使吐自愈又法用硼砂灌之亦最見效治吞金方取蠐螬一二枚搗研灌下則金自溶化不致殺人按蠐螬雞籠內糞下與各肥地內均有治蛇咬方取重樓藥名一名七葉一枝花用醋研之敷傷痕上其痛立止但重樓必須真者否則不效又余在正陽時曾治一被蛇咬者為之內服五靈脂五錢雄黃三錢白芷三錢水調服外敷碘酒旋即痛止余究不知二者是誰治愈姑存之以備參考解食鹽毒方服鹽過多則血脈凝滯亦能殺人取豆漿未用石膏點入者多多服之其毒即解治吞針方取木炭之黑皮研細末服之其針自隨炭皮裹著從大便下
